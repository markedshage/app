function clearDrawing() {
  gardenMap.drawStrokes = [];
  saveGardenMap();
  redrawCanvas();
}

function initDrawCanvas() {
  const canvas = document.getElementById('draw-canvas');
  const vp = document.getElementById('map-vp');
  if (!canvas || !vp) return;

  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width  = vp.clientWidth  * dpr;
    canvas.height = vp.clientHeight * dpr;
    canvas.style.width  = vp.clientWidth  + 'px';
    canvas.style.height = vp.clientHeight + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    redrawCanvas();
  }
  resizeCanvas();
  new ResizeObserver(resizeCanvas).observe(vp);

  // Wire size slider with live dot preview
  const sizeInput = document.getElementById('draw-size');
  if (sizeInput) {
    sizeInput.addEventListener('input', () => {
      drawSize = +sizeInput.value;
      showSizeDot(drawSize, sizeInput);
    });
    sizeInput.addEventListener('mouseup', hideSizeDot);
    sizeInput.addEventListener('touchend', hideSizeDot);
  }

  // Wire opacity slider
  const opacitySlider = document.getElementById('draw-opacity');
  if (opacitySlider) opacitySlider.addEventListener('input', () => {
    drawOpacity = +opacitySlider.value / 100;
  });

  // Draw brush preview canvases
  function renderBrushPreviews() {
    document.querySelectorAll('.brush-sample').forEach(c => {
      const bt = c.dataset.brushtype, sz = +c.dataset.sz;
      const cx2 = c.getContext('2d');
      cx2.clearRect(0,0,40,28);
      cx2.fillStyle = '#1c1410';
      if (bt === 'round') {
        cx2.beginPath(); cx2.moveTo(4,14); cx2.lineTo(36,14);
        cx2.strokeStyle='#1c1410'; cx2.lineWidth=sz*0.3; cx2.lineCap='round'; cx2.stroke();
      } else if (bt === 'square') {
        cx2.beginPath(); cx2.moveTo(4,14); cx2.lineTo(36,14);
        cx2.strokeStyle='#1c1410'; cx2.lineWidth=sz*0.3; cx2.lineCap='square'; cx2.stroke();
      } else {
        // Calligraphy sample: diagonal stroke varying width
        for (let i=0; i<10; i++) {
          const x1=4+i*3.2, x2=x1+3.5, y=10+i*0.8;
          const ang = Math.atan2(0.8, 3.5);
          const w = Math.max(1, sz * 0.25 * (0.1 + 0.9*Math.abs(Math.sin(ang + i*0.3))));
          cx2.beginPath(); cx2.lineWidth=w; cx2.moveTo(x1,y); cx2.lineTo(x2,y+0.8);
          cx2.strokeStyle='#1c1410'; cx2.stroke();
        }
      }
    });
    // Also update the main brush preview button canvas
    const prev = document.getElementById('draw-brush-preview');
    if (prev) {
      const pc = prev.getContext('2d');
      pc.clearRect(0,0,22,22);
      pc.fillStyle='#1c1410'; pc.strokeStyle='#1c1410';
      if (drawBrush === 'round') {
        pc.beginPath(); pc.arc(11,11,5,0,Math.PI*2); pc.fill();
      } else if (drawBrush === 'square') {
        pc.fillRect(4,4,14,14);
      } else {
        pc.lineWidth=2; pc.beginPath(); pc.moveTo(4,18); pc.lineTo(18,4); pc.stroke();
        pc.lineWidth=5; pc.beginPath(); pc.moveTo(4,10); pc.lineTo(18,14); pc.stroke();
      }
    }
  }
  renderBrushPreviews();

  // Let wheel events pass through to map
  canvas.addEventListener('wheel', e => { e.stopPropagation(); mapWheel(e); }, {passive:false});

  let currentStroke = null;

  function screenToWorld(sx, sy) {
    return { x: (sx - mapOffX) / (mapScale * MAP_PX_PER_M), y: (sy - mapOffY) / (mapScale * MAP_PX_PER_M) };
  }

  function startStroke(sx, sy) {
    if (!drawMode) return;
    if (fillMode) { doFill(sx, sy); return; }
    const wp = screenToWorld(sx, sy);
    const isEraser = drawColor === '__eraser__';
    currentStroke = { color: isEraser ? '__eraser__' : drawColor, size: drawSize, brush: drawBrush, opacity: isEraser ? 1 : drawOpacity, points: [wp] };
    if (!gardenMap.drawStrokes) gardenMap.drawStrokes = [];
    gardenMap.drawStrokes.push(currentStroke);
    redrawCanvas();
  }

  function continueStroke(sx, sy) {
    if (!drawMode || !currentStroke || fillMode) return;
    const wp = screenToWorld(sx, sy);
    currentStroke.points.push(wp);
    redrawCanvas(); // full redraw each move for correctness
  }

  function endStroke() {
    if (currentStroke) saveGardenMap();
    currentStroke = null;
  }

  // Attach events to draw-overlay (sits above world, canvas stays at z:0)
  const overlay = document.getElementById('draw-overlay');
  if (!overlay) return;

  function getOverlayPos(e) {
    const r = overlay.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  overlay.addEventListener('mousedown', e => { if (e.ctrlKey || e.metaKey) return; e.preventDefault(); const p=getOverlayPos(e); startStroke(p.x,p.y); });
  overlay.addEventListener('mousemove', e => { if ((e.buttons&1) && !e.ctrlKey && !e.metaKey) { e.preventDefault(); const p=getOverlayPos(e); continueStroke(p.x,p.y); }});
  overlay.addEventListener('mouseup', endStroke);
  overlay.addEventListener('mouseleave', endStroke);
  overlay.addEventListener('wheel', e => { e.stopPropagation(); mapWheel(e); }, {passive:false});

  overlay.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const r = overlay.getBoundingClientRect();
      startStroke(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
    } else if (e.touches.length === 2) {
      endStroke();
      mapTouchStart(e);
    }
  }, {passive:false});

  overlay.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && currentStroke) {
      const r = overlay.getBoundingClientRect();
      continueStroke(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
    } else if (e.touches.length === 2) {
      mapTouchMove(e);
    }
  }, {passive:false});

  overlay.addEventListener('touchend', e => {
    if (e.touches.length === 0) endStroke();
    else mapTouchEnd(e);
  }, {passive:true});
}

function worldToScreen(mx, my) {
  // meters → screen pixels
  return {
    x: mx * MAP_PX_PER_M * mapScale + mapOffX,
    y: my * MAP_PX_PER_M * mapScale + mapOffY
  };
}

function redrawCanvas() {
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W, H);

  if (!gardenMap.drawStrokes || !gardenMap.drawStrokes.length) { ctx.restore(); return; }

  // Draw all strokes
  gardenMap.drawStrokes.forEach(stroke => {
    if (stroke.type === 'fill') {
      // Fills are stored as pixel operations — re-execute them on redraw
      const sp = worldToScreen(stroke.point.x, stroke.point.y);
      doFillOnCtx(ctx, W, H, sp.x, sp.y, stroke.color, stroke.opacity);
      return;
    }
    if (!stroke.points || stroke.points.length === 0) return;
    const isEraser = stroke.color === '__eraser__';
    const sz = Math.max(1, stroke.size * mapScale);

    ctx.save();
    ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';
    ctx.globalAlpha = isEraser ? 1 : Math.max(0.01, Math.min(1, stroke.opacity ?? 1));
    const drawColor2 = isEraser ? 'rgba(0,0,0,1)' : stroke.color;
    ctx.strokeStyle = drawColor2;
    ctx.fillStyle   = drawColor2;
    ctx.lineWidth   = sz;
    ctx.lineCap     = stroke.brush === 'square' ? 'square' : 'round';
    ctx.lineJoin    = 'round';

    const pts = stroke.points.map(p => worldToScreen(p.x, p.y));

    if (pts.length === 1) {
      ctx.beginPath();
      ctx.arc(pts[0].x, pts[0].y, sz / 2, 0, Math.PI * 2);
      ctx.fill();
    } else if (stroke.brush === 'calligraphy') {
      if (pts.length < 2) {
        ctx.beginPath(); ctx.arc(pts[0].x, pts[0].y, sz*0.3, 0, Math.PI*2); ctx.fill();
      } else {
        // Smooth angle using a running window to avoid sudden direction changes
        const WINDOW = 5;
        const smoothAngles = pts.map((p, i) => {
          const a = Math.max(0, i - WINDOW), b = Math.min(pts.length-1, i + WINDOW);
          const dx = pts[b].x - pts[a].x, dy = pts[b].y - pts[a].y;
          return Math.atan2(dy, dx);
        });

        // Compute widths with smoothed angles, then apply low-pass filter on width
        const rawW = smoothAngles.map(angle =>
          Math.max(0.5, sz * 0.5 * (0.12 + 0.88 * Math.abs(Math.sin(angle))))
        );
        const smoothW = [...rawW];
        const WSMOOTH = 8; // width smoothing passes
        for (let pass = 0; pass < WSMOOTH; pass++) {
          for (let i = 1; i < smoothW.length - 1; i++) {
            smoothW[i] = smoothW[i] * 0.5 + smoothW[i-1] * 0.25 + smoothW[i+1] * 0.25;
          }
        }

        // Build ribbon with smoothed normals and widths
        const top = [], bot = [];
        for (let i = 0; i < pts.length; i++) {
          const a = smoothAngles[i];
          const nx = -Math.sin(a), ny = Math.cos(a);
          const w = smoothW[i];
          top.push({ x: pts[i].x + nx*w, y: pts[i].y + ny*w });
          bot.push({ x: pts[i].x - nx*w, y: pts[i].y - ny*w });
        }

        // Draw smooth ribbon
        ctx.beginPath();
        ctx.moveTo(top[0].x, top[0].y);
        for (let i = 1; i < top.length; i++) {
          const mx = (top[i-1].x + top[i].x)/2, my = (top[i-1].y + top[i].y)/2;
          ctx.quadraticCurveTo(top[i-1].x, top[i-1].y, mx, my);
        }
        ctx.lineTo(top[top.length-1].x, top[top.length-1].y);
        for (let i = bot.length-1; i >= 0; i--) {
          const ni = Math.min(bot.length-1, i+1);
          const mx = (bot[i].x + bot[ni].x)/2, my = (bot[i].y + bot[ni].y)/2;
          ctx.quadraticCurveTo(bot[ni].x, bot[ni].y, mx, my);
        }
        ctx.closePath();
        ctx.fill();
      }
    } else {
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) {
        if (i < pts.length - 1) {
          const mx = (pts[i].x + pts[i+1].x) / 2;
          const my = (pts[i].y + pts[i+1].y) / 2;
          ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
        } else {
          ctx.lineTo(pts[i].x, pts[i].y);
        }
      }
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  });

  ctx.restore();
}

function doFill(sx, sy) {
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.width / dpr, H = canvas.height / dpr;
  const ctx = canvas.getContext('2d');
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  doFillOnCtx(ctx, W, H, sx, sy, drawColor, drawOpacity);
  ctx.restore();

  const mp = { x: (sx - mapOffX) / (mapScale * MAP_PX_PER_M), y: (sy - mapOffY) / (mapScale * MAP_PX_PER_M) };
  if (!gardenMap.drawStrokes) gardenMap.drawStrokes = [];
  gardenMap.drawStrokes.push({ type: 'fill', color: drawColor, opacity: drawOpacity, point: mp });
  saveGardenMap();
}

function doFillOnCtx(ctx, W, H, sx, sy, fillColorHex, opacity) {
  // Get pixel data at CSS scale
  const dpr = window.devicePixelRatio || 1;
  const canvas = document.getElementById('draw-canvas');
  if (!canvas) return;
  const imgData = ctx.getImageData(0, 0, W * dpr, H * dpr);
  const data = imgData.data;
  const pw = Math.round(W * dpr), ph = Math.round(H * dpr);
  const px0 = Math.round(sx * dpr), py0 = Math.round(sy * dpr);
  if (px0 < 0 || px0 >= pw || py0 < 0 || py0 >= ph) return;

  // Parse color and apply opacity
  const tmp = document.createElement('canvas'); tmp.width = 1; tmp.height = 1;
  const tc = tmp.getContext('2d'); tc.fillStyle = fillColorHex; tc.fillRect(0,0,1,1);
  const fc = tc.getImageData(0,0,1,1).data;
  const fillAlpha = opacity !== undefined ? Math.round(opacity * 255) : 255;
  const [fr,fg,fb,fa] = [fc[0],fc[1],fc[2], fillAlpha];

  const i0 = (py0 * pw + px0) * 4;
  const [sr,sg,sb,sa] = [data[i0],data[i0+1],data[i0+2],data[i0+3]];
  if (sr===fr && sg===fg && sb===fb && sa===fa) return;

  const match = i => Math.abs(data[i]-sr)<40 && Math.abs(data[i+1]-sg)<40 && Math.abs(data[i+2]-sb)<40 && Math.abs(data[i+3]-sa)<40;
  const set   = i => { data[i]=fr; data[i+1]=fg; data[i+2]=fb; data[i+3]=fa; };

  const stack = [py0 * pw + px0];
  const vis = new Uint8Array(pw * ph);
  vis[py0 * pw + px0] = 1;
  while (stack.length) {
    const pos = stack.pop();
    set(pos * 4);
    const px = pos % pw, py = (pos / pw) | 0;
    for (const [nx, ny] of [[px-1,py],[px+1,py],[px,py-1],[px,py+1]]) {
      if (nx<0||nx>=pw||ny<0||ny>=ph) continue;
      const ni = ny*pw+nx;
      if (!vis[ni] && match(ni*4)) { vis[ni]=1; stack.push(ni); }
    }
  }
  ctx.putImageData(imgData, 0, 0);
}


function resolveOverlapMeters(mx, my, movingLetter) {
  const GAP = 1.0; // 1 meter min gap between fields
  const letters = mapFieldLetters();

  function getPosM(l) {
    if (gardenMap.fieldMeters?.[l]) return { ...gardenMap.fieldMeters[l] };
    if (gardenMap.fieldDragOffsets?.[l]) return {
      x: gardenMap.fieldDragOffsets[l].x / MAP_PX_PER_M,
      y: gardenMap.fieldDragOffsets[l].y / MAP_PX_PER_M
    };
    // Use default grid position
    if (!gardenMap.fieldGrid) gardenMap.fieldGrid = {};
    const li = mapFieldLetters();
    li.forEach((lt, i) => { if (!gardenMap.fieldGrid[lt]) gardenMap.fieldGrid[lt] = {col:0,row:i}; });
    const g = gardenMap.fieldGrid[l] || {col:0, row:0};
    // Compute stacked default position
    let defX = MAP_PAD_M, defY = MAP_PAD_M;
    li.slice(0, li.indexOf(l)).forEach(prev => {
      const sz = getFieldSizeM(prev);
      defY += sz.h + 1.0; // 1m gap
    });
    return { x: defX, y: defY };
  }

  const movingSz = getFieldSizeM(movingLetter);

  for (let iter = 0; iter < 12; iter++) {
    let moved = false;
    for (const other of letters) {
      if (other === movingLetter) continue;
      const op = getPosM(other);
      const os = getFieldSizeM(other);
      const overlapX = mx < op.x+os.w+GAP && mx+movingSz.w > op.x-GAP;
      const overlapY = my < op.y+os.h+GAP && my+movingSz.h > op.y-GAP;
      if (overlapX && overlapY) {
        const dR = op.x+os.w+GAP - mx;
        const dL = mx+movingSz.w+GAP - op.x;
        const dD = op.y+os.h+GAP - my;
        const dU = my+movingSz.h+GAP - op.y;
        const min = Math.min(dR,dL,dD,dU);
        if      (min===dR) mx += dR;
        else if (min===dL) mx -= dL;
        else if (min===dD) my += dD;
        else               my -= dU;
        moved = true;
      }
    }
    if (!moved) break;
  }
  return { x: Math.max(0,mx), y: Math.max(0,my) };
}







// ── Touch events (pan + pinch) ──────────────────────────────────
function mapTouchStart(e) {
  if (drawMode && e.touches.length < 2) return; // 1-finger: canvas draws
  e.preventDefault();
  const touches = e.touches;
  if (touches.length === 1) {
    mapTouch1 = { id: touches[0].identifier, x: touches[0].clientX, y: touches[0].clientY, ox: mapOffX, oy: mapOffY };
    mapTouch2 = null;
  } else if (touches.length === 2) {
    mapTouch1 = { id: touches[0].identifier, x: touches[0].clientX, y: touches[0].clientY };
    mapTouch2 = { id: touches[1].identifier, x: touches[1].clientX, y: touches[1].clientY };
    mapPinchDist  = Math.hypot(mapTouch2.x - mapTouch1.x, mapTouch2.y - mapTouch1.y);
    mapPinchScale = mapScale;
    mapPinchOX    = mapOffX;
    mapPinchOY    = mapOffY;
  }
}

function mapTouchMove(e) {
  if (drawMode && e.touches.length < 2) return;
  e.preventDefault();
  const touches = e.touches;
  if (touches.length === 1 && mapTouch1 && !mapTouch2) {
    const t = touches[0];
    mapOffX = mapTouch1.ox + (t.clientX - mapTouch1.x);
    mapOffY = mapTouch1.oy + (t.clientY - mapTouch1.y);
    mapApplyTransform();
  } else if (touches.length === 2 && mapTouch1 && mapTouch2) {
    const t1 = touches[0], t2 = touches[1];
    const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
    const midX = (t1.clientX + t2.clientX) / 2;
    const midY = (t1.clientY + t2.clientY) / 2;
    const origMidX = (mapTouch1.x + mapTouch2.x) / 2;
    const origMidY = (mapTouch1.y + mapTouch2.y) / 2;
    const f = dist / mapPinchDist;
    mapScale = Math.max(0.05, Math.min(8, mapPinchScale * f));
    mapOffX = midX - (origMidX - mapPinchOX) * f - (origMidX - midX);
    mapOffY = midY - (origMidY - mapPinchOY) * f - (origMidY - midY);
    mapApplyTransform();
  }
}

function mapTouchEnd(e) {
  if (drawMode && e.changedTouches.length < 2 && e.touches.length === 0 && !mapTouch2) return;
  e.preventDefault();
  if (e.touches.length === 0) {
    mapTouch1 = null; mapTouch2 = null;
  } else if (e.touches.length === 1) {
    const t = e.touches[0];
    mapTouch1 = { id: t.identifier, x: t.clientX, y: t.clientY, ox: mapOffX, oy: mapOffY };
    mapTouch2 = null;
  }
}

// ── Mouse events (desktop pan) ───────────────────────────────────
function mapMouseDown(e) {
  if (drawMode && !e.ctrlKey) return; // in draw mode, only pan with Ctrl
  e.preventDefault();
  _mapMouseActive = true;
  mapMouseX = e.clientX; mapMouseY = e.clientY;
  mapMouseOX = mapOffX;  mapMouseOY = mapOffY;
  const onMove = ev => {
    if (!_mapMouseActive) return;
    mapOffX = mapMouseOX + (ev.clientX - mapMouseX);
    mapOffY = mapMouseOY + (ev.clientY - mapMouseY);
    mapApplyTransform();
  };
  const onUp = () => {
    _mapMouseActive = false;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('mouseup', onUp);
  };
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
}

    btn.style.background = v === val ? 'var(--accent-bg)' : 'transparent';
    btn.style.color = v === val ? 'var(--accent-soft)' : 'var(--text-muted)';
  });
}

function renderSenger() {
  const fields = ['alle', ...new Set(BED_IDS.map(id => id.match(/^([A-Za-z]+)/)?.[1] || id))].sort((a,b) => a==='alle'?-1:b==='alle'?1:a.localeCompare(b));

  document.getElementById('tab-senger').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px">

      <div style="display:flex;gap:8px">
        <button onclick="openGardenMap()" style="padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit">Oversiktskart</button>
        <button onclick="openAddBed()" style="padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit">+ Legg til seng</button>
      </div>
    </div>
    <div class="filter-bar" style="margin-bottom:12px">
      ${fields.map(f => `<button class="filter-btn ${bedFieldFilter===f?'active':''}" onclick="setBedField('${f}')">${f==='alle'?'Alle':f}</button>`).join('')}
    </div>
    <div class="bed-grid">
      ${(() => {
        const COLS = 3;
        const rows = [];
        for (let i = 0; i < visibleBeds.length; i += COLS) {
          rows.push(visibleBeds.slice(i, i + COLS));
        }
        return rows.map(row => {
          const selectedInRow = row.find(bed => bed === selectedBed);

          const cells = row.map(bed => {
            const bedCropList = getCropsInBed(bed);
            const sz = bedSizes[bed];
            const occupied = bedCropList.length > 0;
            const isSelected = bed === selectedBed;
            const cls = ['bed-cell', occupied?'occupied':'', isSelected?'selected':''].join(' ');

            if (bedCropList.length === 1) {
              const c = bedCropList[0];
              return `<div class="${cls}" onclick="selectBed('${bed}')">
                <div><span class="bed-label">Seng ${bed}</span></div>
                <div class="bed-name">${c.name}</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:6px">${sz.length}m × ${sz.width}m</div>
              </div>`;
            } else if (bedCropList.length > 1) {
              const nameMap = {};
              bedCropList.forEach(c => { nameMap[c.name] = (nameMap[c.name] || 0) + 1; });
              const uniqueNames = Object.keys(nameMap);
              const namesHtml = uniqueNames.map((n, i) =>
                `<span style="font-size:13px;color:var(--text-head);white-space:nowrap">${n}</span>${i < uniqueNames.length-1 ? '<span style="color:var(--text-muted);font-size:12px;margin:0 3px">·</span>' : ''}`
              ).join('');
              return `<div class="${cls}" onclick="selectBed('${bed}')">
                <div><span class="bed-label">Seng ${bed}</span></div>
                <div style="display:flex;flex-wrap:wrap;align-items:center;gap:1px;margin-top:4px;max-width:100%">${
                  uniqueNames.map((n, i) => {
                    const isLast = i === uniqueNames.length - 1;
                    const lineBreak = (i % 2 === 1 && !isLast) ? '<div style="width:100%;height:0"></div>' : '';
                    return `<span style="font-size:13px;color:var(--text-head);white-space:nowrap">${n}</span>${!isLast ? '<span style="color:var(--text-muted);font-size:12px;margin:0 3px">·</span>' : ''}${lineBreak}`;
                  }).join('')
                }</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${sz.length}m × ${sz.width}m</div>
              </div>`;
            } else {
              return `<div class="${cls}" onclick="selectBed('${bed}')">
                <div><span class="bed-label">Seng ${bed}</span></div>
                <div class="bed-empty">Ledig</div>
                <div style="font-size:12px;color:var(--text-muted);margin-top:6px">${sz.length}m × ${sz.width}m</div>
              </div>`;
            }
          }).join('');

          // Build detail panel if a bed in this row is selected
          let detailHtml = '';
          if (selectedInRow) {
            const bed = selectedInRow;
            const bs = bedSizes[bed];
            const bedLen = bs.length;
            const bedCropList = getCropsInBed(bed);
            const occ = [];
            bedCropList.forEach(crop => {
              crop.beds.forEach(spec => {
                const { bedId, start, end } = parseBedSpec(spec);
                if (bedId !== bed) return;
                occ.push({ start: start || 1, end: end || bedLen, crop, spec });
              });
            });
            occ.sort((a,b) => a.start - b.start);
            const free = [];

            occ.forEach(o => {
              if (o.start > pos) free.push({ start: pos, end: o.start - 1 });
              pos = Math.max(pos, o.end + 1);
            });
            if (pos <= bedLen) free.push({ start: pos, end: bedLen });

            const cropRows = occ.map(o => {

                  <div>Planteavstand: <span style="color:var(--text-head)">${o.crop.plantSpacing} cm</span></div>
                  <div>Rader: <span style="color:var(--text-head)">${o.crop.rows}</span></div>
                  <div>Antall planter: <span style="color:var(--accent);font-weight:bold">${calcPlants({...o.crop, beds:[o.spec]})}</span></div>
                  ${g !== null ? `<div>Gangavstand: <span style="color:var(--text-head)">${g} cm</span></div>` : ''}
                </div>
                ${o.crop.notes ? `<div style="margin-top:8px;font-size:12px;color:var(--text-muted);font-style:italic">📝 ${o.crop.notes}</div>` : ''}
              </div>`;
            }).join('');

            const freeRows = free.map(f =>
              `<div style="padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);margin-bottom:8px;font-size:12px;color:var(--text-muted)">
                Ledig: meter ${f.start}–${f.end} (${f.end - f.start + 1}m)
              </div>`
            ).join('');

            detailHtml = `<div style="grid-column:1/-1;padding:14px;border-radius:12px;background:rgba(0,0,0,0.2);border:1px solid var(--border-accent);margin-bottom:4px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div style="font-size:13px;color:var(--accent-soft)">Seng ${bed} — ${bs.length}m × ${bs.width}m</div>

                  <button onclick="openBedSizeEdit('${bed}')" style="background:rgba(52,211,153,0.1);border:1px solid var(--border-accent);border-radius:8px;color:var(--accent-soft);cursor:pointer;padding:4px 10px;font-size:12px;font-family:inherit">Endre størrelse</button>
                  ${getCropsInBed(bed).length === 0 ? `<button onclick="deleteBed('${bed}')" style="padding:4px 10px;border-radius:8px;border:1px solid rgba(248,113,113,0.4);background:rgba(248,113,113,0.08);color:#f87171;cursor:pointer;font-size:12px;font-family:inherit">🗑 Slett</button>` : ''}
                </div>
              </div>
              ${cropRows}${freeRows}
            </div>`;
          }

          return `${cells}${detailHtml ? `<div style="grid-column:1/-1">${detailHtml}</div>` : ''}`;
        }).join('');
      })()}
    </div>`;

function selectBed(bed) {
  selectedBed = selectedBed === bed ? null : bed;
  renderSenger();
}

function setBedField(f) {
  bedFieldFilter = f;
  selectedBed = null;
  renderSenger();
}

function openAddBed() {
  document.getElementById('ab-name').value = '';
  document.getElementById('ab-length').value = 11;
  document.getElementById('ab-width').value = 1.2;
  document.getElementById('ab-error').style.display = 'none';
  document.getElementById('modal-addbed').style.display = 'flex';
}

function addBed() {
  const name = document.getElementById('ab-name').value.trim().toUpperCase();
  const errEl = document.getElementById('ab-error');
  if (!name) { errEl.textContent = 'Skriv inn et sengnavn.'; errEl.style.display='block'; return; }
  if (BED_IDS.includes(name)) { errEl.textContent = `Seng ${name} finnes allerede.`; errEl.style.display='block'; return; }
  BED_IDS.push(name);
  snapshot();
  bedSizes[name] = {
    length: parseFloat(document.getElementById('ab-length').value) || 11,
    width:  parseFloat(document.getElementById('ab-width').value)  || 1.2,
  };
  closeModal('modal-addbed');
  selectedBed = name;
  renderSenger();
}

function deleteBed(bedId) {
  if (getCropsInBed(bedId).length > 0) return;
  snapshot();
  BED_IDS = BED_IDS.filter(id => id !== bedId);
  delete bedSizes[bedId];
  selectedBed = null;
  renderSenger();
}

/* ---- CALENDAR PICKER ---- */
let calState = { btnId: null, valId: null, year: 2026, month: 2 }; // month 0-indexed
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const DAYS_NO = ['Ma','Ti','On','To','Fr','Lø','Sø'];

function openCal(btnId, valId) {
  const existing = document.getElementById('cal-popup');
  if (existing) existing.remove();
  const now = new Date();
  const hidden = document.getElementById(valId).value;
  let year = now.getFullYear(), month = now.getMonth();
  if (hidden) {
    const [d,m,y] = hidden.split('-');
    year = +y; month = +m - 1;
  }
  calState = { btnId, valId, year, month };
  renderCal();
}

function renderCal() {
  const existing = document.getElementById('cal-popup');
  if (existing) existing.remove();

  const { btnId, valId, year, month } = calState;
  const selectedVal = document.getElementById(valId).value;
  const btn = document.getElementById(btnId);
  if (!btn) return;

  const popup = document.createElement('div');
  popup.className = 'cal-popup';
  popup.id = 'cal-popup';

  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const startOffset = (firstDay === 0 ? 6 : firstDay - 1); // Mon-start
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  let days = '';
  DAYS_NO.forEach(d => { days += `<div class="cal-dow">${d}</div>`; });
  for (let i = 0; i < startOffset; i++) days += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dd = String(d).padStart(2,'0');
    const mm = String(month+1).padStart(2,'0');
    const val = `${dd}-${mm}-${year}`;
    const isToday = d===today.getDate() && month===today.getMonth() && year===today.getFullYear();
    const isSel = val === selectedVal;
    days += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDate('${val}','${btnId}','${valId}')">${d}</div>`;
  }

  popup.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1,event)">‹</button>
      <span class="cal-month-label">${MONTHS_NO[month]} ${year}</span>
      <button class="cal-nav" onclick="calNav(1,event)">›</button>
    </div>
    <div class="cal-grid">${days}</div>
    <div style="display:flex;gap:6px;padding:0 4px 4px">
      <button class="cal-clear" style="flex:1" onclick="selectTodayInCal('${btnId}','${valId}')">I dag</button>
      <button class="cal-clear" style="flex:1" onclick="clearDate('${btnId}','${valId}')">Fjern dato</button>
    </div>`;

  // Position near button
  document.body.appendChild(popup);
  const rect = btn.getBoundingClientRect();
  const popW = 300, popH = 280;
  let top = rect.bottom + 6, left = rect.left;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if (top + popH > window.innerHeight - 8) top = rect.top - popH - 6;
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
}

function calNav(dir, event) {
  if (event) event.stopPropagation();
  calState.month += dir;
  if (calState.month < 0) { calState.month = 11; calState.year--; }
  if (calState.month > 11) { calState.month = 0; calState.year++; }
  renderCal();

function calcGang(crop, bedSpec) {
  const spec = bedSpec || (crop.beds[0] || '');
  const { bedId } = parseBedSpec(spec);
  const bs = bedSizes[bedId];
  if (!bs) return null;
  const bedWidthCm = bs.width * 100;
  const rows = crop.rows || 1;
  const rowSpacing = crop.rowSpacing || 0;
  const gang = (bedWidthCm - (rows - 1) * rowSpacing) / 2;
  return Math.round(gang * 10) / 10;
}

function saveCrop() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) return;
  const rawBeds = document.getElementById('c-beds').value.split(',').map(s=>s.trim()).filter(Boolean);

  // Validate format and check for unknown beds
  const validFmt = /^[A-Za-z]+\d+(-\d+(?::\d+)?)?$/;
  for (const spec of rawBeds) {
    if (!validFmt.test(spec)) {
      document.getElementById('c-beds-error').textContent = `Ugyldig format: "${spec}". Bruk f.eks. A1, A1-3 eller A1-1:5`;
      document.getElementById('c-beds-error').style.display = 'block';
      return;
    }
    const { bedId, start, end } = parseBedSpec(spec);
    if (!BED_IDS.includes(bedId)) {
      // Prompt to create bed
      pendingNewBed = { bedId, continueWith: { name, rawBeds } };
      document.getElementById('new-bed-name').textContent = bedId;
      document.getElementById('modal-new-bed').style.display = 'flex';
      return;
    }
    if (start !== null && end !== null) {
      const bedLen = (bedSizes[bedId] || {length:11}).length;
      if (start < 1 || end > bedLen || start > end) {
        document.getElementById('c-beds-error').textContent = `${spec}: meter ${start}–${end} er utenfor seng ${bedId} (${bedLen}m)`;
        document.getElementById('c-beds-error').style.display = 'block';
        return;
      }
    }
  }
  document.getElementById('c-beds-error').style.display = 'none';

  // Check overlaps
  const overlaps = checkOverlap(rawBeds, editingCropId);
  if (overlaps.length && !pendingOverlapConfirmed) {
    pendingOverlapConfirmed = true;
    const msg = 'Advarsel: Overlapp med eksisterende vekster:\n• ' + overlaps.join('\n• ') + '\n\nVil du lagre likevel?';
    if (!confirm(msg)) { pendingOverlapConfirmed = false; return; }
  }
  pendingOverlapConfirmed = false;

  const data = {
    name,
    emoji: document.getElementById('c-emoji').value || '🌱',
    family: document.getElementById('c-family').value,
    rowSpacing: +document.getElementById('c-rowspacing').value || 30,
    plantSpacing: +document.getElementById('c-plantspacing').value || 20,
    rows: +document.getElementById('c-rows').value || 2,
    seedsPerCluster: +document.getElementById('c-seedspercluster').value || 1,
    beds: rawBeds,
    sownDate: document.getElementById('c-sown-val').value,
    sowLog: document.getElementById('c-sowlog-val').value,
    plantedDate: document.getElementById('c-planted-val').value,
    plantLog: document.getElementById('c-plantlog-val').value,
    status: document.getElementById('c-status').value,
    pricePerKg: parseFloat(document.getElementById('c-pricepkg').value) || 0,
    weightG: parseFloat(document.getElementById('c-weightg').value) || 0,
    notes: document.getElementById('c-notes').value,
  };
  const existingCrop = editingCropId !== null ? crops.find(c => c.id === editingCropId) : null;
  const prevStatus = existingCrop ? existingCrop.status : 'planlagt';
  const prevSowLog = existingCrop ? existingCrop.sowLog : '';
  const prevPlantLog = existingCrop ? existingCrop.plantLog : '';

  let autoStatus = data.status;
  if (data.sowLog && data.sowLog !== prevSowLog) {
    autoStatus = 'sådd';
  } else if (data.plantLog && data.plantLog !== prevPlantLog) {
    autoStatus = 'plantet';
  }
  data.status = autoStatus;

  if (editingCropId !== null) {
    snapshot();
    crops = crops.map(c => c.id === editingCropId ? { ...c, ...data } : c);
  } else {
    snapshot();
    crops.push({ id: Date.now(), ...data });
  }
  closeModal('modal-crop');
  render();
}

      <button onclick="setTaskPriority(${tid},'${p}')" title="${p} prioritet" style="background:none;border:none;cursor:pointer;padding:1px;display:flex;align-items:center;justify-content:center">
        <div style="width:${p===currentPriority?10:7}px;height:${p===currentPriority?10:7}px;border-radius:50%;background:${p===currentPriority?pColors[p]:'rgba(107,114,128,0.3)'};transition:all 0.15s;border:${p===currentPriority?'none':'1.5px solid rgba(107,114,128,0.3)'}"></div>
      </button>`).join('')}
  </div>`;
}

function setTaskPriority(id, priority) {
  snapshot();
  tasks = tasks.map(t => t.id === id ? {...t, priority} : t);
  renderOppgaver();
}

function initTaskDragDrop() {
  const rows = document.querySelectorAll('.task-row[draggable="true"]');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', row.dataset.taskId);
      e.dataTransfer.setData('text/priority', row.dataset.priority);
      row.style.opacity = '0.4';
    });
    row.addEventListener('dragend', () => row.style.opacity = '');
    row.addEventListener('dragover', e => { e.preventDefault(); row.style.borderTop = '2px solid var(--accent)'; });
    row.addEventListener('dragleave', () => row.style.borderTop = '');
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.style.borderTop = '';
      const draggedId = e.dataTransfer.getData('text/plain');
      const fromPriority = e.dataTransfer.getData('text/priority');
      const toId = row.dataset.taskId;
      const toPriority = row.dataset.priority;
      const draggedIdParsed = isNaN(draggedId) ? draggedId : +draggedId;
      const toIdParsed = isNaN(toId) ? toId : +toId;
      if (draggedIdParsed === toIdParsed) return;

      // Change priority if dropped in different section
      if (fromPriority !== toPriority) {
        snapshot();
        tasks = tasks.map(t => t.id === draggedIdParsed ? {...t, priority: toPriority} : t);
      }

      // Update order
      if (!taskOrder[toPriority]) taskOrder[toPriority] = getOrderedTasks(toPriority).map(t => t.id);
      const order = [...(taskOrder[toPriority] || [])];
      const draggedIdx = order.indexOf(draggedIdParsed);
      const toIdx = order.indexOf(toIdParsed);
      if (draggedIdx > -1) order.splice(draggedIdx, 1);
      const insertIdx = toIdx > -1 ? toIdx : order.length;
      order.splice(insertIdx, 0, draggedIdParsed);
      taskOrder[toPriority] = order;
      if (fromPriority !== toPriority && taskOrder[fromPriority]) {
        taskOrder[fromPriority] = taskOrder[fromPriority].filter(id => id !== draggedIdParsed);
      }
      saveTaskOrder();
      renderOppgaver();
    });
  });
  // Drop on section headers
  document.querySelectorAll('.task-drop-zone').forEach(zone => {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.background = 'rgba(52,211,153,0.08)'; });
    zone.addEventListener('dragleave', () => zone.style.background = '');
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.style.background = '';
      const draggedId = e.dataTransfer.getData('text/plain');
      const fromPriority = e.dataTransfer.getData('text/priority');
      const toPriority = zone.dataset.priority;
      const draggedIdParsed = isNaN(draggedId) ? draggedId : +draggedId;
      if (fromPriority !== toPriority) {
        snapshot();
        tasks = tasks.map(t => t.id === draggedIdParsed ? {...t, priority: toPriority} : t);
      }
      if (!taskOrder[toPriority]) taskOrder[toPriority] = [];
      if (!taskOrder[toPriority].includes(draggedIdParsed)) taskOrder[toPriority].push(draggedIdParsed);
      saveTaskOrder();
      renderOppgaver();
    });
  });
}

function toggleTask(id) {
  if (typeof id === 'string' && id.startsWith('crop-')) return;
  snapshot();
  const idStr = String(id).replace(/'/g, "");
  tasks = tasks.map(t => String(t.id) === idStr ? {...t, done:!t.done} : t);
  render();
}

function deleteTask(id) {
  snapshot();
  const idStr = String(id).replace(/'/g, "");
  const task = tasks.find(t => String(t.id) === idStr);
  if (task) {
    // Move to history on delete
    const histTask = {...task, completedAt: new Date().toISOString()};
    taskHistory.unshift(histTask);
    if (taskHistory.length > 200) taskHistory.pop();
    try { localStorage.setItem('mh_task_history', JSON.stringify(taskHistory)); } catch(e) {}
  }
  tasks = tasks.filter(t => String(t.id) !== idStr);
  render();
}

function deleteTaskFromHistory(idx) {
  taskHistory.splice(idx, 1);
  try { localStorage.setItem('mh_task_history', JSON.stringify(taskHistory)); } catch(e) {}
  openHistoryModal();
}

function startEditTaskText(id, el) {
  if (el.querySelector('input')) return; // already editing
  const current = el.textContent;
  el.innerHTML = '';
  const input = document.createElement('input');
  input.value = current;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #34d399;outline:none;color:var(--text-head);font-size:14px;font-family:inherit;width:100%;caret-color:var(--accent)';
  el.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const val = input.value.trim();
    if (val && val !== current) {
      snapshot();
      tasks = tasks.map(t => t.id===id ? {...t, text:val} : t);
    }
    renderOppgaver();
  }
  input.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); commit(); } if (e.key==='Escape') renderOppgaver(); });
  input.addEventListener('blur', commit);
}

function startEditTaskDate(id, event) {
  if (event) event.stopPropagation();
  const t = tasks.find(t => t.id === id);

  let btn = document.getElementById('_task-cal-btn');

    val = document.createElement('input');

    val.type = 'hidden';
    document.body.appendChild(btn);

  _onDatePicked = (newDate) => {
    if (newDate !== (t.date || '')) {

/* ---- KALENDER ---- */
let kalenderYear  = new Date().getFullYear();
let kalenderMonth = new Date().getMonth();
let kalenderSelectedDay = null;

function parseToDate(str) {
  if (!str) return null;
  const m = str.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1]);
}

function toDateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getISOWeek(d) {
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  return Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
}

function getCalEvents() {
  const map = {};
  const add = (dateStr, label, emoji, color, extra) => {
    const d = parseToDate(dateStr);
    if (!d) return;
    const k = toDateKey(d);
    if (!map[k]) map[k] = [];
    map[k].push({ label, emoji, color, ...extra });
  };
  crops.forEach(c => {
    if (c.sownDate && !c.sowLog) add(c.sownDate, 'Sådato: '+c.name, c.emoji, '#60a5fa');
    if (c.plantedDate && !c.plantLog) {
      const segSpecs = c.beds.filter(s => parseBedSpec(s).start !== null);
      const segLabel = segSpecs.length > 0 ? ` (${segSpecs.join(', ')})` : '';
      add(c.plantedDate, 'Plantedato: '+c.name+segLabel, c.emoji, '#34d399');
    }
  });
  const pColors = {høy:'#f87171', middels:'#fbbf24', lav:'#6ee7b7'};
  tasks.filter(t => t.date && !t.done && !String(t.id).startsWith('crop-')).forEach(t => {
    add(t.date, t.text, '📋', pColors[t.priority] || '#fbbf24', { taskId: t.id, priority: t.priority });
  });

  return map;
}

function renderKalender() {
  const MONTHS = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  const DAYS   = ['Ma','Ti','On','To','Fr','Lø','Sø'];
  const events = getCalEvents();
  const firstDay = new Date(kalenderYear, kalenderMonth, 1);
  const lastDay  = new Date(kalenderYear, kalenderMonth + 1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const today = toDateKey(new Date());

  // Build cells array
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= lastDay.getDate(); d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  // Split into rows of 7
  const rows = [];
  for (let i = 0; i < cells.length; i += 7) rows.push(cells.slice(i, i+7));

  // Header row: week-number col + day labels
  const headerRow = '<div style="display:grid;grid-template-columns:28px repeat(7,1fr);gap:3px;margin-bottom:3px">'
    + '<div></div>'
    + DAYS.map(d => '<div style="text-align:center;font-size:12px;color:var(--text-muted);padding:3px 0;letter-spacing:0.05em">'+d+'</div>').join('')
    + '</div>';

  const gridRows = rows.map(row => {
    const firstD = row.find(d => d !== null);
    const wkNum = firstD ? getISOWeek(new Date(kalenderYear, kalenderMonth, firstD)) : '';
    const cols = row.map(d => {
      if (!d) return '<div style="min-height:52px"></div>';
      const key = kalenderYear+'-'+String(kalenderMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = key === today, isSel = key === kalenderSelectedDay;
      const ev = events[key] || [];
      const dots = ev.slice(0,3).map(e => '<div style="width:5px;height:5px;border-radius:50%;background:'+e.color+'"></div>').join('');
      return '<div onclick="selectKalenderDay(\''+key+'\')" style="min-height:52px;padding:5px 4px;border-radius:8px;cursor:pointer;'
        +'background:'+(isSel?'var(--accent-bg)':isToday?'rgba(96,165,250,0.12)':'var(--bg-card)')
        +';border:1px solid '+(isSel?'var(--accent)':isToday?'rgba(96,165,250,0.4)':'var(--border)')+'">'
        +'<div style="font-size:12px;font-weight:'+(isToday?600:400)+';color:'+(isToday?'var(--accent-soft)':'var(--text-head)')+';margin-bottom:3px">'+d+'</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:2px">'+dots+'</div>'
        +(ev.length ? '<div style="font-size:12px;color:var(--text-muted);margin-top:2px">'+ev.length+'</div>' : '')
        +'</div>';
    }).join('');
    return '<div style="display:grid;grid-template-columns:28px repeat(7,1fr);gap:3px;margin-bottom:3px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:center;padding-top:6px;font-size:12px;color:var(--text-dim);font-weight:600">'+wkNum+'</div>'
      +cols+'</div>';
  }).join('');

  // Ukeliste: events from the week of the selected day (or current week if nothing selected)
  const refDate = kalenderSelectedDay ? (()=>{ const p=kalenderSelectedDay.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); })() : new Date();
  const refDay = refDate.getDay() || 7;
  const monday = new Date(refDate); monday.setDate(refDate.getDate() - refDay + 1); monday.setHours(0,0,0,0);
  const weekKeys = Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(monday.getDate()+i); return toDateKey(d); });
  const MONTHS_SHORT = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  const DAYS_FULL = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
  // Add overdue undone tasks to their original date (still show them even if past)
  const overdueEvents = {};
  tasks.filter(t => t.date && !t.done && !String(t.id).startsWith('crop-')).forEach(t => {
    const d = parseToDate(t.date);
    if (!d) return;
    const k = toDateKey(d);
    if (!weekKeys.includes(k)) return; // only show in their own week
    if (!overdueEvents[k]) overdueEvents[k] = [];
    overdueEvents[k].push({ label: t.text, emoji: '📋', color: ({høy:'#f87171',middels:'#fbbf24',lav:'#6ee7b7'})[t.priority]||'#fbbf24', taskId: t.id, priority: t.priority });
  });
  const ukelisteItems = weekKeys.map((key, i) => {
    const ev = [...(events[key] || [])];
    if (!ev.length) return '';
    const parts = key.split('-');
    const monthName = MONTHS_SHORT[parseInt(parts[1])-1];
    return '<div style="margin-bottom:10px">'
      +'<div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;letter-spacing:0.05em">'+DAYS_FULL[i]+' '+parseInt(parts[2])+'. '+monthName+'</div>'
      +ev.map(e => {
        const isSow   = e.color === '#60a5fa';
        const isPlant = e.color === '#34d399';
        // Find crop id for action buttons
        let cropId = '';
        if (isSow || isPlant) {
          const cropName = e.label.replace(/^(Sådato|Plantedato): /, '');
          const found = crops.find(c => c.name === cropName);
          if (found) cropId = found.id;

function kalenderNav(dir) {
  kalenderMonth += dir;
  if (kalenderMonth > 11) { kalenderMonth = 0; kalenderYear++; }
  if (kalenderMonth < 0)  { kalenderMonth = 11; kalenderYear--; }
  kalenderSelectedDay = null;
  renderKalender();
}

function selectKalenderDay(key) {
  kalenderSelectedDay = kalenderSelectedDay === key ? null : key;
  renderKalender();
}

function kalenderMoveDay(delta) {
  // delta: -7=up, +7=down, -1=left, +1=right
  if (!kalenderSelectedDay) {
    // Select today if in current month, else first day
    const todayKey = toDateKey(new Date());
    const [ty, tm] = todayKey.split('-').map(Number);
    if (tm-1 === kalenderMonth && ty === kalenderYear) {
      kalenderSelectedDay = todayKey;
    } else {
      kalenderSelectedDay = kalenderYear+'-'+String(kalenderMonth+1).padStart(2,'0')+'-01';
    }
    renderKalender(); return;
  }
  const parts = kalenderSelectedDay.split('-').map(Number);
  const cur = new Date(parts[0], parts[1]-1, parts[2]);
  cur.setDate(cur.getDate() + delta);
  // If moved to different month, navigate there
  if (cur.getMonth() !== kalenderMonth || cur.getFullYear() !== kalenderYear) {
    kalenderYear  = cur.getFullYear();
    kalenderMonth = cur.getMonth();
  }
  kalenderSelectedDay = toDateKey(cur);
  renderKalender();
  // Scroll selected day into view
  setTimeout(() => {
    const el = document.querySelector('[onclick*="'+kalenderSelectedDay+'"]');
    if (el) el.scrollIntoView({block:'nearest', behavior:'smooth'});
  }, 30);
}

function modusSetToday() {
  const today = toDateKey(new Date());
  const parts = today.split('-');
  const formatted = parts[2]+'-'+parts[1]+'-'+parts[0]; // YYYY-MM-DD -> DD-MM-YYYY
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (crop) modusLogDate[crop.id] = formatted;
  renderModus();
}

function modusClearDate() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (crop) modusLogDate[crop.id] = '';
  renderModus();
}

function startModus(type, cropId) {
  const crop = crops.find(c => c.id === cropId);
  if (crop) {
    const existingLog = type === 'saa' ? crop.sowLog : crop.plantLog;
    const logType = type === 'saa' ? 'sådatoer' : 'plantedatoer';
    if (existingLog) {
      if (!confirm(`Du har allerede lagt inn en eller flere ${logType} (${existingLog}). Vil du legge inn en til?`)) return;
    }
  }
  modusType  = type;
  modusCrops = [cropId];
  modusIndex = 0;
  modusLogDate  = {};
  modusMainDate = {};
  modusNotes    = {};
  const pool = type === 'saa' ? SITATER_SAA : SITATER_PLANT;
  modusSitat = pool[Math.floor(Math.random() * pool.length)];
  renderModus();
  document.getElementById('modal-modus').style.display = 'flex';
}

function renderModus() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (!crop) return;
  const isSaa = modusType === 'saa';
  const title = isSaa ? '&#127807; Såguide' : '&#9978;&#65039; Planteguide';
  const accentColor = isSaa ? '#60a5fa' : '#34d399';
  const accentBg    = isSaa ? 'rgba(96,165,250,0.12)' : 'rgba(52,211,153,0.12)';
  const accentBorder= isSaa ? 'rgba(96,165,250,0.35)' : 'rgba(52,211,153,0.35)';
  const logDateVal = modusLogDate[crop.id] || '';
  const logDateDisplay = logDateVal || 'Velg dato 📅';

  // Use persisted quote (set once in startModus)
  const sitat = modusSitat;

  // Title first, then quote centred below
  const header = '<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px">'+title+'</div>'
    +'<div style="text-align:center;margin-bottom:22px;padding:0 4px">'
    +'<div style="font-size:17px;color:var(--text-head);line-height:1.7;font-style:italic">«'+sitat.tekst+'»</div>'
    +'<div style="font-size:13px;color:var(--text-muted);margin-top:8px">— '+sitat.kilde+'</div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:14px;border-radius:12px;background:'+accentBg+';border:1px solid '+accentBorder+'">'
    +'<span style="font-size:40px">'+crop.emoji+'</span>'
    +'<div><div style="font-size:20px;color:var(--text-head);font-weight:400">'+crop.name+'</div>'
    +(crop.family ? '<div style="font-size:12px;color:var(--text-muted);margin-top:2px">'+crop.family+'</div>' : '')
    +'</div></div>';

  // Log date row
  const logLabel = isSaa ? 'Logg sådato' : 'Logg plantedato';
  const logSection = '<div style="margin-bottom:18px">'
    +'<div style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">'+logLabel+'</div>'
    +'<button type="button" id="modus-date-btn" onclick="openModusDatePicker()" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg-card);color:'+(logDateVal?'#d1fae5':'#6b7280')+';cursor:pointer;font-size:14px;font-family:inherit;text-align:left">'+logDateDisplay+'</button>'
    +'<input type="hidden" id="modus-date-val" value="'+logDateVal+'">'
    +'</div>';

  let details = '';
  if (isSaa) {
    const plants = calcPlants(crop);
    const sownDateVal = crop.sownDate || '–';
    const infoCell = (label, val) =>
      '<div style="padding:12px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border)">'
      +'<div style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px">'+label+'</div>'
      +'<div style="font-size:16px;color:var(--text-head)">'+val+'</div>'
      +'</div>';
    details = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
      +infoCell('Antall planter', '<span style="font-size:26px;font-weight:300">'+plants+'</span>')
      +infoCell('Sådato', sownDateVal)
      +(crop.seedsPerCluster && crop.seedsPerCluster > 1 ? infoCell('Frø per klynge', '<span style="font-size:26px;font-weight:300">'+crop.seedsPerCluster+'</span>') : '')
      +'</div>';
    details += '<div style="margin-bottom:14px">'
      +'<div style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">Notater</div>'
      +'<textarea id="modus-notes" onchange="modusNotesChanged()" oninput="modusNotesChanged()" rows="2" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-head);font-size:12px;font-family:inherit;resize:vertical;line-height:1.5">'+escapeHtml(modusNotes[crop.id] !== undefined ? modusNotes[crop.id] : (crop.notes||''))+'</textarea>'
      +'</div>';
    details += logSection;
  } else {
    const gang = calcGang(crop);
    const gangStr = gang !== null ? gang+' cm' : '–';
    const plantedDateVal = crop.plantedDate || '–';
    details = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
      +[
        ['Senger', crop.beds.join(', ')],
        ['Plantedato', plantedDateVal],
        ['Radavstand', (crop.rowSpacing||'–')+' cm'],
        ['Planteavstand', (crop.plantSpacing||'–')+' cm'],
        ['Gangavstand', gangStr],
        ['Antall planter', calcPlants(crop)],
        ['Rader', crop.rows],
      ].map(([label, val]) =>
        '<div style="padding:12px;border-radius:12px;background:var(--bg-card);border:1px solid var(--border)">'
        +'<div style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px">'+label+'</div>'
        +'<div style="font-size:16px;color:var(--text-head)">'+val+'</div>'

      +'</div>';
    details += '<div style="margin-bottom:14px">'
      +'<div style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">Notater</div>'
      +'<textarea id="modus-notes" onchange="modusNotesChanged()" oninput="modusNotesChanged()" rows="2" style="width:100%;padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-head);font-size:12px;font-family:inherit;resize:vertical;line-height:1.5">'+escapeHtml(modusNotes[crop.id] !== undefined ? modusNotes[crop.id] : (crop.notes||''))+'</textarea>'
      +'</div>';
    details += logSection;
  }

  const finishLabel = isSaa ? '✓ Ferdig' : '✓ Ferdig';
  const actions = '<div style="display:flex;gap:10px">'
    +'<button onclick="modusLogAndNext()" style="flex:1;padding:13px;border-radius:12px;border:1px solid '+accentBorder+';background:'+accentBg+';color:'+accentColor+';cursor:pointer;font-size:14px;font-family:inherit;font-weight:600">'+finishLabel+'</button>'
    +'</div>'
    +'<button onclick="closeModal(\'modal-modus\')" style="margin-top:10px;width:100%;padding:10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit">Avbryt</button>';

  document.getElementById('modal-modus-inner').innerHTML = header + details + actions;
}

function openModusDatePicker() {
  openCal('modus-date-btn', 'modus-date-val');
}

function openModusMainDatePicker() {
  openCal('modus-main-btn', 'modus-main-val');
}

function modusNotesChanged() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  const el = document.getElementById('modus-notes');
  if (crop && el) modusNotes[crop.id] = el.value;
}

function escapeHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function modusLogAndNext() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (crop) {
    // Read current textarea value before saving
    const notesEl = document.getElementById('modus-notes');
    if (notesEl) modusNotes[crop.id] = notesEl.value;

    const logDate = modusLogDate[crop.id] || '';
    const notes   = modusNotes[crop.id] !== undefined ? modusNotes[crop.id] : null;

    snapshot();
    if (modusType === 'saa') {
      if (notes !== null) crop.notes = notes;
      crop.sowLog = logDate;
      if (logDate) crop.status = 'sådd';
    } else {
      if (notes !== null) crop.notes = notes;
      crop.plantLog = logDate;
      if (logDate) crop.status = 'plantet';
    }
  }
  if (modusIndex < modusCrops.length - 1) {
    modusIndex++;
    renderModus();
  } else {
    closeModal('modal-modus');
    render();
    // Show "Godt jobbet!" feedback
    showModusFeedback();
  }
}

function showModusFeedback() {
  // Collect all logged dates and planned dates from this session
  const logDates   = Object.values(modusLogDate).filter(Boolean);
  const isSaa      = modusType === 'saa';

  // Build feedback based on dates
  let feedbackMsg = '';
  let earliest = null;
  if (logDates.length > 0) {
    modusCrops.forEach(id => {
      const crop = crops.find(c => c.id === id);
      const logDate = modusLogDate[id];
      if (!crop || !logDate) return;
      const planned = parseToDate(isSaa ? crop.sownDate : crop.plantedDate);
      const logged  = parseToDate(logDate);
      if (!planned || !logged) return;
      const diffDays = Math.round((logged - planned) / 86400000);
      let tier = diffDays < 0 ? 'early' : diffDays <= 7 ? 'ontime' : 'late';
      // Use worst (most generous feedback for 'early', strictest for 'late')
      if (!earliest) earliest = tier;
      else if (tier === 'late') earliest = 'late';
      else if (tier === 'early' && earliest !== 'late') earliest = 'early';
    });
    if (earliest === 'early')  feedbackMsg = '«Fattig blir den som er lat i sitt arbeid, men flittige hender gjør rik» [Ordspråkene 10,4]';
    else if (earliest === 'ontime') feedbackMsg = '«Alt er timet og tilrettelagt» [Egon Olsen]';
    else if (earliest === 'late')   feedbackMsg = '«Herren er tålmodig, og for ham er tusen år som én dag. Han er ikke sen med å oppfylle løfter, men gir tid» [2. Peter 3,8-9]';
  }

  const accentColor = isSaa ? '#60a5fa' : '#34d399';
  const accentBg    = isSaa ? 'rgba(96,165,250,0.1)' : 'rgba(52,211,153,0.1)';
  const accentBorder= isSaa ? 'rgba(96,165,250,0.3)' : 'rgba(52,211,153,0.3)';

  const feedbackIntro = !feedbackMsg ? 'Godt jobbet!'
    : earliest === 'early'  ? 'Jøss, tidlig ute!'
    : earliest === 'ontime' ? 'Perfekt! Nå er det bare en ting å si'
    : 'Null stress! Husk på at...';

  document.getElementById('modal-modus-inner').innerHTML =
    '<div style="text-align:center;padding:20px 0">'
    +'<div style="font-size:52px;margin-bottom:16px">'+(isSaa?'🌱':'🪴')+'</div>'
    +'<div style="font-size:22px;color:var(--text-head);margin-bottom:10px">'+feedbackIntro+'</div>'
    +(feedbackMsg ? '<div style="font-size:14px;color:'+accentColor+';margin-bottom:24px;line-height:1.6;font-style:italic">'+feedbackMsg+'</div>' : '<div style="margin-bottom:24px"></div>')
    +'<button onclick="closeModal(\'modal-modus\')" style="padding:13px 32px;border-radius:12px;border:1px solid '+accentBorder+';background:'+accentBg+';color:'+accentColor+';cursor:pointer;font-size:14px;font-family:inherit;font-weight:600">Lukk</button>'
    +'</div>';
  document.getElementById('modal-modus').style.display = 'flex';
}

function modusStep(dir) {
  modusIndex = Math.max(0, Math.min(modusCrops.length-1, modusIndex + dir));
  renderModus();
}

  document.getElementById(id).style.display='none';

/* ---- EXCEL IMPORT ---- */
let pendingImport = null;

function parseImportDate(val) {
  if (!val && val !== 0) return '';
  // Excel serial date number (e.g. 46068) — convert to DD-MM-YYYY
  if (typeof val === 'number') {
    const date = XLSX.SSF.parse_date_code(val);
    if (date) {
      const dd = String(date.d).padStart(2,'0');
      const mm = String(date.m).padStart(2,'0');
      return `${dd}-${mm}-${date.y}`;
    }
  }
  const s = String(val).trim();
  // Accept DD.MM.YYYY, DD-MM-YYYY, or DD/MM/YYYY
  const m = s.match(/^(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{4})$/);
  if (m) return `${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}-${m[3]}`;
  return s;
}

function parseStatus(label) {
  const map = {
    'Planlagt':'planlagt','Sådd':'sådd',
    'Spiret':'plantet','Plantet':'plantet',
    'I vekst':'i_produksjon','I produksjon':'i_produksjon',
    'Høstet':'høstet'
  };
  return map[label] || 'planlagt';
}

function parsePriority(label) {
  const map = {'Høy':'høy','Middels':'middels','Lav':'lav'};
  return map[label] || 'middels';
}

function importFromExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  importFileObject(file);
}

function saveToLocal() {
  try {
    const data = {
      crops,
      tasks: tasks.filter(t => !String(t.id).startsWith('crop-')),
      bedSizes,
      bedIDs: BED_IDS,
      gardenMap: gardenMap || null,
      saved: new Date().toISOString(),
    };
    localStorage.setItem('mh_data', JSON.stringify(data));
    localStorage.setItem('mh_task_order', JSON.stringify(taskOrder));
    if (taskHistory.length) localStorage.setItem('mh_task_history', JSON.stringify(taskHistory));
    localStorage.setItem('mh_focus_tasks', JSON.stringify([...focusTaskIds]));
    if (gardenMap) localStorage.setItem('mh_garden_map', JSON.stringify(gardenMap));
  } catch(e) { console.warn('localStorage save failed:', e); }
}

function loadFromLocal() {
  try {
    const hr = localStorage.getItem('mh_task_history');
    if (hr) taskHistory = JSON.parse(hr);
  } catch(e) {}
  try {
    const raw = localStorage.getItem('mh_data');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.crops) crops = data.crops;
    if (data.tasks) tasks = data.tasks;
    if (data.bedSizes) bedSizes = data.bedSizes;
    if (data.bedIDs && data.bedIDs.length) BED_IDS = data.bedIDs;
    if (data.gardenMap) gardenMap = data.gardenMap;
    if (data.taskHistory) taskHistory = data.taskHistory;
    return true;
  } catch(e) { return false; }
}


function importFileObject(file, skipSave = false) {
  return new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });

      // ── Parse Vekster ──
      const wsV = wb.Sheets['Vekster'];
      const newCrops = [];
      if (wsV) {
        const rows = XLSX.utils.sheet_to_json(wsV, { header: 1 });
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r[0]) continue; // skip empty rows
          newCrops.push({
            id: Date.now() + i,
            name:         String(r[0] || ''),
            emoji:        String(r[1] || '🌱'),
            family:       String(r[2] || ''),
            status:       parseStatus(String(r[3] || '')),
            beds:         String(r[4] || '').split(',').map(s => s.trim()).filter(Boolean),
            rowSpacing:   parseFloat(r[5]) || 30,
            plantSpacing: parseFloat(r[6]) || 20,
            rows:         parseInt(r[7])   || 2,
            seedsPerCluster: parseInt(r[8]) || 1,
            // col 9 = antall planter (calculated), col 10 = estimert verdi (calculated), skip both
            sownDate:     parseImportDate(r[13]),
            sowLog:       parseImportDate(r[14]),
            plantedDate:  parseImportDate(r[15]),
            plantLog:     parseImportDate(r[16]),
            notes:        String(r[17] || ''),
            pricePerKg:   parseFloat(r[11]) || 0,
            weightG:      parseFloat(r[12]) || 0,
          });
        }
      }

      // ── Parse Senger (sizes + crop assignments) ──
      const wsS = wb.Sheets['Senger'];
      const newBedSizes = {};
      const newBedIDs = [];
      const bedToCropName = {}; // bedId -> crop name from Senger sheet
      if (wsS) {
        const rows = XLSX.utils.sheet_to_json(wsS, { header: 1 });
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const bedId = String(r[0] || '').trim();
          if (!bedId) continue;
          newBedIDs.push(bedId);
          newBedSizes[bedId] = {
            length: parseFloat(r[1]) || 11,
            width:  parseFloat(r[2]) || 1.2,
          };
          if (r[4]) bedToCropName[bedId] = String(r[4]).trim();
        }
      }
      // Fall back to default beds if sheet was empty
      if (newBedIDs.length === 0) {
        BED_IDS.forEach(id => { newBedIDs.push(id); newBedSizes[id] = { length: 11, width: 1.2 }; });
      }

      // Assign beds to crops: if a crop has no beds from Vekster col 4,
      // collect all beds from Senger that name this crop
      const cropNameToBeds = {};
      Object.entries(bedToCropName).forEach(([bedId, cropName]) => {
        if (!cropNameToBeds[cropName]) cropNameToBeds[cropName] = [];
        cropNameToBeds[cropName].push(bedId);
      });
      newCrops.forEach(c => {
        if (c.beds.length === 0 && cropNameToBeds[c.name]) {
          c.beds = cropNameToBeds[c.name];
        }
      });

      // ── Parse Oppgaver ──
      const wsO = wb.Sheets['Oppgaver'];
      const newTasks = [];
      if (wsO) {
        const rows = XLSX.utils.sheet_to_json(wsO, { header: 1 });
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r[0]) continue;
          newTasks.push({
            id:       Date.now() + 1000 + i,
            text:     String(r[0] || ''),
            date:     parseImportDate(r[1]),
            priority: parsePriority(String(r[2] || '')),
            done:     String(r[3] || '').toLowerCase() === 'ja',
          });
        }
      }

      pendingImport = { crops: newCrops, bedSizes: newBedSizes, bedIDs: newBedIDs, tasks: newTasks };
      confirmImport(skipSave);
      resolve();
    } catch(err) {
      alert('Kunne ikke lese filen. Kontroller at det er en gyldig Excel-eksport fra denne appen.');
      console.error(err);
      resolve();
    }
  };
  reader.readAsArrayBuffer(file);
  });
}

function confirmImport(skipSave = false) {
  if (!pendingImport) return;
  snapshot(true);
  crops    = pendingImport.crops;
  bedSizes = pendingImport.bedSizes;
  BED_IDS  = pendingImport.bedIDs;
  tasks    = pendingImport.tasks;
  pendingImport = null;
  selectedBed = null;
  saveToLocal(); // always save — data is now correct regardless of source
  closeModal('modal-import');
  render();
}

/* ---- EXCEL EXPORT ---- */
function fmtDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '.');
}

function buildWorkbook() {
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Vekster ──────────────────────────────────────────
  const cropHeaders = [
    'Navn', 'Emoji', 'Sort', 'Status', 'Senger',
    'Radavstand (cm)', 'Planteavstand (cm)', 'Rader', 'Frø per klynge',
    'Antall planter totalt', 'Estimert verdi (kr)',
    'Pris pr/kg (kr)', 'Vekt per enhet (g)',
    'Sådato', 'Sålogg (dato)', 'Plantedato', 'Plantelogg (dato)', 'Notater'
  ];
  const cropRows = crops.map(c => [
    c.name, c.emoji, c.family,
    STATUS[c.status]?.label || c.status,
    c.beds.join(', '),
    c.rowSpacing, c.plantSpacing, c.rows, c.seedsPerCluster || 1,
    calcPlants(c),
    calcValue(c) !== null ? calcValue(c) : '',
    c.pricePerKg || '', c.weightG || '',
    fmtDate(c.sownDate), fmtDate(c.sowLog), fmtDate(c.plantedDate), fmtDate(c.plantLog), c.notes
  ]);
  const wsVekster = XLSX.utils.aoa_to_sheet([cropHeaders, ...cropRows]);
  wsVekster['!cols'] = [
    {wch:18},{wch:7},{wch:16},{wch:14},{wch:12},
    {wch:16},{wch:18},{wch:8},{wch:16},{wch:20},{wch:20},
    {wch:14},{wch:16},
    {wch:14},{wch:16},{wch:14},{wch:18},{wch:30}
  ];
  styleHeaderRow(wsVekster, cropHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsVekster, 'Vekster');

  // ── Sheet 2: Senger ───────────────────────────────────────────
  const bedHeaders = [
    'Seng', 'Lengde (m)', 'Bredde (m)', 'Areal (m²)',
    'Vekst', 'Status', 'Antall planter', 'Sådato', 'Plantedato'
  ];
  const bedRows = BED_IDS.map(id => {
    const bs = bedSizes[id];
    const crop = getBedCrop(id);
    return [
      id,
      bs.length, bs.width,
      +(bs.length * bs.width).toFixed(2),
      crop ? crop.name : '–',
      crop ? (STATUS[crop.status]?.label || crop.status) : '–',
      crop ? calcPlants({...crop, beds:[id]}) : 0,
      crop ? fmtDate(crop.sownDate) : '–',
      crop ? fmtDate(crop.plantedDate) : '–',
    ];
  });
  const wsSenger = XLSX.utils.aoa_to_sheet([bedHeaders, ...bedRows]);
  wsSenger['!cols'] = [
    {wch:8},{wch:12},{wch:12},{wch:12},
    {wch:18},{wch:12},{wch:16},{wch:14},{wch:14}
  ];
  styleHeaderRow(wsSenger, bedHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsSenger, 'Senger');

  // ── Sheet 3: Oppgaver ─────────────────────────────────────────
  const taskHeaders = ['Oppgave', 'Dato', 'Prioritet', 'Ferdig'];
  const taskRows = tasks.map(t => [
    t.text, fmtDate(t.date),
    t.priority.charAt(0).toUpperCase() + t.priority.slice(1),
    t.done ? 'Ja' : 'Nei'
  ]);
  const wsOppgaver = XLSX.utils.aoa_to_sheet([taskHeaders, ...taskRows]);
  wsOppgaver['!cols'] = [{wch:40},{wch:14},{wch:12},{wch:8}];
  styleHeaderRow(wsOppgaver, taskHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsOppgaver, 'Oppgaver');

  // ── Download ──────────────────────────────────────────────────
  const date = new Date();
  const dateStr = `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`;
  return wb;
}

function exportToExcel() {
  const wb = buildWorkbook();
  const date = new Date();
  const dateStr = `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`;
  XLSX.writeFile(wb, `Markedshage_${dateStr}.xlsx`);
}

function styleHeaderRow(ws, numCols) {
  // Style header cells with green background
  for (let col = 0; col < numCols; col++) {
    const cellRef = XLSX.utils.encode_cell({r:0, c:col});
    if (!ws[cellRef]) continue;
    ws[cellRef].s = {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { fgColor: { rgb: '1A5C2E' } },
      alignment: { horizontal: 'left' }
    };
  }
}
