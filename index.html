// ══════════════════════════════════════════════════════════════
const JSONBIN_API = 'https://api.jsonbin.io/v3/b';

let syncKey       = null;  // JSONBin Master Key
let syncBinId     = null;  // JSONBin Bin ID
let syncConnected = false;
let syncTimer     = null;

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme();
  try { localStorage.setItem('mh_theme', currentTheme); } catch(e) {}
}

function applyTheme() {
  document.body.classList.toggle('light', currentTheme === 'light');
  const btn = document.getElementById('theme-menu-btn');
  if (btn) btn.textContent = currentTheme === 'dark' ? '☀ Lyst tema' : '🌙 Mørkt tema';
  renderSyncBtn(); // re-render sync button color
}

function initSync() {
  const DEFAULT_KEY = '$2a$10$H3ZyijeCyakGbK9kSCv3U.NqxD/DZNaug3LPpodQYWWiAF270R3oq';
  const DEFAULT_BIN = '69b17723c3097a1dd517e7da';
  try {
    syncKey   = localStorage.getItem('mh_sync_key') || DEFAULT_KEY;
    syncBinId = localStorage.getItem('mh_sync_id')  || DEFAULT_BIN;
    // Save defaults to localStorage so they persist
    if (!localStorage.getItem('mh_sync_key')) localStorage.setItem('mh_sync_key', DEFAULT_KEY);
    if (!localStorage.getItem('mh_sync_id'))  localStorage.setItem('mh_sync_id',  DEFAULT_BIN);
    syncConnected = true;
  } catch(e) {
    syncKey = DEFAULT_KEY; syncBinId = DEFAULT_BIN; syncConnected = true;
  }
  renderSyncBtn();
  syncLoadOnStart();
  startSyncPolling();
}

function renderSyncBtn() {
  const btn = document.getElementById('gist-btn');
  if (!btn) return;
  btn.style.color = syncConnected ? (document.body.classList.contains('light') ? '#5a8a4a' : '#34d399') : '#6b7280';
  btn.title = syncConnected ? 'JSONBin synkronisering – tilkoblet' : 'Koble til synkronisering';
}

// Called when user enters API key
function gistSetup() {
  // Remove any existing modal
  document.getElementById('sync-modal')?.remove();

  const modal = document.createElement('div');
  modal.id = 'sync-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px';

  modal.innerHTML = `
    <div style="background:var(--bg-modal);border:1px solid var(--border-accent);border-radius:16px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.8)">
      <h2 style="font-size:16px;color:var(--accent-soft);margin-bottom:16px;font-weight:400">☁ JSONBin synkronisering</h2>

      <label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px">
        Master Key
        <a href="https://jsonbin.io" target="_blank" style="color:#60a5fa;margin-left:8px;font-size:12px">Hent fra jsonbin.io →</a>
      </label>
      <input id="sync-modal-key" type="text" placeholder="$2b$10$..." value="${syncKey||''}"
        style="width:100%;padding:10px 12px;background:var(--bg-main);border:1px solid var(--border);border-radius:8px;color:var(--text-main);font-size:13px;font-family:monospace;margin-bottom:16px;outline:none">

      <label style="display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px">
        Bin ID <span style="color:var(--text-muted);font-size:12px">(la stå tomt for å opprette ny)</span>
      </label>
      <input id="sync-modal-bin" type="text" placeholder="69b16698c3097a1dd517a6bf" value="${syncBinId||''}"
        style="width:100%;padding:10px 12px;background:var(--bg-main);border:1px solid var(--border);border-radius:8px;color:var(--text-main);font-size:13px;font-family:monospace;margin-bottom:8px;outline:none">
      <p style="font-size:12px;color:var(--text-muted);margin-bottom:20px">
        Finn Bin ID i ☁-menyen på en annen enhet, eller på jsonbin.io under Bins.
      </p>

      <div style="display:flex;gap:10px">
        <button id="sync-modal-cancel" style="flex:1;padding:11px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px">Avbryt</button>
        <button id="sync-modal-save" style="flex:2;padding:11px;border-radius:8px;border:none;background:#16a34a;color:white;cursor:pointer;font-size:14px;font-weight:500">Lagre</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  document.getElementById('sync-modal-key').focus();

  document.getElementById('sync-modal-cancel').onclick = () => modal.remove();
  modal.onclick = (e) => { if (e.target === modal) modal.remove(); };

  document.getElementById('sync-modal-save').onclick = () => {
    const newKey = document.getElementById('sync-modal-key').value.trim();
    const newBin = document.getElementById('sync-modal-bin').value.trim();
    if (!newKey) { alert('API-nøkkel er påkrevd'); return; }

    const keyChanged = newKey !== syncKey;
    const binChanged = newBin !== syncBinId;

    syncKey = newKey;
    syncConnected = true;
    try { localStorage.setItem('mh_sync_key', syncKey); } catch(e) {}

    if (newBin) {
      syncBinId = newBin;
      try { localStorage.setItem('mh_sync_id', syncBinId); } catch(e) {}
      if (keyChanged || binChanged) {
        try { localStorage.removeItem('mh_data'); } catch(e) {}
      }
    } else if (keyChanged) {
      syncBinId = null;
      try { localStorage.removeItem('mh_sync_id'); localStorage.removeItem('mh_data'); } catch(e) {}
    }

    modal.remove();
    renderSyncBtn();
    syncLoadOnStart();
    startSyncPolling();
  };
}

// On startup: load from JSONBin if no local data
async function syncLoadOnStart() {
  try {
    if (!syncBinId) {
      await syncSave();
      return;
    }

    // Fetch remote data
    const resp = await fetch(`${JSONBIN_API}/${syncBinId}/latest?t=${Date.now()}`, {
      headers: { 'X-Master-Key': syncKey, 'X-Bin-Meta': 'false', 'Cache-Control': 'no-store' }, cache: 'no-store'
    });
    if (!resp.ok) return;
    const remote = await resp.json();
    if (!remote || !remote.crops) return;

    // Check local timestamp
    let localSaved = null;
    try {
      const raw = localStorage.getItem('mh_data');
      if (raw) localSaved = JSON.parse(raw).saved || null;
    } catch(e) {}

    const remoteSaved = remote.saved || null;

    // Load remote if: no local data, no local timestamp, or remote is newer
    const hasNoLocal = !localStorage.getItem('mh_data');
    const remoteIsNewer = !localSaved || (remoteSaved && new Date(remoteSaved) > new Date(localSaved));

    if (hasNoLocal || remoteIsNewer) {
      if (remote.crops)   crops    = remote.crops;
      if (remote.tasks)   tasks    = remote.tasks;
      if (remote.bedSizes) bedSizes = remote.bedSizes;
      if (remote.bedIDs && remote.bedIDs.length) BED_IDS = remote.bedIDs;
      if (remote.gardenMap) gardenMap = remote.gardenMap;
      if (remote.taskHistory) taskHistory = remote.taskHistory;
      saveToLocal();
      clearTimeout(syncTimer); syncTimer = null;
      render();
    }
  } catch(e) {
    console.warn('syncLoadOnStart error:', e);
  }
}

// Load data from JSONBin and import it
async function syncLoad(silent = false) {
  if (!syncKey || !syncBinId) return false;
  try {
    const resp = await fetch(`${JSONBIN_API}/${syncBinId}/latest?t=${Date.now()}`, {
      headers: { 'X-Master-Key': syncKey, 'X-Bin-Meta': 'false', 'Cache-Control': 'no-store' }, cache: 'no-store'
    });
    if (!resp.ok) {
      console.warn('JSONBin read failed:', resp.status, await resp.text());
      if (!silent) showSyncToast('⚠ Kunne ikke laste fra JSONBin');
      return false;
    }
    const data = await resp.json();
    if (!data || !data.crops) {
            return false;
    }
    // Load data directly — no Excel parsing needed
    if (data.crops)   crops    = data.crops;
    if (data.tasks)   tasks    = data.tasks;
    if (data.bedSizes) bedSizes = data.bedSizes;
    if (data.bedIDs && data.bedIDs.length) BED_IDS = data.bedIDs;
    if (data.gardenMap) gardenMap = data.gardenMap;
    if (data.taskHistory) taskHistory = data.taskHistory;
    saveToLocal();
    clearTimeout(syncTimer); syncTimer = null;
    render();
    if (!silent)     return true;
  } catch(e) {
    console.warn('syncLoad error:', e);
    if (!silent) showSyncToast('⚠ Feil ved innlasting');
    return false;
  }
}

// Save current state to JSONBin
async function syncSave() {
  if (!syncKey) return;
  const payload = {
    crops,
    tasks: tasks.filter(t => !String(t.id).startsWith('crop-')),
    bedSizes,
    bedIDs: BED_IDS,
    gardenMap: gardenMap || null,
    taskHistory: taskHistory || [],
    saved: new Date().toISOString()
  };
  const payloadStr = JSON.stringify(payload);
  console.log('Sync payload size:', (payloadStr.length / 1024).toFixed(1), 'KB');
  console.log('Crops:', crops.length, 'Tasks:', tasks.length);
  try {
    let resp;
    if (syncBinId) {
      resp = await fetch(`${JSONBIN_API}/${syncBinId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': syncKey },
        body: payloadStr
      });
    } else {
      resp = await fetch(JSONBIN_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': syncKey, 'X-Bin-Name': 'markedshage-data' },
        body: payloadStr
      });
      if (resp.ok) {
        const result = await resp.json();
        syncBinId = result?.metadata?.id;
        if (syncBinId) try { localStorage.setItem('mh_sync_id', syncBinId); } catch(e) {}
      }
    }
    if (resp && resp.ok) {
      syncTimer = null;
      const btn = document.getElementById('gist-btn');
      if (btn) { btn.style.color = '#34d399'; btn.title = 'JSONBin synkronisering – tilkoblet'; }
          } else {
      const errText = resp ? await resp.text() : 'ingen respons';
      console.error('JSONBin save failed:', resp?.status, errText);
      showSyncToast('⚠ Lagring feilet');
    }
  } catch(e) {
    console.warn('syncSave error:', e);
    showSyncToast('⚠ Lagring feilet');
  }
}

// Schedule save with debounce
function scheduleSync() {
  if (!syncConnected) return;
  saveToLocal();
  clearTimeout(syncTimer);
  const btn = document.getElementById('gist-btn');
  if (btn) { btn.style.color = '#fbbf24'; btn.title = 'Ulagrede endringer – lagrer snart...'; }
  syncTimer = setTimeout(syncSave, 3000);
}

// Save immediately if user closes tab with pending changes
window.addEventListener('beforeunload', () => {
  if (syncConnected && syncTimer) {
    clearTimeout(syncTimer);
    syncSave();
  }
});

// Auto-sync: load from JSONBin when user returns to app
let syncPollTimer = null;
function startSyncPolling() {
  clearInterval(syncPollTimer);
  syncPollTimer = setInterval(() => {
    if (syncConnected && document.visibilityState === 'visible') {
      syncLoadOnStart();
    }
  }, 5 * 60 * 1000); // every 5 minutes
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && syncConnected) {
    syncLoadOnStart();
  }
});

// Dropdown menu
function gistShowMenu() {
  let menu = document.getElementById('gist-menu');
  if (menu) { menu.remove(); return; }
  menu = document.createElement('div');
  menu.id = 'gist-menu';
  menu.style.cssText = 'position:fixed;background:var(--bg-modal);border:1px solid var(--border);border-radius:12px;padding:6px;min-width:210px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.5)';

  const items = [
    { label: '⬇ Last inn fra JSONBin', fn: () => { syncLoad(false); menu.remove(); } },
    { label: '⬆ Lagre til JSONBin',   fn: () => { syncSave(); menu.remove(); } },
    { sep: true },
    { label: '🔍 Debug synk', fn: async () => {
        menu.remove();
        const resp = await fetch(`${JSONBIN_API}/${syncBinId}/latest?t=${Date.now()}`, {headers:{'X-Master-Key':syncKey,'X-Bin-Meta':'false','Cache-Control':'no-store'},cache:'no-store'});
        const d = await resp.json();
        const localRaw = localStorage.getItem('mh_data');
        const localSaved = localRaw ? JSON.parse(localRaw).saved : 'ingen';
        alert(`LOKAL:\n  Vekster: ${crops.length}\n  Lagret: ${localSaved}\n\nJSONBIN:\n  Vekster: ${d?.crops?.length ?? '?'}\n  Lagret: ${d?.saved ?? '?'}`);
      }},
    { sep: true },
    { label: '🔑 Endre API-nøkkel',    fn: () => { gistSetup(); menu.remove(); } },
    { label: '🔓 Koble fra',           fn: () => { syncDisconnect(); menu.remove(); }, color: '#f87171' },
  ];

  items.forEach(item => {
    if (item.sep) {
      const div = document.createElement('div');
      div.style.cssText = 'height:1px;background:rgba(255,255,255,0.08);margin:4px 0';
      menu.appendChild(div);
      return;
    }
    const btn = document.createElement('button');
    btn.textContent = item.label;
    btn.style.cssText = `display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:${item.color||'#60a5fa'};cursor:pointer;font-size:13px;font-family:inherit;text-align:left`;
    btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.06)';
    btn.onmouseout  = () => btn.style.background = 'transparent';
    btn.onclick = item.fn;
    menu.appendChild(btn);
  });

  document.body.appendChild(menu);
  const gistBtn = document.getElementById('gist-btn');
  const rect = gistBtn.getBoundingClientRect();
  menu.style.top   = (rect.bottom + 4) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';
}

function syncDisconnect() {
  syncKey = null; syncBinId = null; syncConnected = false;
  try {
    localStorage.removeItem('mh_sync_key');
    localStorage.removeItem('mh_sync_id');
  } catch(e) {}
  renderSyncBtn();
  }

function showSyncToast(msg) {
  let t = document.getElementById('sync-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'sync-toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--bg-modal);border:1px solid var(--border-accent);border-radius:20px;padding:8px 16px;font-size:12px;color:var(--accent-soft);z-index:9999;pointer-events:none;transition:opacity 0.3s;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// Aliases for old internal references
function initGist() { initSync(); }
function scheduleGistSave() { scheduleSync(); }

// Init
loadFromLocal();
snapshot(true);
showTab(currentTab);

applyTheme();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW:', e));
  });
}
