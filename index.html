// ── Høst ─────────────────────────────────────────────────────────
function renderLevOversikt(el) {
  const isLight = document.body.classList.contains('light');
  const MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  const today = new Date().toISOString().split('T')[0];
  const thisYear = new Date().getFullYear();
  const thisMonth = new Date().getMonth();

  // ── Beregn statistikk ──
  const totalValue = harvestLog.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);
  const thisWeekKey = (() => { const d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d.toISOString().split('T')[0]; })();
  const weekEnd = (() => { const d=new Date(thisWeekKey); d.setDate(d.getDate()+6); return d.toISOString().split('T')[0]; })();
  const weekEntries = harvestLog.filter(h => h.date >= thisWeekKey && h.date <= weekEnd);
  const weekValue = weekEntries.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);
  const monthEntries = harvestLog.filter(h => { if (!h.date) return false; const [y,m] = h.date.split('-'); return +y===thisYear && +m-1===thisMonth; });
  const monthValue = monthEntries.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);

  // Kasse-leveringer: count box weeks with count > 0
  const levBoxes = boxWeeks.reduce((s,bw) => s + (bw.count||0), 0);
  // Marked: count all market items with qty
  const levMarked = deliveryMarket.reduce((s,m) => s + (m.items||[]).filter(i=>i.qty>0).length, 0);

  // Per vekst totals
  const byCrop = {};
  harvestLog.forEach(h => {
    if (!byCrop[h.cropId]) byCrop[h.cropId] = { qty: {}, value: 0 };
    if (!byCrop[h.cropId].qty[h.unit]) byCrop[h.cropId].qty[h.unit] = 0;
    byCrop[h.cropId].qty[h.unit] += h.qty;
    byCrop[h.cropId].value += calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit);
  });
  const topCrops = Object.entries(byCrop).sort(([,a],[,b]) => b.value - a.value).slice(0, 5);

  // Dest breakdown
  const byDest = {};
  harvestLog.forEach(h => {
    const d = h.dest || 'annet';
    if (!byDest[d]) byDest[d] = 0;
    byDest[d] += calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit);
  });

  // Weekly trend (last 8 weeks)
  const weekTrend = [];
  for (let i = 7; i >= 0; i--) {
    const wStart = new Date(thisWeekKey); wStart.setDate(wStart.getDate() - i*7);
    const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate() + 6);
    const wS = wStart.toISOString().split('T')[0];
    const wE = wEnd.toISOString().split('T')[0];
    const wVal = harvestLog.filter(h => h.date >= wS && h.date <= wE)
      .reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);
    const wNum = getISOWeek(wStart);
    weekTrend.push({ week: wNum, value: wVal, isCurrent: i === 0 });
  }
  const maxTrend = Math.max(...weekTrend.map(w => w.value), 1);

  // ── Planlagte grønnsakskasser: kassepris × planlagte uker ──
  // When no customers: each planned week = max(1, extraBoxes for that week)
  const yr = new Date().getFullYear();
  const totalBoxesAllSeasons = boxTypes.reduce((total, bt) => {
    const weeks = getValidDeliveryWeeks(bt, yr);
    if (!weeks.length) return total;
    const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bt.id));
    if (btCu.length > 0) {
      return total + btCu.length * weeks.length;
    }
    // No customers — use extraBoxes per week or default 1
    return total + weeks.reduce((s, w) => {
      const bw = boxWeeks.find(b => String(b.boxTypeId) == String(bt.id) && +b.week === w && +b.year === yr);
      return s + Math.max(1, bw?.extraBoxes || 0);
    }, 0);
  }, 0);

  const plannedSaleValue = boxTypes.reduce((total, bt) => {
    if (!bt.salePrice) return total;
    const weeks = getValidDeliveryWeeks(bt, yr);
    if (!weeks.length) return total;
    const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bt.id));
    if (btCu.length > 0) {
      return total + btCu.length * weeks.length * bt.salePrice;
    }
    const boxCount = weeks.reduce((s, w) => {
      const bw = boxWeeks.find(b => String(b.boxTypeId) == String(bt.id) && +b.week === w && +b.year === yr);
      return s + Math.max(1, bw?.extraBoxes || 0);
    }, 0);
    return total + boxCount * bt.salePrice;
  }, 0);

  // Kasseprogresjon: avkrysset i Levering (deliveryCheck + extraCheck)
  const harvestedBoxes = boxWeeks.reduce((s, bw) => {
    const doneCu = Object.values(bw.deliveryCheck || {}).filter(v => v === true).length;
    const doneExtra = Object.values(bw.extraCheck || {}).filter(v => v === true).length;
    return s + doneCu + doneExtra;
  }, 0);

  // Grønnsaker høstet
  const loggedQty = harvestLog.reduce((s, h) => s + (h.qty || 0), 0);
  const plannedQty = crops.reduce((s, c) => s + calcPlants(c), 0);


  let html = '';

  // ── Stat cards ──
  const statCard = (icon, val, label, sublabel, color) =>
    '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px">'
    + '<div style="font-size:20px;margin-bottom:6px">' + icon + '</div>'
    + '<div style="font-size:26px;font-weight:300;line-height:1;color:' + color + '">' + val + '</div>'
    + '<div style="font-size:10px;color:var(--text-muted);margin-top:4px;letter-spacing:0.08em;text-transform:uppercase">' + label + '</div>'
    + (sublabel ? '<div style="font-size:11px;color:var(--text-dim);margin-top:3px">' + sublabel + '</div>' : '')
    + '</div>';

  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">'
    + statCard('💰', plannedSaleValue > 0 ? '~' + fmtKr(plannedSaleValue) : '–',
        'Planlagte grønnsakskasser',
        totalBoxesAllSeasons ? totalBoxesAllSeasons + ' kasser · sesongen' : 'Sett opp kunder og leveringsplan', '#d97706')
    + statCard('📦', harvestedBoxes + ' / ' + totalBoxesAllSeasons,
        'Kasseprogresjon',
        totalBoxesAllSeasons ? Math.round((harvestedBoxes / totalBoxesAllSeasons) * 100) + '% levert' : 'Sett opp leveringsplan', 'var(--accent-soft)')
    + statCard('💚', totalValue > 0 ? '~' + fmtKr(totalValue) : '–',
        'Gjennomførte salg',
        harvestLog.length ? harvestLog.length + ' registreringer' : 'Ingen logget ennå', '#f472b6')
    + statCard('🥬', Math.round(loggedQty) + ' / ' + plannedQty,
        'Grønnsaker høstet',
        plannedQty ? Math.round((loggedQty / plannedQty) * 100) + '% av planlagt' : 'Legg til vekster for å spore', '#34d399')
    + '</div>';

  if (!harvestLog.length) {
    html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center;color:var(--text-muted);font-size:13px;margin-bottom:14px">'
      + '🌱 Ingen høsting logget ennå.<br><span style="font-size:12px">Logg kasser og markeder for å se statistikk.</span>'
      + '</div>';
  }

  // ── Ukentlig trend ──
  // ── Ukentlig trend ──
  if (weekTrend.some(w => w.value > 0)) {

    html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px">'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:12px">Ukentlig trend</div>'
      + '<div style="display:flex;align-items:flex-end;gap:4px;height:56px">';
    weekTrend.forEach(w => {
      const h2 = Math.max(4, Math.round((w.value / maxTrend) * 52));
      html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">'
        + '<div style="width:100%;border-radius:3px 3px 0 0;height:' + h2 + 'px;'
        + 'background:' + (w.isCurrent ? 'var(--accent)' : (isLight ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.12)')) + '">'
        + '</div>'
        + '<div style="font-size:9px;color:' + (w.isCurrent ? 'var(--accent-soft)' : 'var(--text-dim)') + '">' + w.week + '</div>'
        + '</div>';
    });
    html += '</div></div>';
  }

  // ── Fordeling per destinasjon ──
  if (Object.keys(byDest).length) {
    const destLabels = { kasse: '📦 Kasse', marked: '🛒 Marked', annet: '📦 Annet' };
    html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px">'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Fordeling</div>';
    const destTotal = Object.values(byDest).reduce((s,v) => s+v, 0) || 1;
    Object.entries(byDest).sort(([,a],[,b]) => b-a).forEach(([dest, val]) => {
      const pct = Math.round((val / destTotal) * 100);
      html += '<div style="margin-bottom:8px">'
        + '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:3px">'
        + '<span>' + (destLabels[dest] || dest) + '</span>'
        + '<span style="color:var(--accent-soft)">kr ' + Math.round(val) + ' (' + pct + '%)</span>'
        + '</div>'
        + '<div style="height:5px;border-radius:3px;background:' + (isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)') + '">'
        + '<div style="height:100%;border-radius:3px;width:' + pct + '%;background:var(--accent);transition:width 0.3s"></div>'
        + '</div>'
        + '</div>';
    });
    html += '</div>';
  }

  // ── Topp vekster ──
  if (topCrops.length) {
    html += '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:14px">'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px">Mest høstet (verdi)</div>';
    topCrops.forEach(([cropId, data], i) => {
      const cr = crops.find(c => c.id == cropId);
      if (!cr) return;
      const qtyStr = Object.entries(data.qty).map(([u,q]) => q + ' ' + u).join(', ');
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid ' + (i < topCrops.length-1 ? 'var(--border)' : 'transparent') + '">'
        + '<span style="font-size:20px">' + cr.emoji + '</span>'
        + '<div style="flex:1">'
        + '<div style="font-size:13px;color:var(--text-head)">' + (cr.family||cr.name) + '</div>'
        + '<div style="font-size:11px;color:var(--text-muted)">' + qtyStr + '</div>'
        + '</div>'
        + '<div style="font-size:13px;color:var(--accent-soft)">kr ' + Math.round(data.value) + '</div>'
        + '</div>';
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

function renderLevHoestLogg(el) {
  const today = new Date().toISOString().split('T')[0];
  const MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];

  // Header with Ny registrering button
  let html = '<div style="display:flex;justify-content:flex-end;margin-bottom:14px">'
    + '<button onclick="openNyRegistrering()" style="padding:7px 16px;border-radius:20px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent-soft);cursor:pointer;font-size:12px;font-family:inherit">+ Ny registrering</button>'
    + '</div>';

  if (!harvestLog.length) {
    html += '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:30px 0">Ingen høsting registrert ennå.</p>';
    el.innerHTML = html;
    return;
  }

  // Totals
  const totalValue = harvestLog.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);
  html += '<div style="background:var(--accent-bg);border:1px solid var(--border-accent);border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">'
    + '<div style="font-size:12px;color:var(--text-muted)">' + harvestLog.length + ' registreringer</div>'
    + '<div style="font-size:18px;color:var(--accent-soft);font-weight:300">kr ' + totalValue.toFixed(0) + '</div>'
    + '</div>';

  // Per day - newest first
  const byDate = {};
  harvestLog.forEach(h => { if (!byDate[h.date]) byDate[h.date] = []; byDate[h.date].push(h); });

  Object.entries(byDate).sort(([a],[b]) => b.localeCompare(a)).forEach(([date, entries]) => {
    const [y,m,d] = date.split('-');
    const dayVal = entries.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);
    const isToday = date === today;
    html += '<div style="margin-bottom:14px">'
      + '<div style="font-size:12px;color:var(--text-muted);letter-spacing:0.05em;margin-bottom:6px;display:flex;justify-content:space-between">'
      + '<span style="color:' + (isToday?'var(--accent-soft)':'var(--text-muted)') + '">' + (isToday ? 'I dag · ' + (+d) + '. ' + MONTHS[+m-1] + ' ' + y : (+d) + '. ' + MONTHS[+m-1] + ' ' + y) + '</span>'
      + '<span style="color:var(--accent-soft)">kr ' + dayVal.toFixed(0) + '</span>'
      + '</div>';
    entries.forEach(h => {
      const cr = crops.find(c => c.id === h.cropId);
      html += '<div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:9px;margin-bottom:4px">'
        + '<span style="font-size:18px">' + (cr?.emoji||'🌱') + '</span>'
        + '<div style="flex:1">'
        + '<div style="font-size:13px;color:var(--text-head)">' + (cr?cr.family||cr.name:'') + '</div>'
        + '<div style="font-size:11px;color:var(--text-muted)">' + h.qty + ' ' + h.unit + (h.bedId?' · '+h.bedId:'') + (h.dest?' · '+h.dest:'') + (h.note?' · '+h.note:'') + '</div>'
        + '</div>'
        + '<span style="font-size:12px;color:var(--accent-soft)">kr ' + calcItemValue(cr,h.qty,h.unit).toFixed(0) + '</span>'
        + '</div>';
    });
    html += '</div>';
  });

  el.innerHTML = html;
}

        const cr = crops.find(c => c.id === h.cropId);
        return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
          <span style="font-size:18px">${cr?.emoji||'🌱'}</span>
          <div style="flex:1;font-size:13px;color:var(--text-head)">${cr?cr.family||cr.name:''} · ${h.qty} ${h.unit} · ${h.dest}</div>
          ${h.bedId ? `<span style="font-size:11px;color:var(--text-muted)">${h.bedId}</span>` : ''}
        </div>`;
      }).join('')}
    ` : ''}`;
}

function saveHarvest() {
  snapshotLev();
  const cropId = +document.getElementById('hoest-crop')?.value;
  const bedId  = document.getElementById('hoest-bed')?.value || null;
  const qty    = +document.getElementById('hoest-qty')?.value;
  const unit   = document.getElementById('hoest-unit')?.value;
  const dest   = document.getElementById('hoest-dest')?.value;
  const note   = document.getElementById('hoest-note')?.value.trim();
  if (!cropId || !qty) { alert('Velg vekst og mengde.'); return; }
  const today = new Date().toISOString().split('T')[0];
  harvestLog.unshift({id:Date.now(), date:today, cropId, bedId, qty, unit, dest, note});
  saveLevering();
  document.getElementById('ny-reg-modal')?.remove();
  const _rl=document.getElementById('lev-overlay-content')||document.getElementById('lev-tab-content'); if(_rl) { leveringTab='hoestlogg'; renderLeveringInto(_rl); };
}

// ── Logg ─────────────────────────────────────────────────────────
function renderLevLogg(el) {
  if (!harvestLog.length) {
    el.innerHTML = `<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:30px 0">Ingen høsting registrert ennå.</p>`;
    return;
  }

  // Group by date
  const byDate = {};
  harvestLog.forEach(h => { if (!byDate[h.date]) byDate[h.date] = []; byDate[h.date].push(h); });

  // Totals per crop
  const byCrop = {};
  harvestLog.forEach(h => {
    if (!byCrop[h.cropId]) byCrop[h.cropId] = {};
    if (!byCrop[h.cropId][h.unit]) byCrop[h.cropId][h.unit] = 0;
    byCrop[h.cropId][h.unit] += h.qty;
  });

  const totalValue = harvestLog.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);

  el.innerHTML = `
    <div style="background:var(--accent-bg);border:1px solid var(--border-accent);border-radius:12px;padding:14px;margin-bottom:16px">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px">Totaloversikt</div>
      <div style="font-size:20px;color:var(--accent-soft);font-weight:300">kr ${totalValue.toFixed(0)}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${harvestLog.length} høstinger registrert</div>
    </div>
    <div style="font-size:12px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Per vekst</div>
    ${Object.entries(byCrop).map(([cropId, units]) => {
      const cr = crops.find(c => c.id == cropId);
      if (!cr) return '';
      const val = Object.entries(units).reduce((s,[unit,qty]) => s + calcItemValue(cr, qty, unit), 0);
      const summary = Object.entries(units).map(([u,q]) => `${q} ${u}`).join(', ');
      return `<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
        <span style="font-size:20px">${cr.emoji}</span>
        <div style="flex:1">
          <div style="font-size:13px;color:var(--text-head)">${cr.family||cr.name}</div>
          <div style="font-size:12px;color:var(--text-muted)">${summary}</div>
        </div>
        <div style="font-size:13px;color:var(--accent-soft)">kr ${val.toFixed(0)}</div>
      </div>`;
    }).join('')}
    <div style="font-size:12px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 8px">Per dag</div>
    ${Object.entries(byDate).sort(([a],[b]) => b.localeCompare(a)).map(([date, entries]) => {
      const dayVal = entries.reduce((s,h) => s + calcItemValue(crops.find(c=>c.id===h.cropId), h.qty, h.unit), 0);
      const [y,m,d] = date.split('-');
      const MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
      return `<div style="margin-bottom:12px">
        <div style="font-size:13px;color:var(--text-head);margin-bottom:6px;display:flex;justify-content:space-between">
          <span>${+d}. ${MONTHS[+m-1]} ${y}</span>
          <span style="color:var(--accent-soft)">kr ${dayVal.toFixed(0)}</span>
        </div>
        ${entries.map(h => {
          const cr = crops.find(c => c.id === h.cropId);
          return `<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:12px;color:var(--text-muted)">
            <span style="font-size:16px">${cr?.emoji||'🌱'}</span>
            <span style="flex:1;color:var(--text-head)">${cr?cr.family||cr.name:''}</span>
            <span>${h.qty} ${h.unit}</span>
            ${h.bedId?`<span style="color:var(--text-dim)">${h.bedId}</span>`:''}
            <span style="color:var(--accent-soft)">kr ${calcItemValue(cr,h.qty,h.unit).toFixed(0)}</span>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}`;
}

// ── Lagring ──────────────────────────────────────────────────────

function undoLev() {
  if (levHistoryIndex <= 0) return;
  levHistoryIndex--;
  restoreLevSnapshot(levHistory[levHistoryIndex]);
}

function redoLev() {
  if (levHistoryIndex >= levHistory.length - 1) return;
  levHistoryIndex++;
  restoreLevSnapshot(levHistory[levHistoryIndex]);
}

function snapshotLev() {
  const snap = JSON.parse(JSON.stringify({
    customers: deliveryCustomers, box: deliveryBox, boxTypes, boxWeeks,
    market: deliveryMarket, harvest: harvestLog,
  }));
  levHistory = levHistory.slice(0, levHistoryIndex + 1);
  levHistory.push(snap);
  if (levHistory.length > MAX_LEV_HISTORY) levHistory.shift();
  levHistoryIndex = levHistory.length - 1;
  updateLevUndoRedoBtns();
}

function restoreLevSnapshot(s) {
  deliveryCustomers = JSON.parse(JSON.stringify(s.customers));
  deliveryBox       = JSON.parse(JSON.stringify(s.box));
  boxTypes          = JSON.parse(JSON.stringify(s.boxTypes||[]));
  boxWeeks          = JSON.parse(JSON.stringify(s.boxWeeks||[]));
  deliveryMarket    = JSON.parse(JSON.stringify(s.market));
  harvestLog        = JSON.parse(JSON.stringify(s.harvest));
  // Save without snapshot to avoid corrupting redo stack
  try {
    localStorage.setItem('mh_levering', JSON.stringify({
      customers: deliveryCustomers, box: deliveryBox, boxTypes,
      market: deliveryMarket, harvest: harvestLog,
    }));
  } catch(e) {}
  updateLevUndoRedoBtns();
  // Re-render whichever container is visible
  const el = document.getElementById('lev-overlay-content')
          || document.getElementById('lev-tab-content')
          || document.getElementById('tab-levering');
  if (el) renderLeveringInto(el);
}

function updateLevUndoRedoBtns() {
  const canUndo = levHistoryIndex > 0;
  const canRedo = levHistoryIndex < levHistory.length - 1;
  const ub = document.getElementById('lev-undo-btn');
  const rb = document.getElementById('lev-redo-btn');
  if (ub) ub.disabled = !canUndo;
  if (rb) rb.disabled = !canRedo;
}

function closeCatModal() { document.getElementById('cat-settings-modal')?.remove(); }
function openCategorySettings() {
  const modal = document.createElement('div');
  modal.id = 'cat-settings-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:flex-end;justify-content:center';

  function renderCatModal() {
    modal.innerHTML = '<div style="background:var(--bg-modal);border:1px solid var(--border-accent);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      + '<div style="font-size:15px;color:var(--accent-soft)">Kategorier</div>'
      + '<button onclick="closeCatModal()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:22px;line-height:1">×</button>'
      + '</div>'
      + cropCategories.map((cat, i) =>
        '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'
        + '<div style="flex:1;font-size:14px;color:var(--text-head)">' + cat + '</div>'
        + '<button onclick="moveCat(' + i + ',-1)" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1" ' + (i===0?'disabled':'') + '>↑</button>'
        + '<button onclick="moveCat(' + i + ',1)" style="width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;line-height:1" ' + (i===cropCategories.length-1?'disabled':'') + '>↓</button>'
        + '<button onclick="deleteCat(' + i + ')" style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(248,113,113,0.3);background:transparent;color:#f87171;cursor:pointer;font-size:14px;line-height:1">×</button>'
        + '</div>'
      ).join('')
      + '<div style="display:flex;gap:8px;margin-top:14px">'
      + '<input id="cat-new-input" placeholder="Ny kategori..." style="flex:1;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-head);font-size:14px;font-family:inherit">'
      + '<button onclick="addCatFromInput()" style="padding:10px 16px;border-radius:8px;border:none;background:var(--accent);color:var(--bg-main);cursor:pointer;font-size:14px;font-family:inherit">Legg til</button>'
      + '</div>'
      + '</div>';
  }

  window.moveCat = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= cropCategories.length) return;
    [cropCategories[i], cropCategories[j]] = [cropCategories[j], cropCategories[i]];
    saveCropCategories();
    renderCatModal();
  };
  window.deleteCat = (i) => {
    if (cropCategories.length <= 1) return;
    cropCategories.splice(i, 1);
    saveCropCategories();
    renderCatModal();
  };
  window.addCatFromInput = () => {
    const input = document.getElementById('cat-new-input');
    const val = input?.value.trim();
    if (!val || cropCategories.includes(val)) return;
    cropCategories.push(val);
    saveCropCategories();
    renderCatModal();
  };

  renderCatModal();
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function saveLevering() {
  try {
    localStorage.setItem('mh_levering', JSON.stringify({
      customers: deliveryCustomers,
      box: deliveryBox,
      boxTypes,
      boxWeeks,
      market: deliveryMarket,
      harvest: harvestLog,
    }));
  } catch(e) {}
  scheduleSync();
}

function loadLevering() {
  try {
    const raw = localStorage.getItem('mh_levering');
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.customers) deliveryCustomers = d.customers;
    if (d.box)       deliveryBox       = d.box;
    if (d.market)    deliveryMarket    = d.market;
    if (d.harvest)   harvestLog        = d.harvest;
    if (d.boxTypes)  boxTypes          = d.boxTypes;
    if (d.boxWeeks)  boxWeeks          = d.boxWeeks;
  } catch(e) {}
}
