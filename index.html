function fmtDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '.');
}

function buildWorkbook() {
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Vekster ──────────────────────────────────────────
  const cropHeaders = [
    'Navn', 'Emoji', 'Sort', 'Status', 'Senger',
    'Radavstand (cm)', 'Planteavstand (cm)', 'Rader', 'Frø per klynge',
    'Antall planter totalt', 'Estimert verdi (kr)',
    'Pris pr/kg (kr)', 'Vekt per enhet (g)',
    'Salgsenhet', 'Stk/bunt/boks per plante', 'Vekt total (g)', 'Pris per enhet (kr)',
    'Sådato', 'Sålogg (dato)', 'Plantedato', 'Plantelogg (dato)', 'Notater', 'Kategori'
  ];
  const cropRows = crops.map(c => [
    c.name, c.emoji, c.family,
    STATUS[c.status]?.label || c.status,
    c.beds.join(', '),
    c.rowSpacing, c.plantSpacing, c.rows, c.seedsPerCluster || 1,
    calcPlants(c),
    calcValue(c) !== null ? calcValue(c) : '',
    c.pricePerKg || '', c.weightG || '',
    c.unit || 'stk', c.unitsPerPlant || 1, c.vektTotal || '', c.pricePerUnit || '',
    fmtDate(c.sownDate), fmtDate(c.sowLog), fmtDate(c.plantedDate), fmtDate(c.plantLog), c.notes, c.category || 'Andre'
  ]);
  const wsVekster = XLSX.utils.aoa_to_sheet([cropHeaders, ...cropRows]);
  wsVekster['!cols'] = [
    {wch:18},{wch:7},{wch:16},{wch:14},{wch:12},
    {wch:16},{wch:18},{wch:8},{wch:16},{wch:20},{wch:20},
    {wch:14},{wch:16},
    {wch:12},{wch:18},{wch:14},{wch:16},
    {wch:14},{wch:16},{wch:14},{wch:18},{wch:30},{wch:16}
  ];
  styleHeaderRow(wsVekster, cropHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsVekster, 'Vekster');

  // ── Sheet 2: Senger ───────────────────────────────────────────
  const bedHeaders = [
    'Seng', 'Lengde (m)', 'Bredde (m)', 'Areal (m²)',
    'Vekst', 'Status', 'Antall planter', 'Sådato', 'Plantedato'
  ];
  const bedRows = BED_IDS.map(id => {
    const bs = bedSizes[id];
    const crop = getBedCrop(id);
    return [
      id,
      bs.length, bs.width,
      +(bs.length * bs.width).toFixed(2),
      crop ? crop.name : '–',
      crop ? (STATUS[crop.status]?.label || crop.status) : '–',
      crop ? calcPlants({...crop, beds:[id]}) : 0,
      crop ? fmtDate(crop.sownDate) : '–',
      crop ? fmtDate(crop.plantedDate) : '–',
    ];
  });
  const wsSenger = XLSX.utils.aoa_to_sheet([bedHeaders, ...bedRows]);
  wsSenger['!cols'] = [
    {wch:8},{wch:12},{wch:12},{wch:12},
    {wch:18},{wch:12},{wch:16},{wch:14},{wch:14}
  ];
  styleHeaderRow(wsSenger, bedHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsSenger, 'Senger');

  // ── Sheet 3: Oppgaver ─────────────────────────────────────────
  const taskHeaders = ['Oppgave', 'Dato', 'Prioritet', 'Ferdig'];
  const taskRows = tasks.map(t => [
    t.text, fmtDate(t.date),
    t.priority.charAt(0).toUpperCase() + t.priority.slice(1),
    t.done ? 'Ja' : 'Nei'
  ]);
  const wsOppgaver = XLSX.utils.aoa_to_sheet([taskHeaders, ...taskRows]);
  wsOppgaver['!cols'] = [{wch:40},{wch:14},{wch:12},{wch:8}];
  styleHeaderRow(wsOppgaver, taskHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsOppgaver, 'Oppgaver');

  // ── Sheet 4: Kunder ──────────────────────────────────────────
  const customerHeaders = ['Navn', 'Telefon', 'Kassetype', 'Kassetypeid'];
  const customerRows = deliveryCustomers.map(cu => {
    const bt = boxTypes.find(t => t.id == cu.boxTypeId);
    return [cu.name, cu.phone || '', bt ? bt.name : '', cu.boxTypeId || ''];
  });
  const wsKunder = XLSX.utils.aoa_to_sheet([customerHeaders, ...customerRows]);
  wsKunder['!cols'] = [{wch:24},{wch:16},{wch:20},{wch:20}];
  styleHeaderRow(wsKunder, customerHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsKunder, 'Kunder');

  // ── Sheet 5: Kassetyper ───────────────────────────────────────
  const ktHeaders = ['Navn', 'Kassepris (kr)', 'Uker fra', 'Uker til', 'Frekvens', 'Ukedager', 'Basis-vekster'];
  const ktRows = boxTypes.map(bt => [
    bt.name || '',
    bt.salePrice || '',
    bt.startWeek || '',
    bt.endWeek || '',
    bt.frequency === 'biweekly' ? 'Annenhver uke' : bt.frequency === 'monthly' ? 'Månedlig' : 'Ukentlig',
    (bt.weekdays||[]).map(d => ['Man','Tir','Ons','Tor','Fre','Lør','Søn'][d]).join(', '),
    (bt.baseItems||[]).map(item => { const cr = crops.find(c=>c.id===item.cropId); return cr ? cr.name + ' ' + (item.qty||'') + ' ' + (item.unit||'') : ''; }).filter(Boolean).join(', ')
  ]);
  // Store full JSON in last row for import (hidden)
  const wsKassetyper = XLSX.utils.aoa_to_sheet([ktHeaders, ...ktRows, ['__json__', JSON.stringify(boxTypes)]]);
  wsKassetyper['!cols'] = [{wch:22},{wch:14},{wch:10},{wch:10},{wch:16},{wch:20},{wch:40}];
  styleHeaderRow(wsKassetyper, ktHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsKassetyper, 'Kassetyper');

  // ── Sheet 6: Kasseuker ────────────────────────────────────────
  const kuHeaders = ['Kassetype', 'Uke', 'År', 'Vekster (innhold)', 'Ant. kasser', 'Logget'];
  const kuRows = boxWeeks.map(bw => {
    const bt = boxTypes.find(t => t.id == bw.boxTypeId);
    const items = (bw.items||[]).map(item => { const cr = crops.find(c=>c.id===item.cropId); return cr ? cr.name + ' ' + (item.qty||'') + ' ' + (item.unit||'') : ''; }).filter(Boolean).join(', ');
    const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
    const activeCu = btCu.filter(cu => bw.customerWeek?.[cu.id||cu.name] !== false);
    const total = activeCu.length + (bw.extraBoxes||0);
    return [bt?.name||'', bw.week||'', bw.year||'', items, total||'', bw.harvested ? 'Ja' : 'Nei'];
  });
  const wsKasseuker = XLSX.utils.aoa_to_sheet([kuHeaders, ...kuRows, ['__json__', JSON.stringify(boxWeeks)]]);
  wsKasseuker['!cols'] = [{wch:22},{wch:6},{wch:6},{wch:50},{wch:14},{wch:10}];
  styleHeaderRow(wsKasseuker, kuHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsKasseuker, 'Kasseuker');

  // ── Sheet 7: Markeder ─────────────────────────────────────────
  const mktHeaders = ['Navn', 'Dato', 'Status', 'Vekster', 'Estimert verdi (kr)'];
  const mktRows = deliveryMarket.map(mkt => {
    const items = (mkt.items||[]).map(item => { const cr = crops.find(c=>c.id===item.cropId); return cr ? cr.name + ' ' + (item.qty||'') + ' ' + (item.unit||'') : ''; }).filter(Boolean).join(', ');
    const val = (mkt.items||[]).reduce((s,item) => s + calcItemValue(crops.find(c=>c.id===item.cropId), item.qty||0, item.unit), 0);
    return [mkt.name||'', mkt.date||'', mkt.done ? 'Gjennomført' : 'Planlagt', items, val > 0 ? Math.round(val) : ''];
  });
  const wsMarkeder = XLSX.utils.aoa_to_sheet([mktHeaders, ...mktRows, ['__json__', JSON.stringify(deliveryMarket)]]);
  wsMarkeder['!cols'] = [{wch:24},{wch:12},{wch:14},{wch:50},{wch:18}];
  styleHeaderRow(wsMarkeder, mktHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsMarkeder, 'Markeder');

  // ── Sheet 8: Høstelogg ────────────────────────────────────────
  const hlHeaders = ['Dato', 'Vekst', 'Mengde', 'Enhet', 'Destinasjon', 'Notat'];
  const hlRows = harvestLog.map(h => {
    const cr = crops.find(c=>c.id===h.cropId);
    return [h.date||'', cr ? cr.name : '', h.qty||'', h.unit||'', h.dest||'', h.note||''];
  });
  const wsHoest = XLSX.utils.aoa_to_sheet([hlHeaders, ...hlRows, ['__json__', JSON.stringify(harvestLog)]]);
  wsHoest['!cols'] = [{wch:12},{wch:20},{wch:10},{wch:8},{wch:12},{wch:30}];
  styleHeaderRow(wsHoest, hlHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsHoest, 'Høstelogg');

  // ── Sheet 9: Kart (JSON backup) ───────────────────────────────
  const wsKart = XLSX.utils.aoa_to_sheet([
    ['Kartdata (teknisk backup for import)'],
    [JSON.stringify(gardenMap || {})]
  ]);
  wsKart['!cols'] = [{wch:30}];
  XLSX.utils.book_append_sheet(wb, wsKart, 'Kart');

  // ── Sheet 10: Oppgavehistorikk ────────────────────────────────
  const thHeaders = ['Dato fullført', 'Oppgave', 'Prioritet'];
  const thRows = (taskHistory||[]).map(t => [
    t.completedAt ? fmtDate(t.completedAt.split('T')[0].split('-').reverse().join('-')) : '',
    t.text||'',
    t.priority ? t.priority.charAt(0).toUpperCase()+t.priority.slice(1) : ''
  ]);
  const wsTaskHist = XLSX.utils.aoa_to_sheet([thHeaders, ...thRows, ['__json__', JSON.stringify(taskHistory||[])]]);
  wsTaskHist['!cols'] = [{wch:16},{wch:50},{wch:12}];
  styleHeaderRow(wsTaskHist, thHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsTaskHist, 'Oppgavehistorikk');

  // ── Download ──────────────────────────────────────────────────
  const date = new Date();
  const dateStr = `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`;
  return wb;
}

function exportToExcel() {
  try {
    const wb = buildWorkbook();
    const date = new Date();
    const dateStr = `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`;
    XLSX.writeFile(wb, `Markedshage_${dateStr}.xlsx`);
  } catch(e) {
    console.error('Excel export error:', e);
    alert('Eksport feilet: ' + e.message + '\n\nSjekk konsollen for detaljer.');
  }
}

function styleHeaderRow(ws, numCols) {
  // Style header cells with green background
  for (let col = 0; col < numCols; col++) {
    const cellRef = XLSX.utils.encode_cell({r:0, c:col});
    if (!ws[cellRef]) continue;
    ws[cellRef].s = {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { fgColor: { rgb: '1A5C2E' } },
      alignment: { horizontal: 'left' }
    };
  }
}

// On startup: load from JSONBin if no local data
async function syncLoadOnStart() {
  try {
    if (!syncBinId) {
      await syncSave();
      return;
    }

    // Fetch remote data
    const resp = await fetch(`${JSONBIN_API}/${syncBinId}/latest?t=${Date.now()}`, {
      headers: { 'X-Master-Key': syncKey, 'X-Bin-Meta': 'false', 'Cache-Control': 'no-store' }, cache: 'no-store'
    });
    if (!resp.ok) return;
    const remote = await resp.json();
    if (!remote || !remote.crops) return;

    // Check local timestamp
    let localSaved = null;
    try {
      const raw = localStorage.getItem('mh_data');
      if (raw) localSaved = JSON.parse(raw).saved || null;
    } catch(e) {}

    const remoteSaved = remote.saved || null;

    // Load remote if: no local data, no local timestamp, or remote is newer
    const hasNoLocal = !localStorage.getItem('mh_data');
    const remoteIsNewer = !localSaved || (remoteSaved && new Date(remoteSaved) > new Date(localSaved));

    if (hasNoLocal || remoteIsNewer) {
      if (remote.crops)   crops    = remote.crops;
      if (remote.tasks)   tasks    = remote.tasks;
      if (remote.bedSizes) bedSizes = remote.bedSizes;
      if (remote.bedIDs && remote.bedIDs.length) BED_IDS = remote.bedIDs;
      if (remote.gardenMap) gardenMap = remote.gardenMap;
      if (remote.taskHistory) taskHistory = remote.taskHistory;
      if (remote.levering) { if(remote.levering.customers) deliveryCustomers=remote.levering.customers; if(remote.levering.box) deliveryBox=remote.levering.box; if(remote.levering.boxTypes) boxTypes=remote.levering.boxTypes; if(remote.levering.boxWeeks) boxWeeks=remote.levering.boxWeeks; if(remote.levering.market) deliveryMarket=remote.levering.market; if(remote.levering.harvest) harvestLog=remote.levering.harvest; }
      saveToLocal();
      clearTimeout(syncTimer); syncTimer = null;
      render();
    }
  } catch(e) {
    console.warn('syncLoadOnStart error:', e);
  }
}

// Load data from JSONBin and import it
async function syncLoad(silent = false) {
  if (!syncKey || !syncBinId) return false;
  try {
    const resp = await fetch(`${JSONBIN_API}/${syncBinId}/latest?t=${Date.now()}`, {
      headers: { 'X-Master-Key': syncKey, 'X-Bin-Meta': 'false', 'Cache-Control': 'no-store' }, cache: 'no-store'
    });
    if (!resp.ok) {
      console.warn('JSONBin read failed:', resp.status, await resp.text());
      if (!silent) showSyncToast('⚠ Kunne ikke laste fra JSONBin');
      return false;
    }
    const data = await resp.json();
    if (!data || !data.crops) {
            return false;
    }
    // Load data directly — no Excel parsing needed
    if (data.crops)   crops    = data.crops;
    if (data.tasks)   tasks    = data.tasks;
    if (data.bedSizes) bedSizes = data.bedSizes;
    if (data.bedIDs && data.bedIDs.length) BED_IDS = data.bedIDs;
    if (data.gardenMap) gardenMap = data.gardenMap;
    if (data.taskHistory) taskHistory = data.taskHistory;
    // Load levering data
    if (data.levering) {
      if (data.levering.customers) deliveryCustomers = data.levering.customers;
      if (data.levering.box)       deliveryBox       = data.levering.box;
      if (data.levering.boxTypes)  boxTypes          = data.levering.boxTypes;
      if (data.levering.boxWeeks)  boxWeeks          = data.levering.boxWeeks;
      if (data.levering.market)    deliveryMarket    = data.levering.market;
      if (data.levering.harvest)   harvestLog        = data.levering.harvest;
      saveLevering();
    }
    saveToLocal();
    clearTimeout(syncTimer); syncTimer = null;
    render();
    if (!silent)     return true;
  } catch(e) {
    console.warn('syncLoad error:', e);
    if (!silent) showSyncToast('⚠ Feil ved innlasting');
    return false;
  }
}

// Save current state to JSONBin
async function syncSave() {
  if (!syncKey) return;
  const payload = {
    crops,
    tasks: tasks.filter(t => !String(t.id).startsWith('crop-')),
    bedSizes,
    bedIDs: BED_IDS,
    gardenMap: gardenMap || null,
    taskHistory: taskHistory || [],
    levering: { customers: deliveryCustomers, box: deliveryBox, boxTypes, boxWeeks, market: deliveryMarket, harvest: harvestLog },
    saved: new Date().toISOString()
  };
  const payloadStr = JSON.stringify(payload);
  console.log('Sync payload size:', (payloadStr.length / 1024).toFixed(1), 'KB');
  console.log('Crops:', crops.length, 'Tasks:', tasks.length);
  try {
    let resp;
    if (syncBinId) {
      resp = await fetch(`${JSONBIN_API}/${syncBinId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': syncKey },
        body: payloadStr
      });
    } else {
      resp = await fetch(JSONBIN_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': syncKey, 'X-Bin-Name': 'markedshage-data' },
        body: payloadStr
      });
      if (resp.ok) {
        const result = await resp.json();
        syncBinId = result?.metadata?.id;
        if (syncBinId) try { localStorage.setItem('mh_sync_id', syncBinId); } catch(e) {}
      }
    }
    if (resp && resp.ok) {
      syncTimer = null;
      renderSyncBtn();
          } else {
      const errText = resp ? await resp.text() : 'ingen respons';
      console.error('JSONBin save failed:', resp?.status, errText);
      showSyncToast('⚠ Lagring feilet');
    }
  } catch(e) {
    console.warn('syncSave error:', e);
    showSyncToast('⚠ Lagring feilet');
  }
}

// Schedule save with debounce
function scheduleSync() {
  if (!syncConnected) return;
  saveToLocal();
  clearTimeout(syncTimer);
  ['gist-btn','lev-gist-btn'].forEach(id=>{const b=document.getElementById(id);if(b){b.style.color='#d97706';b.title='Ulagrede endringer – lagrer snart...';b.textContent='☁';}})
  syncTimer = setTimeout(syncSave, 3000);
}

function importCustomersFromExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });
      // Accept sheet named 'Kunder' or first sheet
      const wsKu = wb.Sheets['Kunder'] || wb.Sheets[wb.SheetNames[0]];
      if (!wsKu) { showSyncToast('Fant ingen data i filen'); return; }
      const rows = XLSX.utils.sheet_to_json(wsKu, { header: 1 });
      if (rows.length < 2) { showSyncToast('Ingen kunder funnet i filen'); return; }

      const newCustomers = [];
      for (let i = 1; i < rows.length; i++) {
        const r = rows[i];
        if (!r[0]) continue;
        const name = String(r[0] || '').trim();
        const phone = String(r[1] || '').trim();
        const btName = String(r[2] || '').trim();
        const btIdRaw = String(r[3] || '').trim();
        let boxTypeId = null;
        if (btIdRaw) { const bt = boxTypes.find(t => String(t.id) === btIdRaw); if (bt) boxTypeId = bt.id; }
        if (!boxTypeId && btName) { const bt = boxTypes.find(t => t.name.toLowerCase() === btName.toLowerCase()); if (bt) boxTypeId = bt.id; }
        newCustomers.push({ id: Date.now() + i * 7, name, phone, boxTypeId, notes: '', custom: {} });
      }

      if (!newCustomers.length) { showSyncToast('Ingen gyldige kunder i filen'); return; }

      const msg = 'Dette vil erstatte alle eksisterende kunder (' + deliveryCustomers.length + ') med ' + newCustomers.length + ' kunder fra filen. Fortsette?';
      if (!confirm(msg)) return;
      snapshotLev();
      deliveryCustomers = newCustomers;
      saveLevering();
      showSyncToast('✓ Importerte ' + newCustomers.length + ' kunder');
      document.getElementById('kasse-oppsett-modal')?.remove();
      openKasseOppsett();
    } catch(err) {
      showSyncToast('Kunne ikke lese kundefilen');
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function exportCustomersToExcel() {
  const wb = XLSX.utils.book_new();
  const headers = ['Navn', 'Telefon', 'Kassetype', 'Kassetypeid'];
  const rows = deliveryCustomers.map(cu => {
    const bt = boxTypes.find(t => t.id == cu.boxTypeId);
    return [cu.name, cu.phone || '', bt ? bt.name : '', cu.boxTypeId || ''];
  });
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  ws['!cols'] = [{wch:24},{wch:16},{wch:20},{wch:20}];
  styleHeaderRow(ws, headers.length);
  XLSX.utils.book_append_sheet(wb, ws, 'Kunder');
  const d = new Date();
  XLSX.writeFile(wb, 'Kunder_' + d.getDate() + '-' + (d.getMonth()+1) + '-' + d.getFullYear() + '.xlsx');
}

function getValidDeliveryWeeks(bt, year) {
  if (!bt || !bt.startWeek || !bt.endWeek) return [];
  const weeks = [];
  const step = bt.frequency === 'biweekly' ? 2 : bt.frequency === 'monthly' ? 4 : 1;
  for (let w = bt.startWeek; w <= bt.endWeek; w += step) {
    weeks.push(w);
  }
  return weeks;
}

function getISOWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay()+6)%7);
  const week1 = new Date(d.getFullYear(),0,4);
  return 1 + Math.round(((d-week1)/86400000 - 3 + (week1.getDay()+6)%7)/7);
}

function getCurrentWeek() { return getISOWeek(new Date()); }
function getCurrentYear() { return new Date().getFullYear(); }

function getOrCreateBoxWeek(boxTypeId, week, year) {
  let bw = boxWeeks.find(b => String(b.boxTypeId)==String(boxTypeId) && +b.week===+week && +b.year===+year);
  if (!bw) {
    const bt = boxTypes.find(t => t.id==boxTypeId);
    bw = { id: 'bw_'+String(boxTypeId)+'_w'+String(week)+'_y'+String(year), boxTypeId: boxTypeId, week: +week, year: +year,
      items: JSON.parse(JSON.stringify(bt?.baseItems||[])),
      count: 0, customerAdj: {} };
    boxWeeks.push(bw);
    saveLevering(); // persist immediately
  }
  return bw;
}

    if (!bw.customerWeek) bw.customerWeek = {};
    if (bw.extraBoxes === undefined) bw.extraBoxes = 0;
    const btCuLev = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(kasseViewTypeId));
    const activeCuLev = btCuLev.filter(cu => bw.customerWeek[cu.id || cu.name] !== false);
    const totalBoxes = activeCuLev.length + (bw.extraBoxes || 0);
    const isLight2 = isLight;

    // Find customers using this box type
    html += '<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">'
      + totalBoxes + ' kasser · Uke ' + kasseViewWeek
      + '</div>';

    // Init delivery state
    if (!bw.deliveryCheck) bw.deliveryCheck = {};
    if (!bw.extraCheck) bw.extraCheck = {};

    const doneCuCount = activeCuLev.filter(cu => bw.deliveryCheck[cu.id || cu.name]).length;
    const doneExtraCount = Array.from({length: bw.extraBoxes||0}, (_,i) => i).filter(i => bw.extraCheck[i]).length;
    const doneCount = doneCuCount + doneExtraCount;
    const allDelivered = totalBoxes > 0 && doneCount === totalBoxes;

    // Progress bar
    const pct = totalBoxes ? Math.round((doneCount / totalBoxes) * 100) : 0;
    html += '<div style="background:var(--bg-card);border:1px solid ' + (allDelivered ? 'rgba(52,211,153,0.4)' : 'var(--border)') + ';border-radius:16px;padding:14px 16px;margin-bottom:20px">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      + '<div>'
      + '<div style="font-size:28px;font-weight:300;color:' + (allDelivered ? '#34d399' : 'var(--accent-soft)') + ';line-height:1">' + doneCount + '<span style="font-size:16px;color:var(--text-muted)">/' + totalBoxes + '</span></div>'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px">levert</div>'
      + '</div>'
      + (allDelivered ? '<div style="font-size:22px">🎉</div>' : '<div style="font-size:13px;color:var(--text-muted)">' + (totalBoxes - doneCount) + ' gjenstår</div>')
      + '</div>'
      + '<div style="height:6px;border-radius:3px;background:' + (isLight2 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)') + ';overflow:hidden">'
      + '<div style="height:100%;border-radius:3px;background:' + (allDelivered ? '#34d399' : 'var(--accent)') + ';width:' + pct + '%;transition:width 0.3s"></div>'
      + '</div></div>';

    // Customer rows
    if (activeCuLev.length === 0) {
      html += '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:10px 0 6px">Ingen kunder denne uken</div>';
    } else {
      activeCuLev.forEach((cu, cuIdx) => {
        const delivered = !!bw.deliveryCheck[cu.id || cu.name];
        const bg = delivered ? (isLight2 ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.03)') : 'var(--bg-card)';
        const bd = delivered ? (isLight2 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)') : 'var(--border)';
        const cbBg = delivered ? 'var(--accent)' : 'transparent';
        const cbBd = delivered ? 'var(--accent)' : (isLight2 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.25)');
        html += '<div data-lev-bwid="' + bw.id + '" data-lev-idx="' + cuIdx + '" onclick="kasseLeveringCheckByIdx(this)"'
          + ' style="display:flex;align-items:center;gap:14px;padding:16px 14px;'
          + 'background:' + bg + ';border:2px solid ' + bd + ';'
          + 'border-radius:14px;margin-bottom:8px;cursor:pointer;user-select:none;'
          + 'transition:all 0.15s;-webkit-tap-highlight-color:transparent">'
          + '<div style="width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;'
          + 'background:' + cbBg + ';border:2px solid ' + cbBd + ';'
          + 'color:' + (isLight2 ? '#1c1410' : '#0d1a0e') + ';font-size:16px">'
          + (delivered ? '✓' : '') + '</div>'
          + '<div style="width:36px;height:36px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;' + (delivered ? 'opacity:0.4' : '') + '">👤</div>'
          + '<div style="flex:1;' + (delivered ? 'opacity:0.45' : '') + '">'
          + '<div style="font-size:16px;color:var(--text-head);' + (delivered ? 'text-decoration:line-through' : '') + '">' + cu.name + '</div>'
          + (cu.phone ? '<div style="font-size:12px;color:var(--text-muted);margin-top:2px">' + cu.phone + '</div>' : '')
          + '</div>'
          + (delivered ? '<div style="font-size:12px;color:var(--accent-soft);flex-shrink:0">Levert ✓</div>' : '')
          + '</div>';
      });
    }

    // Extra box rows — always shown with +/- control
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin:' + (activeCuLev.length > 0 ? '12' : '0') + 'px 0 8px">'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase">Ekstra kasser</div>'
      + '<div style="display:flex;align-items:center;gap:8px">'
      + '<button data-bwid="' + bw.id + '" onclick="event.stopPropagation();adjustExtraBoxes(this.dataset.bwid,-1)" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1">−</button>'
      + '<span style="font-size:14px;color:var(--text-head);min-width:20px;text-align:center">' + (bw.extraBoxes||0) + '</span>'
      + '<button data-bwid="' + bw.id + '" onclick="event.stopPropagation();adjustExtraBoxes(this.dataset.bwid,1)" style="width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;line-height:1">+</button>'
      + '</div></div>';
    for (let xi = 0; xi < (bw.extraBoxes||0); xi++) {
      const delivered = !!bw.extraCheck[xi];
      const bg = delivered ? (isLight2 ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.03)') : 'var(--bg-card)';
      const bd = delivered ? (isLight2 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)') : 'var(--border)';
      const cbBg = delivered ? 'var(--accent)' : 'transparent';
      const cbBd = delivered ? 'var(--accent)' : (isLight2 ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.25)');
      html += '<div data-lev-bwid="' + bw.id + '" data-lev-extra="' + xi + '" onclick="kasseLeveringCheckExtra(this)"'
        + ' style="display:flex;align-items:center;gap:14px;padding:14px 14px;'
        + 'background:' + bg + ';border:2px solid ' + bd + ';'
        + 'border-radius:14px;margin-bottom:8px;cursor:pointer;user-select:none;'
        + 'transition:all 0.15s;-webkit-tap-highlight-color:transparent">'
        + '<div style="width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;'
        + 'background:' + cbBg + ';border:2px solid ' + cbBd + ';'
        + 'color:' + (isLight2 ? '#1c1410' : '#0d1a0e') + ';font-size:16px">'
        + (delivered ? '✓' : '') + '</div>'
        + '<div style="width:36px;height:36px;border-radius:50%;background:' + (isLight2 ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.06)') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;' + (delivered ? 'opacity:0.4' : '') + '">📦</div>'
        + '<div style="flex:1;' + (delivered ? 'opacity:0.45' : '') + '">'
        + '<div style="font-size:16px;color:var(--text-head);' + (delivered ? 'text-decoration:line-through' : '') + '">Ekstra kasse ' + (xi + 1) + '</div>'
        + '</div>'
        + (delivered ? '<div style="font-size:12px;color:var(--accent-soft);flex-shrink:0">Levert ✓</div>' : '')
        + '</div>';
    }
    if (!(bw.extraBoxes > 0)) {
      html += '<div style="font-size:12px;color:var(--text-muted);padding:6px 0 4px;text-align:center">Ingen ekstra kasser denne uken</div>';
    }

    if (allDelivered) {
      html += '<div style="text-align:center;padding:16px 0;font-size:13px;color:var(--accent-soft)">Alle kasser levert denne uken! 🌿</div>';
    }
  }

  el.innerHTML = html;
}

function openKassekundePanel(bwId) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  if (!bw.customerWeek) bw.customerWeek = {};
  if (bw.extraBoxes === undefined) bw.extraBoxes = 0;
  const isLight = document.body.classList.contains('light');
  const btCustomers = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));

  const existing = document.getElementById('kassekunde-panel');
  if (existing) { existing.remove(); return; }

  const panel = document.createElement('div');
  panel.id = 'kassekunde-panel';
  panel.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:6000;display:flex;align-items:flex-end;justify-content:center';

  function renderPanel() {
    if (!bw.customerWeek) bw.customerWeek = {};
    const activeCu = btCustomers.filter(cu => bw.customerWeek[cu.id || cu.name] !== false);
    const total = activeCu.length + (bw.extraBoxes || 0);

    let html = '<div style="background:var(--bg-modal);border:1px solid var(--border-accent);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px;max-height:80vh;overflow-y:auto">'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
      + '<div style="font-size:15px;color:var(--accent-soft)">📦 Kasser uke ' + bw.week + '</div>'
      + '<div style="display:flex;align-items:center;gap:10px">'
      + '<div style="font-size:22px;font-weight:300;color:var(--text-head)">' + total + ' <span style="font-size:13px;color:var(--text-muted)">kasser</span></div>'
      + '<button onclick="document.getElementById(\'kassekunde-panel\').remove()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:22px;line-height:1">×</button>'
      + '</div></div>';

    if (!btCustomers.length) {
      html += '<p style="color:var(--text-muted);font-size:13px;padding:8px 0">Ingen kunder koblet til denne kassetypen.<br>Gå til ⚙ Oppsett for å legge til kunder.</p>';
    } else {
      html += '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Kunder denne uken</div>';
      btCustomers.forEach((cu) => {
        const cuKey = cu.id || cu.name;
        const active = bw.customerWeek[cuKey] !== false;
        html += '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">'
          + '<div data-kk-bwid="' + bwId + '" data-kk-cukey="' + String(cuKey).replace(/"/g, '&quot;') + '" onclick="toggleKassekundePlan(this)"'
          + ' style="width:24px;height:24px;border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;'
          + 'background:' + (active ? 'var(--accent)' : 'transparent') + ';'
          + 'border:2px solid ' + (active ? 'var(--accent)' : (isLight ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.25)')) + ';'
          + 'color:' + (isLight ? '#1c1410' : '#0d1a0e') + '">'
          + (active ? '✓' : '') + '</div>'
          + '<div style="flex:1;' + (active ? '' : 'opacity:0.45') + '">'
          + '<div style="font-size:14px;color:var(--text-head);' + (active ? '' : 'text-decoration:line-through') + '">' + cu.name + '</div>'
          + (cu.phone ? '<div style="font-size:12px;color:var(--text-muted)">' + cu.phone + '</div>' : '')
          + '</div>'
          + '<div style="font-size:12px;color:' + (active ? 'var(--accent-soft)' : 'var(--text-muted)') + '">' + (active ? 'Aktiv' : 'Hopper over') + '</div>'
          + '</div>';
      });
    }

    // Ekstra kasser
    html += '<div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)">'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Ekstra kasser (uspesifiserte)</div>'
      + '<div style="display:flex;align-items:center;gap:10px">'
      + '<button data-kk-bwid="' + bwId + '" onclick="adjustExtraBoxes(this.dataset.kkBwid,-1)" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-head);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">−</button>'
      + '<div id="extra-boxes-disp-' + bwId + '" style="font-size:22px;font-weight:300;color:var(--text-head);min-width:30px;text-align:center">' + (bw.extraBoxes || 0) + '</div>'
      + '<button data-kk-bwid="' + bwId + '" onclick="adjustExtraBoxes(this.dataset.kkBwid,1)" style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-head);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center">+</button>'
      + '<div style="font-size:13px;color:var(--text-muted);margin-left:4px">ekstra kasse' + ((bw.extraBoxes||0) !== 1 ? 'r' : '') + '</div>'
      + '</div></div>';

    html += '</div>';
    panel.innerHTML = html;
  }

  panel._renderPanel = renderPanel;
  renderPanel();
  document.body.appendChild(panel);
  panel.addEventListener('click', e => { if (e.target === panel) panel.remove(); });
}

function toggleKassekundePlan(el) {
  const bwId = el.dataset.kkBwid;
  const cuKey = el.dataset.kkCukey;
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  if (!bw.customerWeek) bw.customerWeek = {};
  bw.customerWeek[cuKey] = bw.customerWeek[cuKey] === false ? undefined : false;
  if (bw.customerWeek[cuKey] === undefined) delete bw.customerWeek[cuKey];
  saveLevering();
  const panel = document.getElementById('kassekunde-panel');
  if (panel?._renderPanel) panel._renderPanel();
  // Update need/price rows inline without full re-render (no scroll jump)
  refreshKasseNeedRows(bwId);
  // Also update the antall kasser button count display
  const btCuForCount = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCuForCount = btCuForCount.filter(cu => bw.customerWeek?.[cu.id || cu.name] !== false);
  const newTotal = activeCuForCount.length + (bw.extraBoxes || 0);
  const countBtn = document.querySelector('[data-bwid="' + bwId + '"]');
  if (countBtn) {
    const countEl = countBtn.querySelector('div[style*="font-size:26px"]');
    if (countEl) countEl.textContent = newTotal;
    const descEl = countBtn.querySelector('div[style*="font-size:12px"][style*="text-muted"]');
    if (descEl) {
      descEl.textContent =
        (activeCuForCount.length ? activeCuForCount.length + ' kunde' + (activeCuForCount.length !== 1 ? 'r' : '') : 'ingen kunder')
        + (bw.extraBoxes ? ' + ' + bw.extraBoxes + ' ekstra' : '');
    }
    const boxVal = (bw.items||[]).reduce((s,it) => s + calcItemValue(crops.find(c=>c.id===it.cropId), it.qty||0, it.unit), 0);
    const totalEl = countBtn.querySelector('[style*="accent-soft"]');
    if (totalEl) totalEl.textContent = 'kr ' + (boxVal * newTotal).toFixed(0);
  }
}

function refreshKassePriceCard(bwId) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  const bt = boxTypes.find(t => t.id == bw.boxTypeId);
  if (!bt) return;
  const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCu = btCu.filter(cu => bw.customerWeek?.[cu.id || cu.name] !== false);
  const totalKasser = activeCu.length + (bw.extraBoxes || 0);
  const boxVal = (bw.items||[]).reduce((s,it) => s + calcItemValue(crops.find(c=>c.id===it.cropId), it.qty||0, it.unit), 0);
  const contentPerBox = boxVal;
  const contentTotal = boxVal * totalKasser;
  const salePerBox = bt.salePrice || null;
  const deltaPerBox = salePerBox !== null ? contentPerBox - salePerBox : null;
  const barColor = deltaPerBox !== null ? (deltaPerBox >= 0 ? '#34d399' : '#f87171') : 'var(--accent)';
  const pct = salePerBox > 0 ? Math.min(100, Math.round((contentPerBox / salePerBox) * 100)) : 100;

  // Update button total
  const btnTotal = document.getElementById('kasse-btn-total-' + bwId);
  if (btnTotal) btnTotal.textContent = 'kr ' + contentTotal.toFixed(0);

  // Update card elements (only exist if salePrice set)
  const cardContent = document.getElementById('kasse-card-content-' + bwId);
  if (cardContent) cardContent.textContent = 'kr ' + contentPerBox.toFixed(0);

  const cardDelta = document.getElementById('kasse-card-delta-' + bwId);
  if (cardDelta && deltaPerBox !== null) {
    cardDelta.textContent = (deltaPerBox > 0 ? '+' : '−') + 'kr ' + Math.abs(deltaPerBox).toFixed(0);
    cardDelta.style.color = barColor;
  }
  const cardDeltaLbl = document.getElementById('kasse-card-delta-lbl-' + bwId);
  if (cardDeltaLbl && deltaPerBox !== null) {
    cardDeltaLbl.textContent = deltaPerBox >= 0 ? 'overskudd' : 'underskudd';
  }
  const cardBar = document.getElementById('kasse-card-bar-' + bwId);
  if (cardBar) {
    cardBar.style.width = pct + '%';
    cardBar.style.background = barColor;
  }
}

function refreshKasseNeedRows(bwId) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCu = btCu.filter(cu => bw.customerWeek?.[cu.id || cu.name] !== false);
  const totalCount = activeCu.length + (bw.extraBoxes || 0);
  (bw.items||[]).forEach((item, ii) => {
    const cr = crops.find(c => c.id == item.cropId);
    const needEl = document.getElementById('kasse-need-' + bwId + '-' + ii);
    if (needEl) needEl.textContent = totalCount ? (item.qty||0) * totalCount + ' ' + item.unit + ' totalt' : '–';
    const priceEl = document.getElementById('kasse-price-' + bwId + '-' + ii);
    if (priceEl && cr) {
      const perKasse = calcItemValue(cr, item.qty||0, item.unit);
      priceEl.textContent = perKasse > 0 ? 'kr ' + perKasse.toFixed(0) + ' per kasse' : '';
    }
  });
}

function adjustExtraBoxes(bwId, delta) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  bw.extraBoxes = Math.max(0, (bw.extraBoxes || 0) + delta);
  saveLevering();
  const disp = document.getElementById('extra-boxes-disp-' + bwId);
  if (disp) disp.textContent = bw.extraBoxes;
  const panel = document.getElementById('kassekunde-panel');
  if (panel?._renderPanel) panel._renderPanel();
  const btCuForCount = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCuForCount = btCuForCount.filter(cu => bw.customerWeek?.[cu.id || cu.name] !== false);
  const newTotal = activeCuForCount.length + (bw.extraBoxes || 0);
  const countBtn = document.querySelector('[data-bwid="' + bwId + '"]');
  if (countBtn) {
    const countEl = countBtn.querySelector('div[style*="font-size:26px"]');
    if (countEl) countEl.textContent = newTotal;
    const descEl = countBtn.querySelector('div[style*="font-size:12px"]');
    if (descEl) {
      descEl.textContent =
        (activeCuForCount.length ? activeCuForCount.length + ' kunde' + (activeCuForCount.length !== 1 ? 'r' : '') : 'ingen kunder')
        + (bw.extraBoxes ? ' + ' + bw.extraBoxes + ' ekstra' : '');
    }
    const boxVal = (bw.items||[]).reduce((s,it) => s + calcItemValue(crops.find(c=>c.id===it.cropId), it.qty||0, it.unit), 0);
    const totalEl = countBtn.querySelector('[style*="accent-soft"]');
    if (totalEl) totalEl.textContent = 'kr ' + (boxVal * newTotal).toFixed(0);
  }
  refreshKasseNeedRows(bwId);
}

  const el = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');

function kasseSwitchModus(m) {

  const el = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
  if (el) renderLevKasse(el);
}

function kasseNavWeek(week, year) {

function kasseDeltaCount(bwId, delta) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  bw.count = Math.max(0, (bw.count || 0) + delta);
  saveLevering();
  // Update display without full re-render
  const disp = document.getElementById('kasse-count-disp-' + bwId);
  if (disp) disp.textContent = bw.count;
  const inp = document.getElementById('kasse-count-input-' + bwId);
  if (inp) inp.value = bw.count;
  const totalEl = document.getElementById('kasse-total-' + bwId);
  if (totalEl) {
    const bv = (bw.items||[]).reduce((s,it) => s + calcItemValue(crops.find(c=>c.id===it.cropId), it.qty||0, it.unit), 0);
    totalEl.innerHTML = '<div style="font-size:16px;color:var(--accent-soft);font-weight:300">kr ' + (bv * bw.count).toFixed(0) + '</div><div style="font-size:10px;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase">totalt</div>';
  }
  (bw.items||[]).forEach((item, ii) => {
    const el = document.getElementById('kasse-need-' + bwId + '-' + ii);
    if (el) el.textContent = 'Totalt: ' + (bw.count ? (item.qty||0)*bw.count+' '+item.unit : '–');
  });
}

function kassePakkCheck(bwId, ii, rowEl) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw) return;
  if (!bw.checklist) bw.checklist = {};
  bw.checklist[ii] = !bw.checklist[ii];
  saveLevering();
  // Re-render for accuracy
  const el = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');

// Returns true if bw has items whose current total > what's been logged
function bwHasUnloggedDelta(bw) {
  if (!bw?.items?.length) return false;
  if (!bw.loggedQtys) return true; // never logged at all
  const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCu = btCu.filter(cu => bw.customerWeek?.[cu.id || cu.name] !== false);
  const totalCount = activeCu.length + (bw.extraBoxes || 0);
  return bw.items.some(item => {
    if (!item.qty) return false;
    const totalQty = item.qty * totalCount;
    return totalQty > (bw.loggedQtys[item.cropId] || 0);
  });
}

function updateKasseItem(bwId, idx, field, val) {
  const bw = boxWeeks.find(b => b.id == bwId);
  if (!bw?.items?.[idx]) return;
  bw.items[idx][field] = field === 'qty' ? +val : val;
  // If there's now unlogged delta, re-enable the log button
  if (bw.harvested && bwHasUnloggedDelta(bw)) {
    bw.harvested = false;
    const logBtn = document.getElementById('kasse-log-btn-' + bwId);
    if (logBtn) {
      logBtn.textContent = 'Logg endringer';
      logBtn.disabled = false;
      logBtn.style.opacity = '';
      logBtn.style.cursor = 'pointer';
    }
  }
  saveLevering();
  const item = bw.items[idx];
  const cr = crops.find(c => c.id == item.cropId);
  // Update totals display
  const btCuForNeed = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCuForNeed = btCuForNeed.filter(cu => bw.customerWeek?.[cu.id || cu.name] !== false);
  const totalCount2 = activeCuForNeed.length + (bw.extraBoxes || 0);
  const totalNeeded = (item.qty||0) * totalCount2;
  const needEl = document.getElementById('kasse-need-' + bwId + '-' + idx);
  if (needEl) needEl.textContent = totalCount2 ? totalNeeded + ' ' + item.unit + ' totalt' : '–';
  const priceEl = document.getElementById('kasse-price-' + bwId + '-' + idx);
  if (priceEl && cr) {
    const perKasse = calcItemValue(cr, item.qty||0, item.unit);
    priceEl.textContent = perKasse > 0 ? 'kr ' + perKasse.toFixed(0) + ' per kasse' : '';
  }
  // Always refresh the total and pris/innhold card
  refreshKassePriceCard(bwId);
}

    showSyncToast('Ingen oppsett å kopiere fra ennå');

  const modal = document.createElement('div');

  let html = '<div style="background:var(--bg-modal);border:1px solid var(--border-accent);border-radius:16px;padding:20px;max-width:380px;width:100%;max-height:80vh;overflow-y:auto">'
    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    + '<div style="font-size:15px;color:var(--accent-soft)">⧉ Kopier innhold fra</div>'
    + '<button onclick="document.getElementById(\'dup-week-modal\').remove()" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;line-height:1">×</button>'
    + '</div>';

  // ── Base items per kassetype ──
  if (baseItemSources.length) {
    html += '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:6px">Basis-oppsett</div>';
    baseItemSources.forEach(bt => {
      const isCurrent = String(bt.id) === String(boxTypeId);
      html += '<button data-src-base="' + bt.id + '" data-bt-id="' + boxTypeId + '" data-week="' + currentWeek + '" data-year="' + currentYear + '" onclick="doDuplicateFromBase(this.dataset.srcBase,this.dataset.btId,+this.dataset.week,+this.dataset.year)"'
        + ' style="display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 12px;margin-bottom:5px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-head);cursor:pointer;font-size:13px;font-family:inherit;text-align:left">'
        + '<span>' + bt.name + (isCurrent ? ' <span style="color:var(--text-muted);font-size:11px">(denne)</span>' : '') + '</span>'
        + '<span style="font-size:12px;color:var(--accent-soft)">Basis · ' + bt.baseItems.length + ' vekster</span>'
        + '</button>';
    });
  }

  // ── Historical weeks grouped by kassetype ──
  if (others.length) {
    const grouped = {};
    others.forEach(bw => {
      const key = String(bw.boxTypeId);
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(bw);
    });

    // Sort: current type first, then others alphabetically
    const sortedKeys = Object.keys(grouped).sort((a, b) => {
      if (a === String(boxTypeId)) return -1;
      if (b === String(boxTypeId)) return 1;
      const na = boxTypes.find(t => String(t.id) === a)?.name || '';
      const nb = boxTypes.find(t => String(t.id) === b)?.name || '';
      return na.localeCompare(nb);
    });

    sortedKeys.forEach(btId => {
      const bt = boxTypes.find(t => String(t.id) === btId);
      const label = bt ? bt.name : 'Ukjent kassetype';
      const isSameType = String(btId) === String(boxTypeId);
      html += '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin:12px 0 6px">'
        + label + (isSameType ? ' <span style="color:var(--text-dim)">(denne)</span>' : '') + '</div>';
      [...grouped[btId]].sort((a,b) => b.year - a.year || b.week - a.week).forEach(bw => {
        const isCurrentWeek = bw.week == currentWeek && bw.year == currentYear;
        html += '<button data-src-id="' + bw.id + '" data-bt-id="' + boxTypeId + '" data-week="' + currentWeek + '" data-year="' + currentYear + '" onclick="doDuplicateWeek(this.dataset.srcId,this.dataset.btId,+this.dataset.week,+this.dataset.year)"'

          + '<span style="font-size:12px;color:var(--text-muted)">' + bw.items.length + ' vekster</span>'

function autoHarvestBoxWeek(bwId) {
  bwId = String(bwId);
  const bw = boxWeeks.find(b=>String(b.id)==bwId);
  if (!bw || !bw.items?.length) { showSyncToast('Legg til vekster først'); return; }
  if (!bw.customerWeek) bw.customerWeek = {};
  if (bw.extraBoxes === undefined) bw.extraBoxes = 0;
  if (!bw.loggedQtys) bw.loggedQtys = {}; // cropId → total qty already logged this week

  const btCu = deliveryCustomers.filter(cu => String(cu.boxTypeId) == String(bw.boxTypeId));
  const activeCu = btCu.filter(cu => bw.customerWeek[cu.id || cu.name] !== false);
  const totalCount = activeCu.length + (bw.extraBoxes || 0);
  if (!totalCount) { showSyncToast('Ingen aktive kasser denne uken'); return; }

  const today = new Date().toISOString().split('T')[0];
  const bt = boxTypes.find(t=>t.id==bw.boxTypeId);

  // Calculate deltas — only log what hasn't been logged yet
  const toLog = [];
  bw.items.forEach(item => {
    if (!item.qty) return;
    const totalQty = item.qty * totalCount;
    const alreadyLogged = bw.loggedQtys[item.cropId] || 0;
    const delta = totalQty - alreadyLogged;
    if (delta > 0) toLog.push({ item, totalQty, delta });
  });

  if (!toLog.length) { showSyncToast('Ingen nye endringer å logge'); return; }

  snapshotLev();
  toLog.forEach(({ item, totalQty, delta }) => {
    harvestLog.unshift({
      id: Date.now()+Math.random(), date: today,
      cropId: item.cropId, bedId: null,
      qty: delta, unit: item.unit,
      dest: 'kasse',
      note: (bt?.name||'Kasse') + ' uke ' + bw.week
    });
    // Update logged qty to full current total
    bw.loggedQtys[item.cropId] = totalQty;
  });

  // Mark all items as checked
  if (!bw.checklist) bw.checklist = {};
  (bw.items||[]).forEach((_, ii) => { bw.checklist[ii] = true; });

  // Mark as harvested — but re-enable if content changes later (handled in render)
  bw.harvested = true;

  saveLevering();
  const plural = toLog.length !== 1;
  showSyncToast('✓ Logget ' + toLog.length + ' vekst' + (plural?'er':'') + ' til Høstelogg');

  // Update button inline
  const logBtn = document.getElementById('kasse-log-btn-' + bwId);
  if (logBtn) {
    logBtn.textContent = '✓ Ferdiglogget';
    logBtn.disabled = true;
    logBtn.style.opacity = '0.5';
    logBtn.style.cursor = 'default';
  } else {
    const el = document.getElementById('lev-overlay-content')||document.getElementById('lev-tab-content');
    if (el) renderLevKasse(el);
  }
}

function calcBoxValue(box) {
  return box.reduce((sum, item) => {
    const cr = crops.find(c => c.id === item.cropId);
    return sum + calcItemValue(cr, item.qty, item.unit);
  }, 0);
}

function calcItemValue(cr, qty, unit) {
  if (!cr || !qty) return 0;
  const pkg = cr.pricePerKg || 0;
  const ppu = cr.pricePerUnit || (pkg && cr.weightG ? +(pkg * cr.weightG / 1000).toFixed(2) : pkg);
  if (unit === 'kg')   return qty * pkg;
  if (unit === 'g')    return (qty / 1000) * pkg;
  if (unit === 'stk')  return qty * ppu;
  if (unit === 'bunt') return qty * ppu;
  if (unit === 'boks') return qty * ppu;
  return 0;
}

// ── Marked ──────────────────────────────────────────────────────
function renderLevMarked(el) {
  const isLight = document.body.classList.contains('light');
  const MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  function fmtDate(d) { if (!d) return ''; const [day,m,y] = d.split('-'); return (+day) + '. ' + (MONTHS[+m-1]||'') + ' ' + y; }

  // If a specific market is selected, show Plan/Plukk for it
  if (markedViewIdx !== null && deliveryMarket[markedViewIdx]) {
    renderMarkedDetail(el, markedViewIdx);
    return;
  }

  // ── Market list ──
  const sorted = [...deliveryMarket].map((m,i) => ({...m, _idx:i})).sort((a,b) => {
    if (!a.date && !b.date) return 0;
    if (!a.date) return 1; if (!b.date) return -1;
    return a.date.split('-').reverse().join('-').localeCompare(b.date.split('-').reverse().join('-'));
  });
  const upcoming = sorted.filter(m => !m.done);
  const past = sorted.filter(m => m.done);

  let html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    + '<div style="font-size:13px;color:var(--text-muted)">' + deliveryMarket.length + ' marked' + (deliveryMarket.length!==1?'er':'') + '</div>'
    + '<button onclick="openNewMarket()" style="padding:7px 16px;border-radius:20px;border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent-soft);cursor:pointer;font-size:12px;font-family:inherit">+ Nytt marked</button>'
    + '</div>';

  if (!upcoming.length && !past.length) {
    html += '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px">🛒<br><br>Ingen markeder ennå.<br>Trykk «+ Nytt marked» for å legge til.</div>';
  } else {
    upcoming.forEach(mkt => {
      const i = mkt._idx;
      const n = (mkt.items||[]).length;
      const totalVal = (mkt.items||[]).reduce((s,item) => s + calcItemValue(crops.find(c=>c.id===item.cropId), item.qty||0, item.unit), 0);
      const doneCount = (mkt.items||[]).filter(item => item.harvested).length;
      const pct = n > 0 ? Math.round(doneCount/n*100) : 0;
      html += '<div onclick="markedViewIdx=' + i + ';renderLevMarked(document.getElementById(\'lev-overlay-content\')||document.getElementById(\'lev-tab-content\'))"'
        + ' style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer">'
        + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:' + (n > 0 ? '10' : '0') + 'px">'
        + '<div>'
        + '<div style="font-size:15px;color:var(--text-head)">' + (mkt.name||'Marked') + '</div>'
        + (mkt.date ? '<div style="font-size:12px;color:var(--text-muted);margin-top:2px">📅 ' + fmtDate(mkt.date) + '</div>' : '')
        + '</div>'
        + '<div style="text-align:right">'
        + (totalVal > 0 ? '<div style="font-size:14px;color:var(--accent-soft)">kr ' + totalVal.toFixed(0) + '</div>' : '')
        + '<div style="font-size:11px;color:var(--text-muted)">' + n + ' vekst' + (n!==1?'er':'') + '</div>'
        + '</div></div>'
        + (n > 0 ? '<div style="height:4px;border-radius:2px;background:' + (isLight?'rgba(0,0,0,0.08)':'rgba(255,255,255,0.08)') + ';overflow:hidden">'
          + '<div style="height:100%;background:var(--accent);width:' + pct + '%;border-radius:2px;transition:width 0.3s"></div></div>' : '')
        + '</div>';
    });
    if (past.length) {
      html += '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin:16px 0 8px">Historikk</div>';
      past.forEach(mkt => {
        const i = mkt._idx;
        html += '<div onclick="markedViewIdx=' + i + ';renderLevMarked(document.getElementById(\'lev-overlay-content\')||document.getElementById(\'lev-tab-content\'))"'
          + ' style="background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:6px;opacity:0.55;cursor:pointer">'
          + '<div style="font-size:14px;color:var(--text-muted)">' + (mkt.name||'Marked') + '</div>'
          + (mkt.date ? '<div style="font-size:11px;color:var(--text-muted)">' + fmtDate(mkt.date) + '</div>' : '')
          + '</div>';
      });
    }
  }
  el.innerHTML = html;
}

function renderMarkedDetail(el, mktIdx) {
  const mkt = deliveryMarket[mktIdx];
  if (!mkt) { markedViewIdx = null; renderLevMarked(el); return; }
  const isLight = document.body.classList.contains('light');
  const MONTHS = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  function fmtDate(d) { if (!d) return ''; const [day,m,y] = d.split('-'); return (+day)+'. '+(MONTHS[+m-1]||'')+' '+y; }

  let html = '';

  // ── Back + title bar ──
  html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">'
    + '<button onclick="markedViewIdx=null;markedModus=\'plan\';renderLevMarked(document.getElementById(\'lev-overlay-content\')||document.getElementById(\'lev-tab-content\'))"'
    + ' style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:20px;padding:0;line-height:1">←</button>'
    + '<div style="flex:1">'
    + '<div style="font-size:16px;color:var(--text-head)">' + (mkt.name||'Marked') + '</div>'
    + (mkt.date ? '<div style="font-size:12px;color:var(--text-muted)">📅 ' + fmtDate(mkt.date) + '</div>' : '')
    + '</div>'
    + '<button onclick="markedOpenEdit(' + mktIdx + ')" style="padding:5px 12px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit">Rediger</button>'
    + '</div>';

  // ── Plan / Plukk toggle ──
  html += '<div style="display:flex;background:' + (isLight?'rgba(0,0,0,0.06)':'rgba(255,255,255,0.06)') + ';border-radius:14px;padding:4px;margin-bottom:20px">';
  [['plan','📋 Plan'],['plukk','📦 Plukk']].forEach(([m,label]) => {
    const active = markedModus === m;
    html += '<button onclick="markedModus=\'' + m + '\';try{localStorage.setItem(\'mh_marked_modus\',\'' + m + '\')}catch(e){}renderLevMarked(document.getElementById(\'lev-overlay-content\')||document.getElementById(\'lev-tab-content\'))"'
      + ' style="flex:1;padding:10px 8px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-family:inherit;font-weight:' + (active?'600':'400') + ';'
      + 'background:' + (active?(isLight?'#fff8f0':'var(--bg-card)'):'transparent') + ';'
      + 'color:' + (active?'var(--text-head)':'var(--text-muted)') + ';'
      + 'box-shadow:' + (active?'0 1px 4px rgba(0,0,0,0.15)':'none') + ';transition:all 0.2s">' + label + '</button>';
  });
  html += '</div>';

  const items = mkt.items || [];
  const totalVal = items.reduce((s,item) => s + calcItemValue(crops.find(c=>c.id===item.cropId), item.qty||0, item.unit), 0);

  if (markedModus === 'plan') {
    // ── Summary card ──
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;margin-bottom:16px">'
      + '<div><div style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px">Vekster planlagt</div>'
      + '<div style="font-size:26px;font-weight:300;color:var(--text-head)">' + items.length + '</div></div>'
      + '<div style="text-align:right"><div style="font-size:16px;color:var(--accent-soft);font-weight:300">kr ' + totalVal.toFixed(0) + '</div>'
      + '<div style="font-size:10px;color:var(--text-muted);letter-spacing:0.06em;text-transform:uppercase">estimert</div></div>'
      + '</div>';

    // ── Crop grid — grouped by kategori ──
    const selIds = new Set(items.map(i => i.cropId));
    const CATS = cropCategories;
    const grouped = {};
    CATS.forEach(c => grouped[c] = []);
    crops.forEach(cr => { const cat = cr.category || 'Andre'; if (grouped[cat]) grouped[cat].push(cr); else (grouped['Andre']||grouped[CATS[CATS.length-1]]).push(cr); });
    html += '<div>';
    CATS.forEach(cat => {
      const catCrops = grouped[cat];
      if (!catCrops.length) return;
      html += '<div style="font-size:10px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin:8px 0 6px">' + cat + '</div>';
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-bottom:4px">';
      catCrops.forEach(cr => {
        const sel = selIds.has(cr.id);
        html += '<button data-mkt-idx="' + mktIdx + '" data-crop-id="' + cr.id + '" onclick="markedToggleCrop(this)"'
          + ' style="padding:8px 4px;border-radius:10px;border:2px solid ' + (sel?'var(--accent)':'var(--border)') + ';'
          + 'background:' + (sel?'var(--accent-bg)':'transparent') + ';cursor:pointer;'
          + 'display:flex;flex-direction:column;align-items:center;gap:3px;'
          + 'color:' + (sel?'var(--accent-soft)':'var(--text-muted)') + ';font-family:inherit">'
          + '<span style="font-size:22px">' + cr.emoji + '</span>'
          + '<span style="font-size:10px;text-align:center;line-height:1.2">' + (cr.family||cr.name) + '</span>'
          + '</button>';
      });
      html += '</div>';
    });
    html += '</div>';

    // ── Amounts ──
    if (items.length) {
      html += '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">Mengde</div>';
      items.forEach((item, ii) => {
        const cr = crops.find(c => c.id === item.cropId);
        if (!cr) return;
        const val = calcItemValue(cr, item.qty||0, item.unit);
        html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)">'
          + '<span style="font-size:20px">' + cr.emoji + '</span>'
          + '<div style="flex:1"><div style="font-size:13px;color:var(--text-head)">' + (cr.family||cr.name) + '</div>'
          + (val > 0 ? '<div style="font-size:11px;color:var(--accent-soft)">kr ' + val.toFixed(0) + '</div>' : '')
          + '</div>'
          + '<input type="number" min="0" step="1" value="' + (item.qty||'') + '" placeholder="0"'
          + ' data-mkt-idx="' + mktIdx + '" data-item-idx="' + ii + '" oninput="markedUpdateQty(this)"'
          + ' style="width:60px;padding:8px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-head);font-size:14px;font-family:inherit;text-align:center">'
          + '<select data-mkt-idx="' + mktIdx + '" data-item-idx="' + ii + '" onchange="markedUpdateUnit(this)"'
          + ' style="padding:8px 6px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-head);font-size:12px;font-family:inherit">'
          + ['stk','kg','bunt','boks'].map(u => '<option value="' + u + '"' + (item.unit===u?' selected':'') + '>' + u + '</option>').join('')
          + '</select>'
          + '<button data-mkt-idx="' + mktIdx + '" data-item-idx="' + ii + '" onclick="markedRemoveItem(this)"'
          + ' style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px;padding:2px;line-height:1">×</button>'
          + '</div>';
      });
    }

  } else {
    // ── PLUKK-MODUS ──
    const doneCount = items.filter(i => i.harvested).length;
    const allDone = items.length > 0 && doneCount === items.length;
    const pct = items.length > 0 ? Math.round(doneCount/items.length*100) : 0;

    // Hero card
    html += '<div style="background:var(--bg-card);border:1px solid ' + (allDone?'rgba(52,211,153,0.4)':'var(--border)') + ';border-radius:16px;padding:16px 18px;margin-bottom:20px">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      + '<div><div style="font-size:30px;font-weight:300;color:' + (allDone?'#34d399':'var(--accent-soft)') + ';line-height:1">'
      + doneCount + '<span style="font-size:16px;color:var(--text-muted)">/' + items.length + '</span></div>'
      + '<div style="font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px">vekster klare</div>'
      + '</div>'
      + (allDone ? '<div style="font-size:28px">🎉</div>' : '<div style="font-size:14px;color:var(--accent-soft)">kr ' + totalVal.toFixed(0) + '</div>')
      + '</div>'
      + '<div style="height:6px;border-radius:3px;background:' + (isLight?'rgba(0,0,0,0.1)':'rgba(255,255,255,0.1)') + ';overflow:hidden">'
      + '<div style="height:100%;border-radius:3px;background:' + (allDone?'#34d399':'var(--accent)') + ';width:' + pct + '%;transition:width 0.3s"></div>'
      + '</div></div>';

    if (!items.length) {
      html += '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Ingen vekster ennå.<br>'
        + '<button onclick="markedModus=\'plan\';renderLevMarked(document.getElementById(\'lev-overlay-content\')||document.getElementById(\'lev-tab-content\'))"'
        + ' style="margin-top:10px;padding:8px 20px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:inherit">← Gå til Plan</button></div>';
    } else {
      items.forEach((item, ii) => {
        const cr = crops.find(c => c.id === item.cropId);
        if (!cr) return;
        const done = !!item.harvested;
        const val = calcItemValue(cr, item.qty||0, item.unit);
        html += '<div data-mkt-idx="' + mktIdx + '" data-item-idx="' + ii + '" onclick="markedToggleHarvest(this)"'
          + ' style="display:flex;align-items:center;gap:14px;padding:16px 14px;'
          + 'background:' + (done?(isLight?'rgba(0,0,0,0.03)':'rgba(255,255,255,0.03)'):'var(--bg-card)') + ';'
          + 'border:2px solid ' + (done?(isLight?'rgba(0,0,0,0.1)':'rgba(255,255,255,0.1)'):'var(--border)') + ';'
          + 'border-radius:14px;margin-bottom:8px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:all 0.15s">'
          + '<div style="width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;'
          + 'background:' + (done?'var(--accent)':'transparent') + ';'
          + 'border:2px solid ' + (done?'var(--accent)':(isLight?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.25)')) + ';'
          + 'color:' + (isLight?'#1c1410':'#0d1a0e') + ';font-size:16px">' + (done?'✓':'') + '</div>'
          + '<span style="font-size:28px;flex-shrink:0;' + (done?'opacity:0.4':'') + '">' + cr.emoji + '</span>'
          + '<div style="flex:1;' + (done?'opacity:0.45':'') + '">'
          + '<div style="font-size:16px;color:var(--text-head);' + (done?'text-decoration:line-through':'') + '">' + (cr.family||cr.name) + '</div>'
          + '<div style="font-size:13px;color:var(--text-muted);margin-top:2px">'
          + (item.qty ? item.qty + ' ' + item.unit : 'Ingen mengde satt')
          + (val > 0 ? ' · kr ' + val.toFixed(0) : '') + '</div>'
          + '</div></div>';
      });

      if (allDone) {
        html += '<button data-mkt-idx="' + mktIdx + '" onclick="markedLogHarvest(this)" style="width:100%;margin-top:8px;padding:16px;border-radius:14px;border:none;background:var(--accent);color:' + (isLight?'#1c1410':'#0d1a0e') + ';cursor:pointer;font-size:15px;font-family:inherit;font-weight:600">✓ Logg som høstet</button>';
      } else {
        html += '<button data-mkt-idx="' + mktIdx + '" onclick="markedLogHarvest(this)" style="width:100%;margin-top:8px;padding:14px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;font-family:inherit">Logg som høstet</button>';
      }
    }
  }

  el.innerHTML = html;
}

function markedToggleCrop(el) {
  const mktIdx = +el.dataset.mktIdx;
  const cropId = +el.dataset.cropId;
  const mkt = deliveryMarket[mktIdx];
  if (!mkt) return;
  snapshotLev();
  if (!mkt.items) mkt.items = [];
  const idx = mkt.items.findIndex(i => i.cropId === cropId);
  if (idx >= 0) mkt.items.splice(idx, 1);
  else mkt.items.push({ cropId, qty: 1, unit: 'stk', harvested: false });
  saveLevering();
  const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
  if (cont) renderMarkedDetail(cont, mktIdx);
}

function markedUpdateQty(el) {
  const mktIdx = +el.dataset.mktIdx;
  const itemIdx = +el.dataset.itemIdx;
  if (deliveryMarket[mktIdx]?.items?.[itemIdx]) {
    deliveryMarket[mktIdx].items[itemIdx].qty = +el.value;
    saveLevering();
  }
}

function markedUpdateUnit(el) {
  const mktIdx = +el.dataset.mktIdx;
  const itemIdx = +el.dataset.itemIdx;
  if (deliveryMarket[mktIdx]?.items?.[itemIdx]) {
    deliveryMarket[mktIdx].items[itemIdx].unit = el.value;
    saveLevering();
    const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
    if (cont) renderMarkedDetail(cont, mktIdx);
  }
}

function markedRemoveItem(el) {
  const mktIdx = +el.dataset.mktIdx;
  const itemIdx = +el.dataset.itemIdx;
  const mkt = deliveryMarket[mktIdx];
  if (!mkt) return;
  snapshotLev();
  mkt.items.splice(itemIdx, 1);
  saveLevering();
  const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
  if (cont) renderMarkedDetail(cont, mktIdx);
}

function markedToggleHarvest(el) {
  const mktIdx = +el.dataset.mktIdx;
  const itemIdx = +el.dataset.itemIdx;
  const mkt = deliveryMarket[mktIdx];
  if (!mkt?.items?.[itemIdx]) return;
  mkt.items[itemIdx].harvested = !mkt.items[itemIdx].harvested;
  saveLevering();
  const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
  if (cont) renderMarkedDetail(cont, mktIdx);
}

function markedLogHarvest(el) {
  const mktIdx = +el.dataset.mktIdx;
  const mkt = deliveryMarket[mktIdx];
  if (!mkt) return;
  snapshotLev();
  const today = new Date().toISOString().split('T')[0];
  (mkt.items||[]).forEach(item => {
    if (!item.qty) return;
    harvestLog.unshift({ id: Date.now()+Math.random(), date: today, cropId: item.cropId, bedId: null, qty: item.qty, unit: item.unit, dest: 'marked', note: mkt.name });
  });
  mkt.done = true;
  mkt.items.forEach(i => i.harvested = true);
  saveLevering();
  showSyncToast('✓ Høsting logget for ' + (mkt.name||'Marked'));
  const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
  if (cont) renderMarkedDetail(cont, mktIdx);
}

function markedOpenEdit(mktIdx) {
  const mkt = deliveryMarket[mktIdx];
  if (!mkt) return;
  const modal = document.createElement('div');
  modal.id = 'market-edit-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:6000;display:flex;align-items:flex-end;justify-content:center';
  modal.innerHTML = '<div style="background:var(--bg-modal);border:1px solid var(--border-accent);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px">'
    + '<div style="font-size:15px;color:var(--accent-soft);margin-bottom:14px">Rediger marked</div>'
    + '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">'
    + '<input id="mkt-edit-name" value="' + (mkt.name||'') + '" placeholder="Navn" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-head);font-size:14px;font-family:inherit">'
    + '<button type="button" id="mkt-edit-date-btn" onclick="event.stopPropagation();openMarketDatePicker()" style="padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-muted);font-size:14px;font-family:inherit;text-align:left;cursor:pointer">' + (mkt.date ? '📅 ' + mkt.date : 'Velg dato 📅') + '</button>'
    + '<input type="hidden" id="mkt-edit-date-val" value="' + (mkt.date||'') + '">'
    + '</div>'
    + '<div style="display:flex;gap:8px">'
    + '<button onclick="markedConfirmDelete(' + mktIdx + ',this)" style="padding:11px;border-radius:10px;border:1px solid rgba(248,113,113,0.3);background:transparent;color:#f87171;cursor:pointer;font-size:14px;font-family:inherit">× Slett</button>'
    + '<button onclick="markedSaveEdit(' + mktIdx + ')" style="flex:1;padding:11px;border-radius:10px;border:none;background:var(--accent);color:var(--bg-main);cursor:pointer;font-size:14px;font-family:inherit">Lagre</button>'
    + '<button onclick="document.getElementById(\'market-edit-modal\').remove()" style="flex:1;padding:11px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;font-family:inherit">Avbryt</button>'
    + '</div></div>';
  document.body.appendChild(modal);
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function markedSaveEdit(mktIdx) {
  const mkt = deliveryMarket[mktIdx];
  if (!mkt) return;
  const name = document.getElementById('mkt-edit-name')?.value.trim();
  const date = document.getElementById('mkt-edit-date-val')?.value;
  snapshotLev();
  if (name) mkt.name = name;
  if (date !== undefined) mkt.date = date;
  saveLevering();
  document.getElementById('market-edit-modal')?.remove();
  const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
  if (cont) renderMarkedDetail(cont, mktIdx);
}

function markedConfirmDelete(mktIdx, btn) {
  if (btn.dataset.confirmed) {
    snapshotLev();
    deliveryMarket.splice(mktIdx, 1);
    markedViewIdx = null;
    saveLevering();
    document.getElementById('market-edit-modal')?.remove();
    const cont = document.getElementById('lev-overlay-content') || document.getElementById('lev-tab-content');
    if (cont) renderLevMarked(cont);
    return;
  }
  btn.dataset.confirmed = '1';
  btn.textContent = 'Bekreft sletting';
  btn.style.background = 'rgba(248,113,113,0.15)';
  setTimeout(() => { if (btn.dataset.confirmed) { btn.dataset.confirmed=''; btn.textContent='× Slett'; btn.style.background='transparent'; } }, 3000);
}

function openNewMarketDatePicker(btn) { openCal('mkt-date-btn', 'mkt-date-val'); }
function openMarketDatePicker() { const b=document.getElementById('mkt-edit-date-btn'); if(b) openCal('mkt-edit-date-btn','mkt-edit-date-val'); }
function saveNewMarket() {
  snapshotLev();
  const name = document.getElementById('mkt-name')?.value.trim() || 'Marked';
  const date = document.getElementById('mkt-date-val')?.value || '';
  deliveryMarket.push({ id: Date.now(), name, date, items: [] });
