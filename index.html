<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1a0e">
<meta name="description" content="Planleggingsverktøy for markedshage">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>Markedshage Assistenten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  :root {
    --bg-main: #0d1a0e;
    --bg-grad: linear-gradient(135deg, #0d1a0e 0%, #1a2e1b 40%, #0d1a0e 100%);
    --bg-header: rgba(13,26,14,0.92);
    --bg-nav: rgba(13,26,14,0.98);
    --bg-card: rgba(255,255,255,0.04);
    --bg-input: rgba(255,255,255,0.06);
    --bg-modal: #1a2e1b;
    --border: rgba(255,255,255,0.08);
    --border-accent: rgba(52,211,153,0.15);
    --text-main: #e8f5e9;
    --text-head: #d1fae5;
    --text-muted: #6b7280;
    --text-dim: #4b5563;
    --accent: #34d399;
    --accent-soft: #6ee7b7;
    --accent-bg: rgba(52,211,153,0.12);
    --task-bg: rgba(255,255,255,0.05);
    --task-border: rgba(255,255,255,0.07);
  }
  body.harvest {
    --accent: #c2410c;
    --accent-soft: #ea580c;
    --accent-bg: rgba(194,65,12,0.08);
    --border-accent: rgba(194,65,12,0.25);
  }
  body.harvest.light {
    --accent: #9a3412;
    --accent-soft: #c2410c;
    --accent-bg: rgba(154,52,18,0.08);
  }

    body.light {
    --bg-main: #f5f0e8;
    --bg-grad: linear-gradient(135deg, #f5f0e8 0%, #faf7f2 50%, #f5f0e8 100%);
    --bg-header: rgba(245,240,232,0.98);
    --bg-nav: rgba(245,240,232,0.99);
    --bg-card: #fff8f0;
    --bg-input: #fff8f0;
    --bg-modal: #faf7f2;
    --border: rgba(214,201,176,0.8);
    --border-accent: rgba(107,76,42,0.3);
    --text-main: #1c1410;
    --text-head: #1c1410;
    --text-muted: #6b4c2a;
    --text-dim: #9c8674;
    --accent: #6b4c2a;
    --accent-soft: #6b4c2a;
    --accent-bg: rgba(107,76,42,0.1);
    --task-bg: #fff8f0;
    --task-border: rgba(214,201,176,0.8);
  }

  body {
    min-height: 100vh;
    background: var(--bg-grad) fixed;
    background-size: 100% 100%;
    font-family: Georgia, 'Times New Roman', serif;
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg-header);
    backdrop-filter: blur(12px);
    padding: 14px 16px 14px;
    border-bottom: 1px solid rgba(52,211,153,0.1);
  }
  .header-top { margin-bottom: 0; }
  .header-eyebrow { font-size: 10px; letter-spacing: 0.3em; color: #6ee7b7; text-transform: uppercase; margin-bottom: 2px; }
  h1 { font-size: 20px; font-weight: 400; color: var(--text-head); }

  /* BOTTOM NAV */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg-nav);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border-accent);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex: 1; min-width: 0; padding: 20px 2px 18px;
    border: none; background: transparent;
    color: var(--text-dim); font-size: 13px; font-weight: 600; font-family: inherit;
    cursor: pointer; border-top: 3px solid transparent;
    transition: all 0.2s; letter-spacing: 0.04em;
  }
  .tab-btn.active { color: var(--accent-soft); border-top-color: var(--accent); }

  /* MAIN */
  main { padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 110px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
  }
  .stat-icon { font-size: 20px; margin-bottom: 6px; }
  .stat-val { font-size: 30px; font-weight: 300; line-height: 1; }
  .stat-label { font-size: 10px; color: #9ca3af; margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* CARDS */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 16px; margin-bottom: 14px;
  }
  .card-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent-soft); margin-bottom: 12px; }

  /* LIST ROWS */
  .list-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .list-row:last-child { border-bottom: none; }

  /* BADGE */
  .badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

  /* BED GRID */
  .bed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .bed-cell {
    border-radius: 10px; padding: 12px 10px; cursor: pointer;
    transition: all 0.2s; min-height: 80px;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.08);
  }
  .bed-cell.occupied { background: rgba(52,211,153,0.07); border-color: rgba(52,211,153,0.25); }
  body.light .bed-cell.occupied { background: rgba(107,76,42,0.08); border-color: rgba(107,76,42,0.25); }
  .bed-cell.selected { border-color: #34d399 !important; }
  .bed-label { font-size: 10px; color: #6b7280; letter-spacing: 0.12em; text-transform: uppercase; }
  .bed-emoji { float: right; font-size: 16px; }
  .bed-name { font-size: 13px; color: var(--text-head); margin-top: 8px; }
  .bed-empty { font-size: 11px; color: #6b7280; margin-top: 10px; }
  .bed-detail {
    margin-top: 14px;
    background: rgba(52,211,153,0.08);
    border: 1px solid rgba(52,211,153,0.25);
    border-radius: 12px; padding: 16px;
  }
  body.light .cal-popup { border-color: var(--border-accent) !important; }
  body.light .cal-popup .cal-dow { color: var(--text-muted); }
  body.light .cal-popup .cal-day { color: var(--text-head); }
  body.light .cal-clear { color: var(--accent-soft); }
  body.light .cal-nav { color: var(--accent-soft); }
  body.light .cal-month-label { color: var(--text-head); }

  body.light .bed-detail {
    background: var(--bg-card);
    border-color: var(--border);
  }

  /* end removed */
  .crop-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .crop-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .crop-info { display: flex; gap: 10px; align-items: center; }
  .crop-name { font-size: 15px; color: var(--text-head); }
  .crop-family { font-size: 11px; color: #6b7280; }
  .crop-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 11px; color: #6b7280; margin-bottom: 10px; }
  .crop-meta span { color: var(--text-head); }
  .crop-notes { font-size: 11px; color: #9ca3af; font-style: italic; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px; margin-bottom: 10px; }
  .status-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .status-btn { flex: 1; min-width: 60px; padding: 5px 2px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: #4b5563; cursor: pointer; font-size: 10px; font-family: inherit; transition: all 0.15s; }
  .status-btn.active { border-color: var(--c); background: rgba(255,255,255,0.06); color: var(--c); }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #6b7280; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-soft); }

  /* TASKS */
  .task-section { margin-bottom: 20px; }
  .task-priority-label { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: var(--task-bg); border: 1px solid var(--task-border); border-radius: 10px; margin-bottom: 7px; transition: opacity 0.2s; }
  .task-row.done { opacity: 0.45; }
  .check-btn { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2); background: transparent; cursor: pointer; flex-shrink: 0; font-size: 13px; display: flex; align-items: center; justify-content: center; color: #0d1a0e; transition: all 0.15s; }
  .check-btn.checked { background: var(--accent); border-color: var(--accent); }
  .task-text { flex: 1; font-size: 13px; color: var(--text-head); }
  .task-row.done .task-text { text-decoration: line-through; }
  .task-date { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .delete-btn { background: none; border: none; color: #374151; cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; }

  /* BUTTONS */
  .add-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    border: 1px solid var(--accent); background: var(--accent-bg);
    color: var(--accent-soft); cursor: pointer; font-size: 14px; font-family: inherit;
    margin-bottom: 16px; transition: background 0.15s;
  }
  .add-btn:active { background: rgba(52,211,153,0.22); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--bg-modal); border: 1px solid rgba(52,211,153,0.3); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 400; color: var(--accent-soft); margin-bottom: 18px; }
  .field-label { font-size: 10px; color: #6b7280; display: block; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
  .field-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text-head); font-size: 15px; font-family: inherit; }
  .field-input:focus { outline: none; border-color: rgba(52,211,153,0.4); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-full { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid #34d399; background: rgba(52,211,153,0.2); color: #6ee7b7; cursor: pointer; font-size: 14px; font-family: inherit; }
  .btn-secondary { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #6b7280; cursor: pointer; font-size: 14px; font-family: inherit; }
  .priority-row { display: flex; gap: 8px; }
  .priority-btn { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer; font-size: 12px; font-family: inherit; color: #6b7280; transition: all 0.15s; }

  /* LIGHT MODE BORDER FIXES */
  body.light .bed-cell { border-color: rgba(0,0,0,0.15) !important; background: rgba(0,0,0,0.02); }
  body.light .bed-cell.occupied { background: rgba(107,76,42,0.08); border-color: rgba(107,76,42,0.3) !important; }
  body.light .bed-cell.selected { border-color: var(--accent) !important; }
  body.light .check-btn { border-color: rgba(0,0,0,0.3); }
  body.light .filter-btn { border-color: rgba(0,0,0,0.2); color: var(--text-muted); }
  body.light .filter-btn.active { border-color: var(--accent); }
  body.light .status-btn { border-color: rgba(0,0,0,0.15); color: var(--text-muted); }
  body.light .btn-secondary { border-color: rgba(0,0,0,0.2); color: var(--text-muted); }
  body.light .priority-btn { border-color: rgba(0,0,0,0.2); color: var(--text-muted); }
  body.light .cal-clear { border-color: rgba(0,0,0,0.2); color: var(--text-muted); }
  body.light .crop-notes { border-top-color: rgba(0,0,0,0.1); }
  body.light #undo-btn, body.light #redo-btn { border-color: rgba(0,0,0,0.2) !important; }
  body.light .date-display { border-color: rgba(0,0,0,0.2); color: var(--text-head); }
  body.light .field-input { border-color: rgba(0,0,0,0.2) !important; }
  body.light .task-row { border-color: rgba(0,0,0,0.1) !important; }
  body.light .modal { border-color: rgba(0,0,0,0.15); }
  body.light .map-tool-btn { border-color: rgba(0,0,0,0.2) !important; color: var(--text-muted) !important; }
  body.light .map-tool-btn.active { border-color: var(--accent) !important; color: var(--accent) !important; background: var(--accent-bg) !important; }

  /* MAP */
  .map-tool-btn { padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;font-size:12px;font-family:inherit;transition:all 0.15s; }
  .map-tool-btn.active { border-color:var(--accent);background:rgba(52,211,153,0.15);color:var(--accent-soft); }
  body.light .map-tool-btn { border-color:rgba(0,0,0,0.15);background:rgba(255,255,255,0.6);color:#4b7a52; }
  body.light .map-tool-btn.active { border-color:#16a34a;background:rgba(22,163,74,0.12);color:#15803d; }
  .map-bed { position:absolute;border-radius:6px;cursor:pointer;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:box-shadow 0.15s;user-select:none; }
  .map-bed:hover { box-shadow:0 0 0 2px white; }
  .map-bed.selected { box-shadow:0 0 0 2.5px white; }
  .map-extra { position:absolute;border-radius:4px;cursor:pointer;box-sizing:border-box;display:flex;align-items:center;justify-content:center;border:2px dashed #6b7280;background:rgba(107,114,128,0.12);color:var(--text-muted);font-size:12px; }

  /* DATE PICKER */
  .date-input-wrap { position: relative; }
  .date-display {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 10px 12px; color: var(--text-head); font-size: 15px;
    font-family: inherit; cursor: pointer; text-align: left; display: flex;
    justify-content: space-between; align-items: center;
  }
  .date-display:focus { outline: none; border-color: rgba(52,211,153,0.4); }
  .date-display.empty { color: #6b7280; }
  .cal-popup {
    position: fixed; z-index: 9999; background: var(--bg-modal);
    border: 1px solid rgba(52,211,153,0.35); border-radius: 16px;
    padding: 16px; width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav { background: none; border: none; color: #6ee7b7; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .cal-month-label { font-size: 14px; color: var(--text-head); font-family: inherit; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-dow { font-size: 10px; color: #6b7280; text-align: center; padding: 4px 0; letter-spacing: 0.05em; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 8px; cursor: pointer; color: var(--text-head);
    background: transparent; border: none; font-family: inherit; transition: background 0.1s;
  }
  .cal-day:hover { background: rgba(52,211,153,0.15); }
  .cal-day.today { color: var(--accent-soft); font-weight: bold; }
  .cal-day.selected { background: var(--accent) !important; color: #fff; }
  .cal-day.other-month { color: var(--text-dim); }
  .cal-day.empty { cursor: default; }
  body.light .cal-day { color: var(--text-head); }
  body.light .cal-day.today { color: var(--accent); }
  .cal-clear { margin-top: 10px; width: 100%; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #6b7280; font-family: inherit; font-size: 12px; cursor: pointer; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="header-top">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <div style="display:flex;align-items:center;gap:10px">
        <button onclick="toggleHarvestMode()" title="Åpne Innhøsting" style="background:none;border:none;cursor:pointer;padding:0;line-height:0;flex-shrink:0">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="width:42px;height:42px;border-radius:10px;display:block">
          <rect width="512" height="512" rx="110" fill="#1a1005"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(45 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#d4954a" opacity="0.85" transform="rotate(90 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(135 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#d4954a" opacity="0.85" transform="rotate(180 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(225 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#d4954a" opacity="0.85" transform="rotate(270 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(315 256 256)"/>
          <circle cx="256" cy="256" r="72" fill="#6b3d11"/>
          <circle cx="256" cy="256" r="55" fill="#4a2a08"/>
          <circle cx="256" cy="225" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="276" cy="238" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="276" cy="262" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="256" cy="275" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="236" cy="262" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="236" cy="238" r="6" fill="#c9a84c" opacity="0.5"/>
        </svg>
        </button>
        <div>
          <div class="header-eyebrow" style="font-size:9px;color:var(--text-muted);letter-spacing:0.3em">MARKEDSHAGE</div>
          <h1 style="font-size:16px;font-weight:600;color:var(--text-main);letter-spacing:0.02em;margin:0">Assistenten</h1>
        </div>
      </div>
      <div style="display:flex;gap:5px;align-items:center;position:relative">
        <button id="undo-btn" onclick="undo()" title="Angre (Ctrl+Z)" disabled style="padding:4px 8px;padding-top:6px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:15px;font-family:inherit;line-height:1;display:inline-flex;align-items:center;justify-content:center">↩</button>
        <button id="redo-btn" onclick="redo()" title="Gjør om (Ctrl+Y)" disabled style="padding:4px 8px;padding-top:6px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:15px;font-family:inherit;line-height:1;display:inline-flex;align-items:center;justify-content:center">↪</button>
        <button id="gist-btn" onclick="gistBtnClick(event)" title="Sky-synkronisering" style="padding:4px 8px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:15px;font-family:inherit;line-height:1">☁</button>

<script>
function fmtKr(val) {
  if (val >= 1000) {
    const k = val / 1000;
    const rounded = Math.round(k * 10) / 10;
    return (Number.isInteger(rounded) || rounded >= 10 ? Math.round(k) : rounded).toLocaleString('nb-NO') + 'k';
  }
  return Math.round(val).toLocaleString('nb-NO');
}

const STATUS = {
  planlagt:     { label: "Planlagt",     color: "#a78bfa", bg: "rgba(167,139,250,0.15)" },
  sådd:         { label: "Sådd",         color: "#60a5fa", bg: "rgba(96,165,250,0.15)" },

let crops = [
  { id:1, name:"Tomater",   emoji:"🍅", family:"Nattskygge",   rowSpacing:60, plantSpacing:50, rows:2, beds:["A1"], sownDate:"15-03-2026", sowLog:"", plantedDate:"", plantLog:"", status:"plantet",      pricePerKg:0, weightG:0, notes:"Trenger staking" },
  { id:2, name:"Gulrøtter", emoji:"🥕", family:"Skjermplanter", rowSpacing:20, plantSpacing:5,  rows:4, beds:["B2"], sownDate:"01-04-2026", sowLog:"", plantedDate:"",  plantLog:"", status:"planlagt",     pricePerKg:0, weightG:0, notes:"" },
  { id:3, name:"Salat",     emoji:"🥬", family:"Kurvplanter",   rowSpacing:30, plantSpacing:25, rows:3, beds:["C1","C2"], sownDate:"20-03-2026", sowLog:"", plantedDate:"", plantLog:"", status:"plantet", pricePerKg:0, weightG:0, notes:"Successjonssåing hver 2. uke" },
  { id:4, name:"Erter",     emoji:"🫛", family:"Belgvekster",   rowSpacing:20, plantSpacing:10, rows:2, beds:["D1"], sownDate:"10-04-2026", sowLog:"", plantedDate:"",  plantLog:"", status:"planlagt",     pricePerKg:0, weightG:0, notes:"Nitrogenfixer" },
  { id:5, name:"Basilikum", emoji:"🌿", family:"Leppeblomster", rowSpacing:25, plantSpacing:20, rows:2, beds:["E1"], sownDate:"01-05-2026", sowLog:"", plantedDate:"",  plantLog:"", status:"planlagt",     pricePerKg:0, weightG:0, notes:"Ikke ut før varmt" },
];

let tasks = [
  { id:1, text:"Så tomater innendørs",       done:false, date:"15-03-2026", priority:"høy" },
  { id:2, text:"Gjødsle bed A1 og B2",       done:false, date:"01-04-2026", priority:"middels" },
  { id:3, text:"Sette opp staker til ertene",done:true,  date:"28-03-2026", priority:"lav" },
  { id:4, text:"Vanne drivhuset",             done:false, date:"05-04-2026", priority:"høy" },
];

let currentTab = (() => { try { return localStorage.getItem('mh_tab') || 'oversikt'; } catch(e) { return 'oversikt'; } })();
let selectedBed = null;
let cropFilter = "alle";
let cropSearch = "";
let expandedCrops = new Set();
let focusTaskIds  = new Set();   // tasks pinned to focus modal
let taskHistory   = [];           // completed tasks history
let deliveryCustomers = [];
let deliveryBox = [];              // standard box (legacy, kept for compat)
let boxTypes = [];                 // [{id, name, type:'vasket'|'uvasket', weekdays[], startWeek, endWeek, frequency, baseItems:[{cropId,qty,unit}]}]
let boxWeeks = [];                 // [{id, boxTypeId, week, year, items:[{cropId,qty,unit}], count, customerAdj:{}}]
let deliveryMarket = [];           // [{id, cropId, qty, unit}]
let harvestLog = [];
let cropCategories = (() => {
  try {
    const s = localStorage.getItem('mh_crop_categories');
    return s ? JSON.parse(s) : ['Rotgrønnsak','Løk','Belgvekster','Kål','Salat','Gresskar','Drivhus','Urter','Blomster','Andre'];
  } catch(e) { return ['Rotgrønnsak','Løk','Belgvekster','Kål','Salat','Gresskar','Drivhus','Urter','Blomster','Andre']; }
})();
function saveCropCategories() {
  try { localStorage.setItem('mh_crop_categories', JSON.stringify(cropCategories)); } catch(e) {}
}
let levHistory = [];
let levHistoryIndex = -1;
const MAX_LEV_HISTORY = 30;               // [{id, date, cropId, bedId, qty, unit, dest, note}]
let taskOrder     = {};          // priority -> [id, id, ...] custom order
let currentTheme  = (localStorage.getItem('mh_theme') || 'light');
let gardenMap     = null;        // { elements: [...] } for garden map
let cropSortField = localStorage.getItem('mh_sort_field') || 'name';
let cropSortDir   = localStorage.getItem('mh_sort_dir')   || 'asc';
let newPriority = "middels";
let editingCropId = null;
let bedFieldFilter = 'alle';

// ── Undo/Redo history ──
const MAX_HISTORY = 50;
let history = [];   // array of snapshots {crops, tasks, bedSizes, BED_IDS}
let historyIndex = -1;

function snapshot(skipSync = false) {
  history = history.slice(0, historyIndex + 1);
  history.push({
    crops:    JSON.parse(JSON.stringify(crops)),
    tasks:    JSON.parse(JSON.stringify(tasks)),
    bedSizes: JSON.parse(JSON.stringify(bedSizes)),
    bedIDs:   [...BED_IDS],
  });
  if (history.length > MAX_HISTORY) history.shift();
  historyIndex = history.length - 1;
  updateUndoRedoBtns();
  if (!skipSync) scheduleSync();
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  restoreSnapshot(history[historyIndex]);
}

function redo() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  restoreSnapshot(history[historyIndex]);
}

function restoreSnapshot(s) {
  crops    = JSON.parse(JSON.stringify(s.crops));
  tasks    = JSON.parse(JSON.stringify(s.tasks));
  bedSizes = JSON.parse(JSON.stringify(s.bedSizes));
  BED_IDS  = [...s.bedIDs];
  updateUndoRedoBtns();
  render();
  // If Innhøsting overlay is open, refresh its content too
  const levContent = document.getElementById('lev-overlay-content');
  if (levContent) renderLeveringInto(levContent);
}

function updateUndoRedoBtns() {
  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  const ub = document.getElementById('undo-btn');
  const rb = document.getElementById('redo-btn');
  if (ub) ub.disabled = !canUndo;
  if (rb) rb.disabled = !canRedo;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    if (mapOpen) { mapUndoAction(); } else { undo(); }
    updateMapUndoRedoBtns();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
    e.preventDefault();
    if (mapOpen) { mapRedoAction(); } else { redo(); }
    updateMapUndoRedoBtns();
    return;
  }
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

function syncCropTasks() {
  return; // Disabled: auto-tasks from crop dates removed
  const today = new Date(); today.setHours(0,0,0,0);

  crops.forEach(crop => {
    [
      { type: 'saa',   dateField: crop.sownDate,    logField: crop.sowLog,   label: `Så ${crop.emoji} ${crop.family||crop.name}` },
      { type: 'plant', dateField: crop.plantedDate, logField: crop.plantLog, label: `Plant ${crop.emoji} ${crop.family||crop.name}` },
    ].forEach(({ type, dateField, logField, label }) => {
      const taskId = `crop-${crop.id}-${type}`; // stable string id for auto-tasks
      const existing = tasks.find(t => t.id === taskId);

      // If logged → mark done (if exists and not already done)
      if (logField) {
        if (existing && !existing.done) {
          tasks = tasks.map(t => t.id === taskId ? { ...t, done: true } : t);
        }
        return; // no further action needed
      }

      // No date set → remove any existing auto-task
      if (!dateField) {
        if (existing) tasks = tasks.filter(t => t.id !== taskId);
        return;
      }

      const d = parseToDate(dateField);
      if (!d) { if (existing) tasks = tasks.filter(t => t.id !== taskId); return; }
      d.setHours(0,0,0,0);

      const daysDiff = Math.floor((today - d) / 86400000); // negative = future
      if (daysDiff < 0) {
        // Date is in future — remove task if it exists
        if (existing) tasks = tasks.filter(t => t.id !== taskId);
        return;
      }

      // Date has arrived — determine priority
      const priority = daysDiff > 7 ? 'høy' : 'middels';

      if (!existing) {
        // Create new auto-task
        tasks = [...tasks, { id: taskId, text: label, done: false, date: dateField, priority }];
      } else {
        // Update priority if needed (escalate only, don't downgrade)
        if (priority === 'høy' && existing.priority !== 'høy') {
          tasks = tasks.map(t => t.id === taskId ? { ...t, priority: 'høy' } : t);
        }
      }
    });
  });
}

// ── Segment helpers ──────────────────────────────────────────────────────────
// bedSpec formats: "A1", "A1-3", "A1-1:5"
// Returns { bedId, start, end } where start/end are meters (1-based), null=whole bed
function parseBedSpec(spec) {
  spec = spec.trim();
  const segMatch = spec.match(/^([A-Za-z]+\d+)-(\d+)(?::(\d+))?$/);
  if (segMatch) {
    const bedId = segMatch[1].toUpperCase();
    const start = parseInt(segMatch[2]);
    const end   = segMatch[3] !== undefined ? parseInt(segMatch[3]) : start;
    return { bedId, start, end };
  }
  return { bedId: spec.toUpperCase(), start: null, end: null };
}

function segmentLength(spec) {
  const { bedId, start, end } = parseBedSpec(spec);
  if (start === null) return (bedSizes[bedId] || {length:11}).length;
  return end - start + 1;
}

// All crops occupying a given bedId (segment-aware)
function getCropsInBed(bedId) {
  bedId = bedId.toUpperCase();
  return crops.filter(c => c.beds.some(s => parseBedSpec(s).bedId === bedId));
}

// Get crops in bed for the bed grid (returns first crop for legacy single-crop display)
function getBedCrop(bed) {
  return crops.find(c => c.beds.some(s => parseBedSpec(s).bedId === bed.toUpperCase()));
}

// Check for overlapping segments when saving a crop (returns array of conflict descriptions)
function checkOverlap(bedSpecs, excludeCropId) {
  const warnings = [];
  bedSpecs.forEach(spec => {
    const { bedId, start, end } = parseBedSpec(spec);
    if (start === null) return; // whole-bed specs: skip overlap check
    crops.forEach(other => {
      if (other.id === excludeCropId) return;
      other.beds.forEach(oSpec => {
        const o = parseBedSpec(oSpec);
        if (o.bedId !== bedId) return;
        if (o.start === null) {
          warnings.push(`${other.emoji} ${other.name} bruker hele seng ${bedId}`);
          return;
        }
        // Check numeric overlap
        if (start <= o.end && end >= o.start) {
          warnings.push(`${other.emoji} ${other.name} bruker ${oSpec} i seng ${bedId}`);
        }
      });
    });
  });
  return [...new Set(warnings)];
}

function badge(status) {

  return `<span class="badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;

/* ---- PLANT COUNT CALCULATOR ---- */
function calcPlants(crop) {
  let total = 0;
  crop.beds.forEach(spec => {
    const { bedId } = parseBedSpec(spec);
    const bs = bedSizes[bedId];
    if (!bs) return;
    const lenM = segmentLength(spec);
    const lenCm = lenM * 100;
    const rows = crop.rows || 1;
    const plantSpacing = crop.plantSpacing || 1;
    const plantsPerRow = Math.floor(lenCm / plantSpacing) + 1;
    total += rows * plantsPerRow;
  });
  return total;
}

function calcValue(crop) {
  if (!crop.pricePerKg) return null;
  // Prefer vektTotal-based calculation if available
  if (crop.vektTotal && crop.vektTotal > 0) {
    return Math.round(calcPlants(crop) * (crop.vektTotal / 1000) * crop.pricePerKg);
  }
  if (!crop.weightG) return null;
  return Math.round(calcPlants(crop) * (crop.weightG / 1000) * crop.pricePerKg);
}



// ════════════════════════════════════════════════════════════════
// HAGE-KART v5 — Proporsjonalt kart med feltinnstillinger
// ════════════════════════════════════════════════════════════════
//
// gardenMap = {
//   fieldSettings: { A: { orientation:'landscape'|'portrait', gangvei:1.0 }, ... },
//   extras: [{id,x,y,w,h,label}],
//   locked: false
// }
// Beds are always auto-generated from BED_IDS + bedSizes + fieldSettings
// No stored positions — layout recalculates from settings

const MAP_PX_PER_M = 28;   // px per meter (base scale)
const MAP_PAD_M    = 1.5;  // padding in meters

const MAP_FIELD_ACCENTS = ['#34d399','#60a5fa','#f87171','#d97706','#a78bfa','#fb923c'];
const MAP_FIELD_FILLS   = [
  'rgba(52,211,153,0.13)','rgba(96,165,250,0.13)','rgba(248,113,113,0.13)',
  'rgba(251,191,36,0.13)', 'rgba(167,139,250,0.13)','rgba(251,146,60,0.13)'
];
const MAP_STATUS_COLORS = {
  planlagt:'#6b7280', sådd:'#60a5fa', plantet:'#34d399', høstet:'#d97706', avsluttet:'#4b5563'
};

function mapFieldLetters() {
  return [...new Set(BED_IDS.map(id => id.match(/^([A-Za-z]+)/)?.[1]||'A'))].sort();
}
function mapFieldIdx(bedId) {
  return mapFieldLetters().indexOf(bedId.match(/^([A-Za-z]+)/)?.[1]||'A');
}
function mapFieldSettings(letter) {
  if (!gardenMap.fieldSettings) gardenMap.fieldSettings = {};
  if (!gardenMap.fieldSettings[letter]) {
    gardenMap.fieldSettings[letter] = { orientation: 'landscape', gangvei: 0.4, bedsPerRow: 0 }; // 0 = all in one row
  }
  return gardenMap.fieldSettings[letter];
}

// Calculate layout positions from fieldSettings + fieldGrid (snap grid)
function calcMapLayout(scale) {
  const S = scale || MAP_PX_PER_M; // px per meter
  const layout = {};
  const letters = mapFieldLetters();
  if (!gardenMap.fieldGrid)     gardenMap.fieldGrid = {};
  if (!gardenMap.fieldSettings) gardenMap.fieldSettings = {};

  letters.forEach((letter, i) => {
    if (!gardenMap.fieldGrid[letter]) gardenMap.fieldGrid[letter] = { col: 0, row: i };
  });

  // First pass: internal layout per field (supporting bedsPerRow)
  const fieldLayouts = {};
  letters.forEach(letter => {
    const beds = BED_IDS.filter(id => (id.match(/^([A-Za-z]+)/)?.[1]||'A') === letter);
    const fs = mapFieldSettings(letter);
    const isPortrait  = fs.orientation === 'portrait';
    const gangPx      = Math.round(fs.gangvei * S);
    const bedsPerRow  = fs.bedsPerRow > 0 ? fs.bedsPerRow : beds.length; // 0 = all in one row

    const bedLayouts = {};
    let maxRowW = 0, totalH = 0;
    let rowStart = 0;
    while (rowStart < beds.length) {
      const rowBeds = beds.slice(rowStart, rowStart + bedsPerRow);
      let curX = 0, maxH = 0;
      rowBeds.forEach(id => {
        const sz = bedSizes[id] || {length:11, width:1.2};
        const w = Math.round((isPortrait ? sz.width  : sz.length) * S);
        const h = Math.round((isPortrait ? sz.length : sz.width ) * S);
        bedLayouts[id] = { x: curX, y: totalH, w, h };
        curX += w + gangPx;
        if (h > maxH) maxH = h;
      });
      if (curX > maxRowW) maxRowW = curX;
      totalH += maxH + gangPx;
      rowStart += bedsPerRow;
    }
    fieldLayouts[letter] = { beds: bedLayouts, width: maxRowW, height: totalH };
  });

  // Second pass: use fieldGrid for positioning + field drag positions
  const padPx = Math.round(MAP_PAD_M * S);
  const colWidths = {}, rowHeights = {};
  const fieldGapPx = Math.round(1.0 * S); // 1m between fields

  letters.forEach(letter => {
    const g = gardenMap.fieldGrid[letter];
    const fl = fieldLayouts[letter];
    colWidths[g.col]  = Math.max(colWidths[g.col]  || 0, fl.width  + fieldGapPx);
    rowHeights[g.row] = Math.max(rowHeights[g.row] || 0, fl.height + fieldGapPx);
  });

  const colOffsets = {}, rowOffsets = {};
  let cxOff = padPx;
  [...new Set(Object.keys(colWidths).map(Number))].sort((a,b)=>a-b).forEach(c => {
    colOffsets[c] = cxOff; cxOff += colWidths[c];
  });
  let ryOff = padPx;
  [...new Set(Object.keys(rowHeights).map(Number))].sort((a,b)=>a-b).forEach(r => {
    rowOffsets[r] = ryOff; ryOff += rowHeights[r];
  });

  // Apply field drag overrides (from dragging fields in the main map)
  if (!gardenMap.fieldDragOffsets) gardenMap.fieldDragOffsets = {};

  letters.forEach(letter => {
    const g  = gardenMap.fieldGrid[letter];
    const fl = fieldLayouts[letter];
    // ALWAYS use fieldMeters (in meters) × S for position — zoom-independent
    const _fm = gardenMap.fieldMeters?.[letter] || { x: MAP_PAD_M, y: MAP_PAD_M };
    const ox = _fm.x * S;
    const oy = _fm.y * S;
    Object.entries(fl.beds).forEach(([id, p]) => {
      layout[id] = { x: ox + p.x, y: oy + p.y, w: p.w, h: p.h };
    });
  });

  return { layout, fieldLayouts, colOffsets, rowOffsets };
}


function saveGardenMap() {
  try { localStorage.setItem('mh_garden_map', JSON.stringify(gardenMap)); } catch(e) {}
  scheduleSync();
}

function initGardenMap() {
  gardenMap = { fieldSettings: {}, fieldMeters: {}, fieldDragOffsets: {}, extras: [], locked: false, compassAngle: 0, areaW: 0, areaH: 0, bedLabel: 'emoji' };
  mapFieldLetters().forEach(l => mapFieldSettings(l));
  initFieldMeters();
  saveGardenMap();
}

function initFieldMeters() {
  // Assign default stacked positions in meters to all fields that don't have one
  if (!gardenMap.fieldMeters) gardenMap.fieldMeters = {};
  if (!gardenMap.fieldDragOffsets) gardenMap.fieldDragOffsets = {};
  const letters = mapFieldLetters();
  let curY = MAP_PAD_M;
  letters.forEach((letter, i) => {
    if (gardenMap.fieldMeters[letter]) {
      // already set, skip but advance curY
      const sz = getFieldSizeM(letter);
      curY = Math.max(curY, gardenMap.fieldMeters[letter].y + sz.h + 1.0);
      return;
    }
    const sz = getFieldSizeM(letter);
    gardenMap.fieldMeters[letter] = { x: MAP_PAD_M, y: curY };
    gardenMap.fieldDragOffsets[letter] = { x: MAP_PAD_M * MAP_PX_PER_M, y: curY * MAP_PX_PER_M };
    curY += sz.h + 1.0; // 1m gap between fields
  });
}

function getFieldSizeM(letter) {
  const beds = BED_IDS.filter(id => (id.match(/^([A-Za-z]+)/)?.[1]||'A') === letter);
  const fs = mapFieldSettings(letter);
  const isP = fs.orientation === 'portrait';
  const gangM = fs.gangvei;
  const bpr = (fs.bedsPerRow > 0) ? fs.bedsPerRow : beds.length;
  let maxW = 0, totalH = 0, rowStart = 0;
  while (rowStart < beds.length) {
    const row = beds.slice(rowStart, rowStart + bpr);
    let rowW = 0, maxH = 0;
    row.forEach(id => {
      const sz = bedSizes[id] || {length:11,width:1.2};
      rowW += (isP ? sz.width : sz.length) + gangM;
      const h = isP ? sz.length : sz.width;
      if (h > maxH) maxH = h;
    });
    if (rowW > maxW) maxW = rowW;
    totalH += maxH + gangM;
    rowStart += bpr;
  }
  // 0.4m padding on all sides
  const padM = 0.4 * 2;
  return { w: Math.max(1, maxW + padM), h: Math.max(1, totalH + padM) };
}

function mapWheel(e) {
  e.preventDefault();
  const vp = document.getElementById('map-vp');
  if (!vp) return;
  const rect = vp.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  mapOffX = cx - (cx - mapOffX) * factor;
  mapOffY = cy - (cy - mapOffY) * factor;
  mapScale = Math.max(0.05, Math.min(8, mapScale * factor));
  mapApplyTransform();
}

function toggleMapLock() {
  mapLocked = !mapLocked;
  const btn = document.getElementById('map-lock-btn');
  if (btn) { btn.textContent = mapLocked ? '🔒' : '🔓'; btn.style.fontSize = '13px'; btn.style.filter = 'grayscale(1)'; }
  renderMapWorld();
}

// ── Map-specific undo/redo stack ──────────────────────────────────
let mapHistory = [];
let mapHistoryIdx = -1;
const MAX_MAP_HISTORY = 40;

function mapSnapshot() {
  mapHistory = mapHistory.slice(0, mapHistoryIdx + 1);
  mapHistory.push(JSON.parse(JSON.stringify(gardenMap)));
  if (mapHistory.length > MAX_MAP_HISTORY) mapHistory.shift();
  mapHistoryIdx = mapHistory.length - 1;
  updateMapUndoRedoBtns();
}

function mapUndoAction() {
  if (mapHistoryIdx <= 0) return;
  mapHistoryIdx--;
  gardenMap = JSON.parse(JSON.stringify(mapHistory[mapHistoryIdx]));
  saveGardenMap();
  if (drawMode) redrawCanvas(); else renderMapWorld();
  updateMapUndoRedoBtns();
}

function mapRedoAction() {
  if (mapHistoryIdx >= mapHistory.length - 1) return;
  mapHistoryIdx++;
  gardenMap = JSON.parse(JSON.stringify(mapHistory[mapHistoryIdx]));
  saveGardenMap();
  if (drawMode) redrawCanvas(); else renderMapWorld();
  updateMapUndoRedoBtns();
}

function updateMapUndoRedoBtns() {
  const ub = document.getElementById('map-undo-btn');
  const rb = document.getElementById('map-redo-btn');
  if (!ub || !rb) return;
  const canUndo = mapHistoryIdx > 0;
  const canRedo = mapHistoryIdx < mapHistory.length - 1;
  ub.disabled = !canUndo;
  ub.style.opacity = canUndo ? '1' : '0.3';
  rb.disabled = !canRedo;
  rb.style.opacity = canRedo ? '1' : '0.3';
}

function closeGardenMap() {
  document.getElementById('map-overlay')?.remove();
  mapOpen = false; mapTouch1 = null; mapTouch2 = null; _mapMouseActive = false;
}

function mapApplyTransform() {
  // Position the world container via offset only; scale is baked into render
  const vp = document.getElementById('map-vp');
  if (vp) vp.style.backgroundSize = `${MAP_PX_PER_M * mapScale}px ${MAP_PX_PER_M * mapScale}px`;
  const w = document.getElementById('map-world');
  if (w) {
    w.style.transform = `translate(${mapOffX}px,${mapOffY}px)`;
    renderMapWorld();
    redrawCanvas();
  }
}

function mapZoom(factor) {
  const vp = document.getElementById('map-vp');
  if (!vp) return;
  const cx = vp.clientWidth/2, cy = vp.clientHeight/2;
  mapScale = Math.max(0.08, Math.min(6, mapScale * factor));
  mapOffX = cx - (cx - mapOffX) * factor;
  mapOffY = cy - (cy - mapOffY) * factor;
  mapApplyTransform();
}

function mapFitAll() {
  const vp = document.getElementById('map-vp');
  const { layout } = calcMapLayout(MAP_PX_PER_M * mapScale);
  if (!vp || !Object.keys(layout).length) return;
  const xs = Object.values(layout).flatMap(p=>[p.x, p.x+p.w]);
  const ys = Object.values(layout).flatMap(p=>[p.y, p.y+p.h]);
  const minX=Math.min(...xs)-20, maxX=Math.max(...xs)+20;
  const minY=Math.min(...ys)-20, maxY=Math.max(...ys)+20;
  const s = Math.min(vp.clientWidth/(maxX-minX), vp.clientHeight/(maxY-minY), 2);
  mapScale = s;
  mapOffX = (vp.clientWidth  - (maxX-minX)*s)/2 - minX*s;
  mapOffY = (vp.clientHeight - (maxY-minY)*s)/2 - minY*s;
  mapApplyTransform();
}

function renderMapWorld() {
  const world = document.getElementById('map-world');
  if (!world || !gardenMap) return;

  const S = MAP_PX_PER_M * mapScale;
  const { layout } = calcMapLayout(S);
  const letters = mapFieldLetters();
  const isLight = document.body.classList.contains('light');

  // Progressive detail levels based on zoom
  const SHOW_BEDS   = mapScale >= 0.12;  // beds visible
  const SHOW_EMOJI  = mapScale >= 0.25;  // emojis visible
  const SHOW_BED_ID = mapScale >= 0.35;  // bed IDs visible

  const ACCENT        = isLight ? '#b45309'             : '#34d399';
  const FIELD_BG      = isLight ? 'rgba(180,83,9,0.07)' : 'rgba(52,211,153,0.07)';
  const FIELD_BORDER  = isLight ? 'rgba(180,83,9,0.25)' : 'rgba(52,211,153,0.22)';
  const LABEL_COLOR   = isLight ? '#8b6240'             : '#6ee7b7';
  const BED_FILLED_BG = isLight ? 'rgba(180,83,9,0.1)'  : 'rgba(52,211,153,0.1)';
  const BED_FILLED_BD = isLight ? '#b45309'             : '#34d399';
  const BED_EMPTY_BG  = isLight ? 'rgba(0,0,0,0.03)'   : 'rgba(255,255,255,0.04)';
  const BED_EMPTY_BD  = isLight ? 'rgba(0,0,0,0.1)'    : 'rgba(255,255,255,0.12)';
  const LEDIG_COLOR   = isLight ? 'rgba(0,0,0,0.2)'    : 'rgba(255,255,255,0.2)';
  const ID_COLOR      = isLight ? 'rgba(0,0,0,0.4)'    : 'rgba(255,255,255,0.4)';

  const labelH  = 0;
  const gangPad = Math.round(0.4 * S); // 0.4m in scaled pixels
  const borderR   = Math.max(3, Math.round(8 * mapScale));
  const bedR      = Math.max(2, Math.round(4 * mapScale));
  const idSize    = Math.max(12, Math.round(12 * mapScale));
  const labelSize = Math.max(12, Math.round(12 * mapScale));

  let maxX = 200, maxY = 200;
  Object.values(layout).forEach(p => { maxX=Math.max(maxX,p.x+p.w+80); maxY=Math.max(maxY,p.y+p.h+80); });
  world.style.width  = maxX + 'px';
  world.style.height = maxY + 'px';
  world.style.transform = `translate(${mapOffX}px,${mapOffY}px)`;

  let html = '';

  // Field backgrounds (always visible)
  letters.forEach(letter => {
    const beds = BED_IDS.filter(id => (id.match(/^([A-Za-z]+)/)?.[1]||'A') === letter);
    const ps = beds.map(id => layout[id]).filter(Boolean);
    if (!ps.length) return;

    const minX = Math.min(...ps.map(p=>p.x)) - gangPad;
    const minY = Math.min(...ps.map(p=>p.y)) - gangPad;
    const maxXX= Math.max(...ps.map(p=>p.x+p.w)) + gangPad;
    const maxYY= Math.max(...ps.map(p=>p.y+p.h)) + gangPad;
    const w = maxXX - minX, h = maxYY - minY;

    html += `<div data-field-drag="${letter}" style="position:absolute;
      left:${minX}px;top:${minY}px;width:${w}px;height:${h}px;
      background:${FIELD_BG};border:1.5px solid ${FIELD_BORDER};
      border-radius:${borderR}px;cursor:grab;box-sizing:border-box;overflow:hidden">

    </div>`;
  });

  // Beds
  if (SHOW_BEDS) {
    BED_IDS.forEach(id => {
      const p = layout[id];
      if (!p) return;
      const bedCrops = getCropsInBed(id);
      const isEmpty = bedCrops.length === 0;
      const isSelected = mapSelectedBedId === id;
      const bg = isEmpty ? BED_EMPTY_BG : BED_FILLED_BG;
      const bd = isEmpty ? BED_EMPTY_BD : BED_FILLED_BD;
      const bw = isSelected ? 2.5 : 1.5;
      const useName = (gardenMap.bedLabel === 'name');

      let inner = '';
      if (!isEmpty) {
        const sz = bedSizes[id] || {length:11, width:1.2};
        const fs2 = mapFieldSettings(id.match(/^([A-Za-z]+)/)?.[1]||'A');
        const isPortrait = fs2.orientation === 'portrait';

        if (SHOW_EMOJI && useName) {
          inner = ''; // bed ID shown separately above
        } else if (SHOW_EMOJI) {
          // Emoji mode
          const total = Math.max(1, Math.round(sz.length));
          const emojiSize = Math.max(12, Math.min(
            Math.round(Math.min(p.w, p.h) * 0.52),
            Math.round(24 * mapScale)
          ));
          const flexDir = isPortrait ? 'column' : 'row';
          const seq = Array.from({length:total}, (_,ii) => bedCrops[ii % bedCrops.length].emoji);
          const slotPx = emojiSize + Math.round(3 * mapScale);
          const availPx = (isPortrait ? p.h : p.w) - Math.round(8 * mapScale);
          const maxShow = Math.max(1, Math.floor(availPx / slotPx));
          const shown = seq.slice(0, maxShow);
          const leftover = total - shown.length;
          inner = `<div style="display:flex;flex-direction:${flexDir};
            align-items:center;justify-content:space-evenly;
            width:100%;height:100%;
            padding:${Math.round(3*mapScale)}px;
            overflow:hidden;box-sizing:border-box;pointer-events:none">
            ${shown.map(e=>`<span style="font-size:${emojiSize}px;line-height:1;flex-shrink:0">${e}</span>`).join('')}
            ${leftover>0?`<span style="font-size:${Math.max(11,Math.round(11*mapScale))}px;color:${LEDIG_COLOR};flex-shrink:0">+${leftover}</span>`:''}
          </div>`;
        }
      }

      html += `<div data-bed="${id}" style="position:absolute;
        left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;
        background:${bg};border:${bw}px solid ${isSelected?ACCENT:bd};
        border-radius:${bedR}px;box-sizing:border-box;
        cursor:pointer;overflow:hidden;
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        user-select:none">
        ${SHOW_BED_ID && useName ? `<div style="display:flex;align-items:center;justify-content:center;
          width:100%;height:100%;
          font-size:${idSize}px;color:${ID_COLOR};font-weight:700;line-height:1;
          font-family:Georgia,serif;pointer-events:none;white-space:nowrap">${id}</div>` : ''}
        ${inner}
      </div>`;
    });
  }

  // Area boundary box
  if (gardenMap.areaW > 0 && gardenMap.areaH > 0) {
    const aW = gardenMap.areaW * S, aH = gardenMap.areaH * S;
    const aBox = document.createElement('div');
    aBox.style.cssText = `position:absolute;left:0;top:0;width:${aW}px;height:${aH}px;
      border:2px dashed ${isLight?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.15)'};
      border-radius:4px;pointer-events:none;box-sizing:border-box`;
    world.insertBefore(aBox, world.firstChild);
    // Label
    const aLbl = document.createElement('div');
    aLbl.style.cssText = `position:absolute;left:6px;top:4px;
      font-size:${Math.max(12,Math.round(11*mapScale))}px;
      color:${isLight?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.25)'};
      font-family:Georgia,serif;pointer-events:none`;
    aLbl.textContent = `${gardenMap.areaW}×${gardenMap.areaH}m`;
    world.insertBefore(aLbl, world.firstChild);
  }

  world.innerHTML = html;

  // Re-add area box centered around beds
  if (gardenMap.areaW > 0 && gardenMap.areaH > 0) {
    const aW = gardenMap.areaW * S, aH = gardenMap.areaH * S;
    // Center the area around the beds
    const allX = Object.values(layout).flatMap(p=>[p.x, p.x+p.w]);
    const allY = Object.values(layout).flatMap(p=>[p.y, p.y+p.h]);
    const bedsMinX = allX.length ? Math.min(...allX) : 0;
    const bedsMaxX = allX.length ? Math.max(...allX) : aW;
    const bedsMinY = allY.length ? Math.min(...allY) : 0;
    const bedsMaxY = allY.length ? Math.max(...allY) : aH;
    const bedsMidX = (bedsMinX + bedsMaxX) / 2;
    const bedsMidY = (bedsMinY + bedsMaxY) / 2;
    const aLeft = bedsMidX - aW/2;
    const aTop  = bedsMidY - aH/2;
    const aBox = document.createElement('div');
    aBox.style.cssText = `position:absolute;left:${aLeft}px;top:${aTop}px;width:${aW}px;height:${aH}px;
      border:2px dashed ${isLight?'rgba(0,0,0,0.2)':'rgba(255,255,255,0.15)'};
      border-radius:4px;pointer-events:none;box-sizing:border-box;z-index:0`;
    world.appendChild(aBox);
    const aLbl = document.createElement('div');
    aLbl.style.cssText = `position:absolute;left:${aLeft+8}px;top:${aTop+5}px;
      font-size:${Math.max(12,Math.round(11*mapScale))}px;
      color:${isLight?'rgba(0,0,0,0.3)':'rgba(255,255,255,0.25)'};
      font-family:Georgia,serif;pointer-events:none;z-index:0`;
    aLbl.textContent = `${gardenMap.areaW} × ${gardenMap.areaH} m`;
    world.appendChild(aLbl);
  }

  world.querySelectorAll('[data-field-drag]').forEach(el => {
    if (!mapLocked) attachFieldDragInMap(el, el.dataset.fieldDrag);
    else el.style.cursor = 'default';
  });
  world.querySelectorAll('[data-bed]').forEach(el => {
    const bedId = el.dataset.bed;
    const bedLetter = bedId.match(/^([A-Za-z]+)/)?.[1]||'A';
    let startX, startY, moved = false;

    // Mouse
    el.addEventListener('mousedown', e => {
      startX = e.clientX; startY = e.clientY; moved = false;
      if (mapLocked) { setTimeout(() => { if (!moved) showBedPopup(bedId); }, 0); e.stopPropagation(); return; }
      e.stopPropagation();
      const fieldEl = world.querySelector(`[data-field-drag="${bedLetter}"]`);
      const onMove = ev => {
        if (Math.hypot(ev.clientX-startX, ev.clientY-startY) > 6) {
          if (!moved) {
            moved = true;
            // Kick off field drag from original position
            if (fieldEl) fieldEl.dispatchEvent(new MouseEvent('mousedown', {bubbles:false, clientX:startX, clientY:startY}));
          }
        }
      };
      const onUp = () => {
        if (!moved) showBedPopup(bedId);
        window.removeEventListener('mousemove', onMove);
        window.removeEventListener('mouseup', onUp);
      };
      window.addEventListener('mousemove', onMove);
      window.addEventListener('mouseup', onUp);
    });

    // Touch — use field element's own touch handlers directly
    el.addEventListener('touchstart', e => {
      if (e.touches.length !== 1) return;
      startX = e.touches[0].clientX; startY = e.touches[0].clientY; moved = false;
      e.stopPropagation();
    }, {passive:true});
    el.addEventListener('touchmove', e => {
      if (e.touches.length !== 1 || moved) return;
      if (Math.hypot(e.touches[0].clientX-startX, e.touches[0].clientY-startY) > 8) {
        moved = true;
        const fieldEl = world.querySelector(`[data-field-drag="${bedLetter}"]`);
        if (fieldEl) {
          // Directly call onStart on the field drag handler
          fieldEl.dispatchEvent(new TouchEvent('touchstart', {
            bubbles: false, cancelable: true,
            touches: e.touches, changedTouches: e.changedTouches
          }));
        }
      }
    }, {passive:true});
    el.addEventListener('touchend', e => {
      if (!moved) showBedPopup(bedId);
      moved = false;
    }, {passive:true});
  });

  // Update compass widget
  const compassEl = document.getElementById('map-compass');
  if (compassEl) {
    const showCompass = gardenMap.showCompass !== false;
    compassEl.style.display = showCompass ? 'flex' : 'none';
    if (showCompass) {
      const angle = gardenMap.compassAngle || 0;
      const isLight2 = document.body.classList.contains('light');
      const cN   = isLight2 ? '#6b4c2a' : '#34d399';
      const cS   = isLight2 ? '#9c8674' : '#6b7280';
      compassEl.innerHTML = `
        <svg width="48" height="48" viewBox="0 0 48 48">
          <g transform="rotate(${angle}, 24, 24)">
            <polygon points="24,12 28,24 24,21 20,24" fill="${cN}"/>
            <polygon points="24,36 28,24 24,27 20,24" fill="${cS}"/>
            <text x="24" y="9" text-anchor="middle" font-size="9" fill="${cN}" font-family="Georgia" font-weight="bold">N</text>
            <text x="24" y="46" text-anchor="middle" font-size="9" fill="${cS}" font-family="Georgia">S</text>
          </g>
        </svg>`;
    }
  }
}

// Field drag — simple, correct, 1:1
function attachFieldDragInMap(el, letter) {
  let startClientX, startClientY;
  let startWorldX, startWorldY; // in base world pixels (unscaled)
  let active = false;

  function onStart(clientX, clientY) {
    active = true;
    startClientX = clientX;
    startClientY = clientY;
    // Read el's current base-world position from fieldMeters or fieldDragOffsets
    if (!gardenMap.fieldMeters) gardenMap.fieldMeters = {};
    if (!gardenMap.fieldDragOffsets) gardenMap.fieldDragOffsets = {};
    if (gardenMap.fieldMeters[letter]) {
      startWorldX = gardenMap.fieldMeters[letter].x * MAP_PX_PER_M;
      startWorldY = gardenMap.fieldMeters[letter].y * MAP_PX_PER_M;
    } else if (gardenMap.fieldDragOffsets[letter]) {
      startWorldX = gardenMap.fieldDragOffsets[letter].x;
      startWorldY = gardenMap.fieldDragOffsets[letter].y;
    } else {
      // First drag: compute from default layout (no overrides)
      const savedM = gardenMap.fieldMeters;
      const savedD = gardenMap.fieldDragOffsets;
      gardenMap.fieldMeters = {};
      gardenMap.fieldDragOffsets = {};
      const { layout } = calcMapLayout(MAP_PX_PER_M);
      gardenMap.fieldMeters = savedM;
      gardenMap.fieldDragOffsets = savedD;
      const beds = BED_IDS.filter(id => (id.match(/^([A-Za-z]+)/)?.[1]||'A') === letter);
      const ps = beds.map(id => layout[id]).filter(Boolean);
      startWorldX = ps.length ? Math.min(...ps.map(p=>p.x)) : 0;
      startWorldY = ps.length ? Math.min(...ps.map(p=>p.y)) : 0;
    }
    el.style.cursor = 'grabbing';
  }

  function onMove(clientX, clientY) {
    if (!active) return;
    const dxBase = (clientX - startClientX) / mapScale;
    const dyBase = (clientY - startClientY) / mapScale;
    const rawX = Math.max(0, startWorldX + dxBase);
    const rawY = Math.max(0, startWorldY + dyBase);
    // Resolve overlap during drag so field can never land on another
    const rawMX = rawX / MAP_PX_PER_M;
    const rawMY = rawY / MAP_PX_PER_M;
    const resolved = resolveOverlapMeters(rawMX, rawMY, letter);
    gardenMap.fieldMeters[letter] = resolved;
    gardenMap.fieldDragOffsets[letter] = { x: resolved.x * MAP_PX_PER_M, y: resolved.y * MAP_PX_PER_M };
    renderMapWorld();
  }

  function onEnd() {
    if (!active) return;
    active = false;
    el.style.cursor = 'grab';
    if (gardenMap.fieldMeters?.[letter]) {
      const cur = gardenMap.fieldMeters[letter];
      // 1. Snap to alignment (same row/col as nearby fields)
      const snapped = snapToAlignment(cur.x, cur.y, letter);
      // 2. Resolve any overlaps after snap
      const resolved = resolveOverlapMeters(snapped.x, snapped.y, letter);
      gardenMap.fieldMeters[letter] = resolved;
      gardenMap.fieldDragOffsets[letter] = { x: resolved.x * MAP_PX_PER_M, y: resolved.y * MAP_PX_PER_M };
    }
    mapSnapshot();
    saveGardenMap();
    renderMapWorld();
  }

  el.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    e.preventDefault(); e.stopPropagation();
    onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});

  el.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    e.preventDefault(); e.stopPropagation();
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive:false});

  el.addEventListener('touchend', e => {
    e.preventDefault(); e.stopPropagation(); onEnd();
  }, {passive:false});

  el.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    onStart(e.clientX, e.clientY);
    const mm = ev => { ev.preventDefault(); onMove(ev.clientX, ev.clientY); };
    const mu = () => { onEnd(); window.removeEventListener('mousemove',mm); window.removeEventListener('mouseup',mu); };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
  });
}

// Resolve overlap in meters, returns adjusted position
// Snap field to row/col alignment with nearby fields
function snapToAlignment(mx, my, movingLetter) {
  const THRESH = 1.5; // meters
  const letters = mapFieldLetters();
  const ms = getFieldSizeM(movingLetter);
  let bestDX = null, bestDY = null;

  for (const other of letters) {
    if (other === movingLetter) continue;
    const op = gardenMap.fieldMeters?.[other];
    if (!op) continue;
    const os = getFieldSizeM(other);

    // X-axis candidates: left-left and right-right alignment
    const xCandidates = [
      op.x - mx,              // align left edges
      (op.x + os.w) - (mx + ms.w), // align right edges
    ];
    for (const dx of xCandidates) {
      if (Math.abs(dx) < THRESH && (bestDX === null || Math.abs(dx) < Math.abs(bestDX))) bestDX = dx;
    }

    // Y-axis candidates: top-top and bottom-bottom alignment
    const yCandidates = [
      op.y - my,              // align top edges
      (op.y + os.h) - (my + ms.h), // align bottom edges
    ];
    for (const dy of yCandidates) {
      if (Math.abs(dy) < THRESH && (bestDY === null || Math.abs(dy) < Math.abs(bestDY))) bestDY = dy;
    }
  }

  if (bestDX !== null) mx += bestDX;
  if (bestDY !== null) my += bestDY;
  return { x: Math.max(0, mx), y: Math.max(0, my) };
}

function initCompassWheel() {
  const canvas = document.getElementById('compass-wheel');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 55, cy = 55, R = 48, rInner = 28;
  const isLight = document.body.classList.contains('light');
  const cAccent = isLight ? '#6b4c2a' : '#34d399';
  const cDim    = isLight ? '#9c8674' : '#6b7280';
  const cBg     = isLight ? '#fff8f0' : '#1a2e1a';
  const cBorder = isLight ? '#d6c9b0' : '#34d399';
  const cText   = isLight ? '#1c1410' : '#e8f5e9';

  function draw(angle) {
    ctx.clearRect(0, 0, 110, 110);
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2);
    ctx.fillStyle = cBg; ctx.fill();
    ctx.strokeStyle = cBorder; ctx.lineWidth = 2; ctx.stroke();
    for (let i = 0; i < 72; i++) {
      const a = (i * 5 * Math.PI) / 180;
      const len = i % 18 === 0 ? 10 : i % 9 === 0 ? 6 : 3;
      const r1 = R - 2, r2 = R - 2 - len;
      ctx.beginPath();
      ctx.moveTo(cx + r1*Math.sin(a), cy - r1*Math.cos(a));
      ctx.lineTo(cx + r2*Math.sin(a), cy - r2*Math.cos(a));
      ctx.strokeStyle = i % 18 === 0 ? cAccent : cDim;
      ctx.lineWidth = i % 9 === 0 ? 1.5 : 0.8; ctx.stroke();
    }
    [['N',0],['Ø',90],['S',180],['V',270]].forEach(([label, deg]) => {
      const a = (deg * Math.PI) / 180;
      const r = R - 16;
      ctx.font = 'bold 9px Georgia'; ctx.fillStyle = label==='N' ? cAccent : cDim;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(label, cx + r*Math.sin(a), cy - r*Math.cos(a));
    });
    const rad = (angle * Math.PI) / 180;
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(rad);
    ctx.beginPath(); ctx.moveTo(0,-rInner); ctx.lineTo(5,0); ctx.lineTo(-5,0); ctx.closePath();
    ctx.fillStyle = cAccent; ctx.fill();
    ctx.beginPath(); ctx.moveTo(0,rInner); ctx.lineTo(5,0); ctx.lineTo(-5,0); ctx.closePath();
    ctx.fillStyle = cDim; ctx.fill();
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = cText; ctx.fill();
  }

  draw(gardenMap.compassAngle || 0);

  function angleFromEvent(ex, ey) {
    const rect = canvas.getBoundingClientRect();
    const dx = ex - rect.left - cx, dy = ey - rect.top - cy;
    return (Math.atan2(dx, -dy) * 180 / Math.PI + 360) % 360;
  }
  function update(angle) {
    const snapped = Math.round(angle);
    gardenMap.compassAngle = snapped;
    draw(snapped);
    const disp = document.getElementById('compass-angle-display');
    if (disp) disp.textContent = snapped + '°';
    const lbl = disp?.nextElementSibling;
    if (lbl) lbl.textContent = compassLabel(snapped);
    saveGardenMap(); renderMapWorld();
  }
  let dragging = false;
  canvas.addEventListener('mousedown', e => { dragging=true; canvas.style.cursor='grabbing'; update(angleFromEvent(e.clientX,e.clientY)); });
  window.addEventListener('mousemove', e => { if(dragging) update(angleFromEvent(e.clientX,e.clientY)); });
  window.addEventListener('mouseup', () => { dragging=false; canvas.style.cursor='grab'; });
  canvas.addEventListener('touchstart', e => { e.preventDefault(); update(angleFromEvent(e.touches[0].clientX,e.touches[0].clientY)); },{passive:false});
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); update(angleFromEvent(e.touches[0].clientX,e.touches[0].clientY)); },{passive:false});
}

// TEGNEMODUS
// ════════════════════════════════════════════════════════════════
// All strokes stored as world-meter coords. Canvas redrawn from scratch on zoom/pan.
// Eraser: stored as strokes with color='__eraser__', drawn with globalCompositeOperation='destination-out'
// The canvas has a white background layer so eraser reveals white (paper).

let drawToolbarVisible = true;

function showSizeDot(sz, sliderEl) {
  let dot = document.getElementById('draw-size-dot');
  if (!dot) {
    dot = document.createElement('div');
    dot.id = 'draw-size-dot';
    dot.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;border-radius:50%;background:#1c1410;transform:translate(-50%,-100%) translateY(-10px);transition:width 0.1s,height 0.1s';
    document.body.appendChild(dot);
  }
  const r = sliderEl.getBoundingClientRect();
  const pct = (sz - 1) / (80 - 1);
  const x = r.left + pct * r.width;
  const y = r.top;
  const dispSz = Math.min(sz, 60);
  dot.style.width  = dispSz + 'px';
  dot.style.height = dispSz + 'px';
  dot.style.left   = x + 'px';
  dot.style.top    = y + 'px';
  dot.style.display = 'block';
}
function hideSizeDot() {
  const dot = document.getElementById('draw-size-dot');
  if (dot) dot.style.display = 'none';
}

function toggleDrawMode() {
  drawMode = !drawMode;
  drawToolbarVisible = true; // reset on toggle
  const btn = document.getElementById('draw-mode-btn');

  if (overlay) overlay.style.display = drawMode ? 'block' : 'none';
  updateMapUndoRedoBtns();
}

function toggleDrawToolbar() {

           pc.lineWidth=5; pc.beginPath(); pc.moveTo(4,10); pc.lineTo(18,14); pc.stroke(); }

function toggleEraser() {

function toggleFillTool() {
